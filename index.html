{q:"IOC 和 DI 的原理？",a:`<h4>是什么：IOC 和 DI 的概念</h4><p><strong>IOC（控制反转）：</strong>将对象的创建、组装和生命周期管理权从代码转移到 Spring 容器。传统方式是你自己 <code>new</code> 对象，IOC 方式是容器帮你创建和管理。</p><p><strong>DI（依赖注入）：</strong>IOC 的具体实现方式，容器在运行时自动将依赖对象"注入"到组件中。包括构造器注入、Setter 注入、字段注入。</p><blockquote>IOC 本质是"好莱坞原则"——Don't call me, I'll call you。你的代码不再主动创建依赖，而是被动接收容器注入的依赖。</blockquote><h4>怎么用：三种注入方式对比</h4><pre>// ============ 传统方式（没有 IOC）============\npublic class OrderService {\n    private UserDao userDao = new UserDaoImpl(); // 硬编码，强耦合\n}\n\n// ============ 方式一：构造器注入（Spring 官方推荐）============\n@Service\npublic class OrderService {\n    private final UserDao userDao;\n\n    @Autowired  // 只有一个构造器时可省略\n    public OrderService(UserDao userDao) {\n        this.userDao = userDao;\n    }\n}\n// 优点：依赖不可变（final）、不会空指针、方便单元测试\n\n// ============ 方式二：Setter 注入 ============\n@Service\npublic class OrderService {\n    private UserDao userDao;\n\n    @Autowired\n    public void setUserDao(UserDao userDao) {\n        this.userDao = userDao;\n    }\n}\n// 优点：可选依赖，允许多次注入\n// 缺点：对象可能处于未完全初始化状态\n\n// ============ 方式三：字段注入（不推荐）============\n@Service\npublic class OrderService {\n    @Autowired\n    private UserDao userDao; // 反射注入，无法 final，无法在普通类中使用\n}\n\n// ============ XML 配置方式（老项目常见）============\n// &lt;bean id="userDao" class="com.example.UserDaoImpl"/&gt;\n// &lt;bean id="orderService" class="com.example.OrderService"&gt;\n//     &lt;constructor-arg ref="userDao"/&gt;\n// &lt;/bean&gt;</pre><h4>为什么：IOC 的底层原理</h4><ol><li><strong>读取配置：</strong>BeanDefinitionReader 读取 XML/注解配置，解析为 BeanDefinition（包含类名、作用域、依赖关系等）</li><li><strong>注册定义：</strong>BeanDefinition 注册到 BeanDefinitionRegistry（一个 Map）</li><li><strong>创建实例：</strong>BeanFactory 通过反射 <code>clazz.getDeclaredConstructor().newInstance()</code> 创建 Bean</li><li><strong>注入依赖：</strong>解析 BeanDefinition 中的依赖关系，从容器中取出依赖 Bean 注入</li><li><strong>初始化回调：</strong>执行 BeanPostProcessor、@PostConstruct、InitializingBean 等</li></ol><pre>// 简化版 IOC 容器原理伪代码\npublic class SimpleIoc {\n    private Map&lt;String, BeanDefinition&gt; beanDefMap = new HashMap&lt;&gt;();\n    private Map&lt;String, Object&gt; singletonBeans = new HashMap&lt;&gt;();\n\n    public void registerBean(String name, BeanDefinition def) {\n        beanDefMap.put(name, def);\n    }\n\n    public Object getBean(String name) {\n        if (singletonBeans.containsKey(name)) return singletonBeans.get(name);\n        BeanDefinition def = beanDefMap.get(name);\n        // 1. 反射创建实例\n        Object bean = def.getBeanClass().getDeclaredConstructor().newInstance();\n        // 2. 注入依赖（遍历字段，找 @Autowired）\n        for (Field field : bean.getClass().getDeclaredFields()) {\n            if (field.isAnnotationPresent(Autowired.class)) {\n                field.setAccessible(true);\n                field.set(bean, getBean(field.getType().getSimpleName())); // 递归获取依赖\n            }\n        }\n        singletonBeans.put(name, bean);\n        return bean;\n    }\n}</pre><h4>为什么 IOC 在实际项目中很重要</h4><ul><li><strong>解耦：</strong>Service 只依赖 DAO 接口，具体实现可以是 MyBatis 或 JPA，切换零改动</li><li><strong>可测试：</strong>单元测试时注入 Mock 对象，不依赖数据库</li><li><strong>统一管理：</strong>数据库连接池、线程池等重量级对象由容器管理单例，避免重复创建</li></ul><pre>// 实际场景：单元测试中用 Mock 替代真实 DAO\n@SpringBootTest\nclass OrderServiceTest {\n    @MockBean\n    private UserDao userDao; // 容器注入 Mock 对象\n\n    @Autowired\n    private OrderService orderService;\n\n    @Test\n    void testCreateOrder() {\n        when(userDao.findById(1L)).thenReturn(new User("测试用户"));\n        // 不需要真实数据库，就能测试业务逻辑\n    }\n}</pre><blockquote><strong>面试加分点：</strong>Spring 容器分两层——BeanFactory（基础，懒加载）和 ApplicationContext（增强，启动时预实例化单例 Bean、支持国际化/事件/AOP）。实际项目都用 ApplicationContext。</blockquote>`},
{q:"Spring Bean 的生命周期？",a:`<ol><li><strong>实例化：</strong>反射创建原始实例</li><li><strong>属性注入：</strong>DI 填充属性</li><li><strong>Aware 回调：</strong>BeanNameAware、BeanFactoryAware、ApplicationContextAware</li><li><strong>BeanPostProcessor 前置：</strong>postProcessBeforeInitialization（@PostConstruct 在此处理）</li><li><strong>初始化：</strong>afterPropertiesSet + initMethod</li><li><strong>BeanPostProcessor 后置：</strong>postProcessAfterInitialization（AOP 代理在此生成）</li><li><strong>使用</strong></li><li><strong>销毁：</strong>@PreDestroy → DisposableBean.destroy() → destroyMethod</li></ol><blockquote>重点记忆：BeanPostProcessor 后置处理阶段创建 AOP 代理。</blockquote>`},
{q:"三级缓存如何解决循环依赖？",a:`<table><tr><th>缓存</th><th>名称</th><th>内容</th></tr><tr><td>一级</td><td>singletonObjects</td><td>完全初始化好的 Bean</td></tr><tr><td>二级</td><td>earlySingletonObjects</td><td>早期暴露的 Bean</td></tr><tr><td>三级</td><td>singletonFactories</td><td>ObjectFactory 工厂</td></tr></table><h4>流程（A↔B 循环依赖）</h4><ol><li>实例化 A → A 的 Factory 入三级缓存 → 填充属性发现依赖 B</li><li>实例化 B → B 的 Factory 入三级缓存 → 填充属性发现依赖 A</li><li>从三级缓存取 A 的 Factory → getObject() 生成早期引用（如需 AOP 则返回代理）→ 入二级缓存</li><li>B 拿到 A 的早期引用 → B 完成 → 入一级缓存</li><li>A 拿到完整 B → A 完成 → 入一级缓存</li></ol><p><strong>为什么需要三级？</strong>延迟代理创建。没有 AOP 二级就够，有 AOP 需要三级缓存存 Factory。</p><p>构造器注入的循环依赖无法解决，可用 @Lazy。</p>`},
{q:"AOP 原理？JDK 动态代理 vs CGLIB？",a:`<h4>是什么：AOP 核心概念</h4><p><strong>AOP（面向切面编程）：</strong>将横切关注点（日志、事务、权限）从业务代码中分离，通过动态代理在运行时织入增强逻辑。</p><table><tr><th>术语</th><th>含义</th><th>类比</th></tr><tr><td>Aspect（切面）</td><td>横切逻辑的模块化封装</td><td>类似一个"拦截器类"</td></tr><tr><td>JoinPoint（连接点）</td><td>可被增强的方法</td><td>所有 public 方法</td></tr><tr><td>Pointcut（切点）</td><td>匹配哪些 JoinPoint</td><td>正则表达式匹配方法名</td></tr><tr><td>Advice（通知）</td><td>增强逻辑（前置/后置/环绕/异常/最终）</td><td>拦截器中的 before/after</td></tr><tr><td>Weaving（织入）</td><td>将切面应用到目标对象的过程</td><td>生成代理对象</td></tr></table><h4>怎么用：完整 @Aspect 代码示例</h4><pre>@Aspect\n@Component\npublic class LogAspect {\n\n    // 切点：匹配 service 包下所有 public 方法\n    @Pointcut("execution(* com.example.service.*.*(..))")\n    public void servicePointcut() {}\n\n    // 环绕通知（最常用，可控制是否执行目标方法）\n    @Around("servicePointcut()")\n    public Object around(ProceedingJoinPoint pjp) throws Throwable {\n        String method = pjp.getSignature().toShortString();\n        long start = System.currentTimeMillis();\n        log.info("[开始] {}", method);\n        try {\n            Object result = pjp.proceed(); // 执行目标方法\n            log.info("[结束] {} 耗时 {}ms", method, System.currentTimeMillis() - start);\n            return result;\n        } catch (Throwable t) {\n            log.error("[异常] {} 错误: {}", method, t.getMessage());\n            throw t;\n        }\n    }\n\n    // 前置通知\n    @Before("servicePointcut()")\n    public void before(JoinPoint jp) {\n        log.info("方法执行前: {}", jp.getSignature().getName());\n    }\n\n    // 后置返回通知\n    @AfterReturning(pointcut = "servicePointcut()", returning = "result")\n    public void afterReturning(JoinPoint jp, Object result) {\n        log.info("方法返回: {} -> {}", jp.getSignature().getName(), result);\n    }\n}</pre><h4>是什么：两种动态代理实现对比</h4><table><tr><th>对比项</th><th>JDK 动态代理</th><th>CGLIB</th></tr><tr><td>原理</td><td>基于接口，运行时生成代理类实现目标接口</td><td>基于继承，运行时生成目标类的子类</td></tr><tr><td>要求</td><td>目标类必须实现接口</td><td>目标类不能是 final</td></tr><tr><td>性能</td><td>生成快，执行略慢（反射调用）</td><td>生成慢，执行快（FastClass 直接调用）</td></tr><tr><td>依赖</td><td>JDK 内置</td><td>需要引入 cglib 或 spring-core（内含）</td></tr><tr><td>Spring 默认</td><td>Boot 2.x 之前</td><td>Boot 2.x 起默认</td></tr></table><h4>怎么用：JDK 动态代理完整代码</h4><pre>// 目标接口\npublic interface UserService {\n    User findById(Long id);\n    void save(User user);\n}\n\n// 目标实现\npublic class UserServiceImpl implements UserService {\n    public User findById(Long id) { return dao.findById(id); }\n    public void save(User user) { dao.save(user); }\n}\n\n// JDK 动态代理\npublic class JdkLogProxy implements InvocationHandler {\n    private Object target;\n\n    public JdkLogProxy(Object target) {\n        this.target = target;\n    }\n\n    @Override\n    public Object invoke(Object proxy, Method method, Object[] args) throws Throwable {\n        log.info("[JDK代理] 调用: {}", method.getName());\n        long start = System.currentTimeMillis();\n        Object result = method.invoke(target, args); // 反射调用目标方法\n        log.info("[JDK代理] 耗时: {}ms", System.currentTimeMillis() - start);\n        return result;\n    }\n\n    // 创建代理对象\n    public static Object createProxy(Object target) {\n        return Proxy.newProxyInstance(\n            target.getClass().getClassLoader(),\n            target.getClass().getInterfaces(),\n            new JdkLogProxy(target)\n        );\n    }\n}\n\n// 使用\nUserService proxy = (UserService) JdkLogProxy.createProxy(new UserServiceImpl());\nproxy.findById(1L); // 输出: [JDK代理] 调用: findById</pre><h4>怎么用：CGLIB 代理完整代码</h4><pre>// CGLIB 动态代理（不需要接口）\npublic class CglibLogInterceptor implements MethodInterceptor {\n    @Override\n    public Object intercept(Object obj, Method method, Object[] args,\n                            MethodProxy proxy) throws Throwable {\n        log.info("[CGLIB代理] 调用: {}", method.getName());\n        // proxy.invokeSuper() 调用父类（目标类）的方法\n        // 注意：不能用 proxy.invoke()，会死循环\n        return proxy.invokeSuper(obj, args);\n    }\n\n    public static Object createProxy(Class&lt;?&gt; targetClass) {\n        Enhancer enhancer = new Enhancer();\n        enhancer.setSuperclass(targetClass);       // 设置父类\n        enhancer.setCallback(new CglibLogInterceptor()); // 设置拦截器\n        return enhancer.create();                   // 生成子类代理\n    }\n}\n\n// 使用（无需接口）\nUserServiceImpl proxy = (UserServiceImpl) CglibLogInterceptor.createProxy(UserServiceImpl.class);\nproxy.findById(1L); // 输出: [CGLIB代理] 调用: findById</pre><h4>为什么：Spring 的 AOP 实现策略</h4><pre>// Spring Boot 2.x 起默认使用 CGLIB\n// 可通过配置强制指定\nspring.aop.proxy-target-class=true  // 强制 CGLIB（默认就是 true）\nspring.aop.proxy-target-class=false // 使用 JDK 代理（需目标有接口）\n\n// 也可以在注解上指定\n@EnableAspectJAutoProxy(proxyTargetClass = true)</pre><p><strong>Spring AOP 织入时机：</strong>在 Bean 生命周期的 BeanPostProcessor.postProcessAfterInitialization() 阶段，由 <code>AnnotationAwareAspectJAutoProxyCreator</code> 判断是否需要代理，如果需要则创建代理对象替换原始 Bean。</p><blockquote><strong>面试加分点：</strong>Spring AOP 只能拦截 Spring 管理的 Bean 的 public 方法，同类内方法调用（this.foo()）不走代理所以切面不生效。如需更强大的 AOP（如拦截 private 方法、构造器），可用 AspectJ 编译时/加载时织入。</blockquote>`},
{q:"@Transactional 失效场景？",a:`<ol><li><strong>方法非 public</strong></li><li><strong>同类内方法调用：</strong>this.B() 不走代理</li><li><strong>异常被 catch 吞掉</strong></li><li><strong>异常类型不匹配：</strong>默认只对 RuntimeException 和 Error 回滚</li><li><strong>数据库引擎不支持：</strong>MyISAM</li><li><strong>没配事务管理器</strong></li><li><strong>传播行为不当：</strong>NOT_SUPPORTED</li><li><strong>多数据源未指定管理器</strong></li></ol><p><strong>最佳实践：</strong><code>@Transactional(rollbackFor = Exception.class)</code></p>`},
{q:"事务传播机制？",a:`<h4>常用</h4><table><tr><th>传播行为</th><th>说明</th></tr><tr><td>REQUIRED（默认）</td><td>有事务加入，没有就创建</td></tr><tr><td>REQUIRES_NEW</td><td>总是创建新事务，挂起当前事务</td></tr><tr><td>NESTED</td><td>嵌套事务（Savepoint），回滚不影响外层</td></tr></table><h4>面试常考</h4><p>内层方法抛异常时：REQUIRED 整体回滚；REQUIRES_NEW 内层独立不影响外层；NESTED 回滚到 Savepoint，外层可继续。</p>`},
{q:"@Autowired 和 @Resource 区别？",a:`<h4>是什么：核心对比</h4><table><tr><th>对比项</th><th>@Autowired</th><th>@Resource</th></tr><tr><td>来源</td><td>Spring 框架（org.springframework）</td><td>JDK 标准（javax.annotation, JSR-250）</td></tr><tr><td>默认匹配方式</td><td>按类型（byType）</td><td>按名称（byName）</td></tr><tr><td>指定 Bean 名称</td><td>配合 @Qualifier("name")</td><td>直接 name="name" 属性</td></tr><tr><td>构造器注入</td><td>支持</td><td>不支持（只能字段/Setter）</td></tr><tr><td>required 属性</td><td>支持（required=false 允许为 null）</td><td>不支持</td></tr><tr><td>JDK 11+ 兼容</td><td>无问题</td><td>需额外引入 jakarta.annotation-api</td></tr></table><h4>怎么用：代码示例对比</h4><pre>// ========== @Autowired 按类型注入 ==========\n// 容器中如果有两个 UserService 实现，会报 NoUniqueBeanDefinitionException\n@Autowired\nprivate UserService userService;\n\n// 解决多实现：配合 @Qualifier 指定名称\n@Autowired\n@Qualifier("userServiceImpl")\nprivate UserService userService;\n\n// 构造器注入（推荐，Spring 官方推荐）\n@Service\npublic class OrderService {\n    private final UserService userService;\n    private final ProductService productService;\n\n    @Autowired  // 单构造器时可省略\n    public OrderService(UserService userService, ProductService productService) {\n        this.userService = userService;\n        this.productService = productService;\n    }\n}\n\n// ========== @Resource 按名称注入 ==========\n// 先按字段名 "userService" 找 Bean 名称，找不到再按类型找\n@Resource\nprivate UserService userService;\n\n// 显式指定名称\n@Resource(name = "userServiceImpl")\nprivate UserService userService;\n\n// ========== 两者都不行：@Inject（JSR-330）==========\n// 类似 @Autowired 但没有 required 属性\n// 需引入 javax.inject:javax.inject 依赖\n@Inject\nprivate UserService userService;</pre><h4>为什么：@Autowired 多实现冲突的解决方式</h4><pre>// 场景：UserService 有两个实现\n@Component("vipUserService")\npublic class VipUserService implements UserService { }\n\n@Component("normalUserService")\npublic class NormalUserService implements UserService { }\n\n// 方式一：@Qualifier 精确指定\n@Autowired\n@Qualifier("vipUserService")\nprivate UserService userService;\n\n// 方式二：@Primary 标记默认首选\n@Component\n@Primary  // 有多个候选时，优先注入这个\npublic class NormalUserService implements UserService { }\n\n// 方式三：变量名匹配（@Autowired byType 多个时会按变量名兜底）\n@Autowired\nprivate UserService vipUserService; // 变量名 = Bean 名，自动匹配\n\n// 方式四：@Resource 天然按名称\n@Resource\nprivate UserService vipUserService; // 直接按 "vipUserService" 名称匹配</pre><h4>怎么用：最佳实践总结</h4><ol><li><strong>首选构造器注入 + @Autowired：</strong>依赖不可变（final）、不会空指针、方便单测（可直接 new 传参）</li><li><strong>多实现时用 @Qualifier 或 @Primary：</strong>比 @Resource 按名称更灵活</li><li><strong>@Resource 适合简单场景：</strong>项目中 Bean 名称唯一且确定时，代码更简洁</li><li><strong>避免字段注入（@Autowired 在字段上）：</strong>无法使用 final、隐藏了依赖关系、不利于单元测试</li></ol><blockquote><strong>面试加分点：</strong>JDK 11 移除了 javax.annotation 模块（JSR-250），所以 Spring Boot 3.x / JDK 17+ 项目中 @Resource 需要额外引入 <code>jakarta.annotation-api</code> 依赖，否则会编译报错。这也是现在更推荐 @Autowired 的原因之一。</blockquote>`},
{q:"Spring Boot 自动配置原理？",a:`<h4>是什么：自动配置的核心思想</h4><p>引入一个 starter jar → Spring Boot 自动帮你创建相关 Bean（数据源、MVC 配置、安全配置等），无需手写大量 XML 或配置类。本质是 <strong>SPI 加载配置类 + @Conditional 条件过滤</strong>。</p><h4>怎么用：自动配置的启动流程（五步走）</h4><pre>// 第 1 步：@SpringBootApplication 是一个组合注解\n@SpringBootApplication\n// 等价于：\n// @SpringBootConfiguration  （就是 @Configuration）\n// @EnableAutoConfiguration  （开启自动配置）\n// @ComponentScan            （组件扫描）\n\n// 第 2 步：@EnableAutoConfiguration 通过 @Import 引入关键类\n@EnableAutoConfiguration\n// 内部有：@Import(AutoConfigurationImportSelector.class)\n\n// 第 3 步：AutoConfigurationImportSelector 加载所有配置类\n// 扫描所有 jar 下的 META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports\n// （Spring Boot 2.7 之前是 META-INF/spring.factories）\n// 文件中每行一个配置类的全限定名，例如：\n// org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration\n// org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration\n\n// 第 4 步：@Conditional 条件过滤\n// 每个配置类上有条件注解，只有条件满足才生效\n@Configuration\n@ConditionalOnClass(DataSource.class)           // classpath 有 DataSource 类\n@ConditionalOnMissingBean(DataSource.class)      // 容器中没有用户自定义的 DataSource\n@EnableConfigurationProperties(DataSourceProperties.class)\npublic class DataSourceAutoConfiguration {\n    @Bean\n    @ConditionalOnMissingBean\n    public DataSource dataSource(DataSourceProperties props) {\n        return DataSourceBuilder.create()\n            .url(props.getUrl())\n            .username(props.getUsername())\n            .password(props.getPassword())\n            .build();\n    }\n}\n\n// 第 5 步：生效的配置类注册 Bean 到容器\n// 你引入了 spring-boot-starter-jdbc → classpath 有 DataSource → 条件满足 → 自动创建 DataSource Bean</pre><h4>为什么：@Conditional 条件注解家族</h4><table><tr><th>注解</th><th>生效条件</th><th>典型用途</th></tr><tr><td><code>@ConditionalOnClass</code></td><td>classpath 存在指定类</td><td>有 MySQL 驱动才配 MySQL 数据源</td></tr><tr><td><code>@ConditionalOnMissingBean</code></td><td>容器不存在指定 Bean</td><td>用户没自定义就用默认实现</td></tr><tr><td><code>@ConditionalOnProperty</code></td><td>配置属性满足条件</td><td>spring.mail.host 存在才配邮件</td></tr><tr><td><code>@ConditionalOnBean</code></td><td>容器存在指定 Bean</td><td>有 DataSource 才配 JdbcTemplate</td></tr><tr><td><code>@ConditionalOnMissingClass</code></td><td>classpath 不存在指定类</td><td>没有 Reactive 框架才用 Servlet</td></tr></table><h4>怎么用：手写一个自定义自动配置类</h4><pre>// 1. 定义属性类\n@ConfigurationProperties(prefix = "my.sms")\npublic class SmsProperties {\n    private String apiKey;\n    private String signName = "默认签名";\n    // getter/setter...\n}\n\n// 2. 编写自动配置类\n@Configuration\n@ConditionalOnClass(SmsService.class)       // classpath 有 SmsService\n@ConditionalOnProperty(prefix = "my.sms", name = "enabled", havingValue = "true")\n@EnableConfigurationProperties(SmsProperties.class)\npublic class SmsAutoConfiguration {\n\n    @Bean\n    @ConditionalOnMissingBean\n    public SmsService smsService(SmsProperties props) {\n        return new SmsService(props.getApiKey(), props.getSignName());\n    }\n}\n\n// 3. 注册：在 META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports 文件中写入：\n// com.example.sms.SmsAutoConfiguration\n\n// 4. 使用方只需在 application.yml 配置：\n// my:\n//   sms:\n//     enabled: true\n//     api-key: your-key\n// 就能直接 @Autowired SmsService 了！</pre><blockquote><strong>面试加分点：</strong>可以提到 debug 方法——启动时加 <code>debug=true</code> 或 <code>--debug</code> 参数，控制台会打印 Conditions Evaluation Report，清晰展示哪些自动配置生效了、哪些没生效以及原因。这对排查"为什么某个 Bean 没有被创建"非常有用。</blockquote>`},
{q:"Spring Boot Starter 机制？",a:`<h4>是什么：Starter 的本质</h4><p><strong>Starter = 预定义依赖集合 + 自动配置类。</strong>引入一个 starter 的 Maven 坐标，就能自动引入所有相关依赖并完成配置，实现"开箱即用"。</p><pre>// 例如引入 Web Starter，会自动引入：\n// Tomcat、Spring MVC、Jackson、Hibernate Validator 等\n&lt;dependency&gt;\n    &lt;groupId&gt;org.springframework.boot&lt;/groupId&gt;\n    &lt;artifactId&gt;spring-boot-starter-web&lt;/artifactId&gt;\n&lt;/dependency&gt;</pre><h4>是什么：官方 Starter vs 第三方 vs 自定义</h4><table><tr><th>类型</th><th>命名规范</th><th>示例</th></tr><tr><td>官方 Starter</td><td>spring-boot-starter-xxx</td><td>spring-boot-starter-web、spring-boot-starter-data-jpa</td></tr><tr><td>第三方 Starter</td><td>xxx-spring-boot-starter</td><td>mybatis-spring-boot-starter、druid-spring-boot-starter</td></tr><tr><td>自定义 Starter</td><td>公司内部命名</td><td>company-sms-spring-boot-starter</td></tr></table><h4>怎么用：手写自定义 Starter 完整步骤</h4><pre>// ============ 项目结构 ============\n// company-sms-spring-boot-starter/         (starter 模块，只做依赖聚合)\n//   └── pom.xml                            (依赖 company-sms-spring-boot-autoconfigure)\n// company-sms-spring-boot-autoconfigure/   (autoconfigure 模块，核心逻辑)\n//   ├── src/main/java/\n//   │   └── com/company/sms/\n//   │       ├── SmsAutoConfiguration.java\n//   │       ├── SmsProperties.java\n//   │       └── SmsService.java\n//   └── src/main/resources/\n//       └── META-INF/spring/\n//           └── org.springframework.boot.autoconfigure.AutoConfiguration.imports\n\n// ============ 第 1 步：编写核心服务类 ============\npublic class SmsService {\n    private String apiKey;\n    private String signName;\n\n    public SmsService(String apiKey, String signName) {\n        this.apiKey = apiKey;\n        this.signName = signName;\n    }\n\n    public boolean send(String phone, String content) {\n        // 调用短信 API 发送\n        System.out.println("发送短信到 " + phone + ": " + signName + content);\n        return true;\n    }\n}\n\n// ============ 第 2 步：编写配置属性类 ============\n@ConfigurationProperties(prefix = "company.sms")\npublic class SmsProperties {\n    private boolean enabled = true;\n    private String apiKey;\n    private String signName = "默认签名";\n    // getter/setter 省略\n}\n\n// ============ 第 3 步：编写自动配置类 ============\n@Configuration\n@ConditionalOnClass(SmsService.class)\n@ConditionalOnProperty(prefix = "company.sms", name = "enabled",\n                       havingValue = "true", matchIfMissing = true)\n@EnableConfigurationProperties(SmsProperties.class)\npublic class SmsAutoConfiguration {\n\n    @Bean\n    @ConditionalOnMissingBean\n    public SmsService smsService(SmsProperties props) {\n        return new SmsService(props.getApiKey(), props.getSignName());\n    }\n}\n\n// ============ 第 4 步：注册自动配置 ============\n// 创建文件：\n// src/main/resources/META-INF/spring/\n//   org.springframework.boot.autoconfigure.AutoConfiguration.imports\n// 内容：\n// com.company.sms.SmsAutoConfiguration\n\n// ============ 第 5 步：Starter 模块的 pom.xml ============\n// &lt;dependencies&gt;\n//     &lt;dependency&gt;\n//         &lt;groupId&gt;com.company&lt;/groupId&gt;\n//         &lt;artifactId&gt;company-sms-spring-boot-autoconfigure&lt;/artifactId&gt;\n//         &lt;version&gt;1.0.0&lt;/version&gt;\n//     &lt;/dependency&gt;\n// &lt;/dependencies&gt;\n\n// ============ 第 6 步：使用方只需 ============\n// pom.xml 引入：\n// &lt;dependency&gt;\n//     &lt;groupId&gt;com.company&lt;/groupId&gt;\n//     &lt;artifactId&gt;company-sms-spring-boot-starter&lt;/artifactId&gt;\n//     &lt;version&gt;1.0.0&lt;/version&gt;\n// &lt;/dependency&gt;\n//\n// application.yml 配置：\n// company:\n//   sms:\n//     api-key: your-key\n//     sign-name: 公司名\n//\n// 代码中直接使用：\n// @Autowired\n// private SmsService smsService;</pre><h4>为什么：Starter 分为两个模块的原因</h4><ul><li><strong>autoconfigure 模块：</strong>包含自动配置逻辑和核心代码，是真正干活的</li><li><strong>starter 模块：</strong>只是一个空壳，负责聚合依赖。使用方引入 starter 就自动引入 autoconfigure + 所有传递依赖</li><li><strong>好处：</strong>高级用户可以跳过 starter，只引入 autoconfigure，手动排除不需要的传递依赖</li></ul><blockquote><strong>面试加分点：</strong>Spring Boot 2.7 之前用 <code>META-INF/spring.factories</code> 文件注册自动配置类（key 是 EnableAutoConfiguration），2.7 起改用 <code>AutoConfiguration.imports</code> 文件。两种格式在 2.7 都兼容，但 3.0 起只支持新格式。</blockquote>`},
{q:"Spring Boot 启动流程？",a:`<ol><li>创建 SpringApplication 对象：推断应用类型、加载 Initializer 和 Listener</li><li>执行 run()：启动 StopWatch → 获取 RunListeners → 准备 Environment</li><li>创建 ApplicationContext → 准备上下文 → <strong>refresh</strong>（核心：Bean 扫描/注册/实例化）</li><li>启动内嵌 Web 服务器</li><li>执行 ApplicationRunner / CommandLineRunner</li></ol><blockquote>整个过程大量使用事件机制（Observer 模式），扩展性强。</blockquote>`},
{q:"@Conditional 条件注解系列？",a:`<table><tr><th>注解</th><th>生效条件</th></tr><tr><td>@ConditionalOnClass</td><td>classpath 存在指定类</td></tr><tr><td>@ConditionalOnMissingBean</td><td>容器不存在指定 Bean</td></tr><tr><td>@ConditionalOnProperty</td><td>配置属性满足条件</td></tr><tr><td>@ConditionalOnBean</td><td>容器存在指定 Bean</td></tr></table><p><code>@ConditionalOnMissingBean</code> 是自动配置关键：框架提供默认 Bean，开发者自定义后自动配置不生效。</p>`},
{q:"配置文件加载优先级？",a:`<h4>是什么：完整优先级顺序</h4><p><strong>从高到低（高优先级覆盖低优先级）：</strong></p><ol><li><strong>命令行参数：</strong><code>--server.port=9090</code></li><li><strong>Java 系统属性：</strong><code>-Dserver.port=9090</code></li><li><strong>操作系统环境变量：</strong><code>SERVER_PORT=9090</code></li><li>jar 包<strong>外</strong> application-{profile}.yml（如 application-dev.yml）</li><li>jar 包<strong>内</strong> application-{profile}.yml</li><li>jar 包<strong>外</strong> application.yml</li><li>jar 包<strong>内</strong> application.yml</li><li><code>@PropertySource</code> 注解引入的配置</li><li>SpringApplication.setDefaultProperties() 设置的默认值</li></ol><p><strong>简化记忆：</strong>命令行 &gt; 系统属性 &gt; 环境变量 &gt; 外部 profile &gt; 内部 profile &gt; 外部通用 &gt; 内部通用 &gt; 默认配置</p><h4>怎么用：实际场景中的配置覆盖</h4><pre># ===== 场景一：不同环境切换（Profile 机制）=====\n# application.yml（通用配置，最低优先级）\nserver:\n  port: 8080\nspring:\n  profiles:\n    active: dev   # 激活 dev 配置\n\n# application-dev.yml（开发环境，覆盖通用配置）\nserver:\n  port: 8081\nspring:\n  datasource:\n    url: jdbc:mysql://localhost:3306/dev_db\n\n# application-prod.yml（生产环境）\nserver:\n  port: 80\nspring:\n  datasource:\n    url: jdbc:mysql://prod-server:3306/prod_db\n\n# 启动时指定 profile（覆盖 yml 中的 active 配置）\njava -jar app.jar --spring.profiles.active=prod\n\n# ===== 场景二：Docker/K8s 中用环境变量覆盖 =====\n# 环境变量命名规则：大写 + 下划线代替点号\nSERVER_PORT=9090\nSPRING_DATASOURCE_URL=jdbc:mysql://db:3306/mydb\nSPRING_REDIS_HOST=redis-server\n\n# Docker 启动\ndocker run -e SERVER_PORT=9090 -e SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/mydb myapp\n\n# ===== 场景三：命令行参数临时覆盖 =====\n# CI/CD 中常用\njava -jar app.jar --server.port=9090 --spring.datasource.url=jdbc:mysql://ci-db:3306/test\n\n# ===== 场景四：多配置文件位置（jar 外优先于 jar 内）=====\n# 文件查找顺序：\n# 1. file:./config/         （jar 同级目录的 config 子目录）\n# 2. file:./                （jar 同级目录）\n# 3. classpath:/config/     （jar 内的 config 目录）\n# 4. classpath:/            （jar 内的根目录）</pre><h4>为什么：常见踩坑场景</h4><table><tr><th>问题</th><th>原因</th><th>解决方案</th></tr><tr><td>改了 application.yml 不生效</td><td>环境变量或命令行参数覆盖了</td><td>用 <code>/actuator/env</code> 查看实际生效值</td></tr><tr><td>@PropertySource 无法覆盖 yml</td><td>@PropertySource 优先级最低</td><td>改用 spring.config.import 或环境变量</td></tr><tr><td>多 yml 文件冲突</td><td>不清楚 jar 外文件优先于 jar 内</td><td>统一用 spring.config.location 指定</td></tr><tr><td>Profile 配置不生效</td><td>active profile 被命令行覆盖</td><td>检查启动参数和环境变量</td></tr><tr><td>application.yml 和 application.properties 同时存在</td><td>properties 优先级高于 yml</td><td>只保留一种格式，避免混乱</td></tr></table><h4>怎么用：配置调试技巧</h4><pre># 1. 查看实际生效的配置（需引入 actuator）\n# GET http://localhost:8080/actuator/env\n# 返回所有 PropertySource 及其值，一目了然\n\n# 2. 启动时打印配置加载过程\njava -jar app.jar --debug\n# 会输出 Conditions Evaluation Report，包含配置加载顺序\n\n# 3. 指定额外配置文件（Spring Boot 2.4+）\nspring.config.import=classpath:db-config.yml,optional:file:./override.yml\n# optional: 表示文件不存在也不报错\n\n# 4. 指定配置文件位置（覆盖默认搜索路径）\njava -jar app.jar --spring.config.location=file:/opt/config/application.yml</pre><blockquote><strong>面试加分点：</strong>Spring Boot 2.4 对配置文件加载机制做了重大重构——移除了 Environment Post Processor 的多文档加载，改用 <code>spring.config.import</code> 来引入额外配置。如果你在维护老项目（2.4 之前），需要注意 <code>spring.profiles</code> 和 <code>spring.config.activate.on-profile</code> 的区别。</blockquote>`},
{q:"微服务架构核心组件？",a:`<table><tr><th>组件</th><th>作用</th><th>技术</th></tr><tr><td>服务注册发现</td><td>服务自动注册和寻址</td><td>Nacos、Eureka</td></tr><tr><td>负载均衡</td><td>分配请求</td><td>Spring Cloud LoadBalancer</td></tr><tr><td>服务调用</td><td>声明式 HTTP 客户端</td><td>OpenFeign</td></tr><tr><td>API 网关</td><td>统一入口、路由、鉴权</td><td>Spring Cloud Gateway</td></tr><tr><td>熔断降级</td><td>防雪崩</td><td>Sentinel</td></tr><tr><td>配置中心</td><td>集中管理配置</td><td>Nacos Config</td></tr><tr><td>链路追踪</td><td>跨服务调用追踪</td><td>Sleuth+Zipkin、SkyWalking</td></tr><tr><td>分布式事务</td><td>跨服务数据一致</td><td>Seata</td></tr></table>`},
{q:"Nacos/Eureka 注册发现原理？",a:`<p><strong>Eureka（AP，已停更）：</strong>Server 集群 P2P 同步。客户端 30s 心跳，90s 未收到剔除。自我保护机制。</p><p><strong>Nacos（AP+CP）：</strong>Raft 协议。临时实例用 AP（心跳），永久实例用 CP（健康检查）。集成配置中心，社区活跃。</p><p><strong>核心区别：</strong>Nacos 同时支持 AP/CP，功能更全（注册中心+配置中心二合一）。</p>`},
{q:"Feign 原理和超时处理？",a:`<p><strong>原理：</strong>声明式 HTTP 客户端，JDK 动态代理，集成负载均衡。</p><h4>超时配置</h4><pre>feign:\n  client:\n    config:\n      default:\n        connectTimeout: 5000\n        readTimeout: 10000\n      order-service:\n        connectTimeout: 3000\n        readTimeout: 5000</pre><p>替换底层 HTTP 客户端为 OkHttp 启用连接池。配合 Sentinel 做超时降级。</p>`},
{q:"Gateway 过滤器链？",a:`<p><strong>核心概念：</strong>Route（路由）+ Predicate（断言匹配）+ Filter（过滤器处理）</p><h4>过滤器链流程</h4><pre>请求 → GatewayFilter(Pre) → 路由到目标 → GatewayFilter(Post) → 响应</pre><p>GatewayFilter 作用于单个路由，GlobalFilter 作用于所有路由。getOrder() 决定优先级。</p><blockquote>Gateway 基于 WebFlux（Netty+Reactor），异步非阻塞，性能优于 Zuul 1.x。</blockquote>`},
{q:"Hystrix vs Sentinel？",a:`<table><tr><th>对比</th><th>Hystrix</th><th>Sentinel</th></tr><tr><td>隔离</td><td>线程池隔离</td><td>信号量隔离</td></tr><tr><td>熔断</td><td>异常比率</td><td>异常比率/数/慢调用</td></tr><tr><td>限流</td><td>简单</td><td>QPS/线程数/热点参数</td></tr><tr><td>控制台</td><td>简单</td><td>功能丰富</td></tr><tr><td>维护</td><td>已停更</td><td>活跃（阿里）</td></tr></table><p>新项目推荐 Sentinel。熔断三态：关闭→打开→半开。</p>`},
{q:"分布式配置中心的作用？",a:`<p>解决：配置分散、环境管理、动态修改实时生效、版本管理。</p><table><tr><th>对比</th><th>Nacos Config</th><th>Apollo</th><th>Spring Cloud Config</th></tr><tr><td>推送</td><td>长轮询</td><td>长轮询</td><td>需配合 Bus</td></tr><tr><td>灰度</td><td>支持</td><td>支持</td><td>不支持</td></tr></table><p>使用 <code>@RefreshScope</code> 标注需要动态刷新的 Bean。</p>`},
{q:"分布式链路追踪原理？",a:`<p><strong>核心概念：</strong>TraceId（链路唯一标识）+ SpanId（调用唯一标识）+ ParentSpanId</p><p><strong>Sleuth：</strong>客户端 SDK，生成/传递追踪信息，上报 Zipkin。</p><p><strong>Zipkin：</strong>服务端，存储+展示+Web UI。</p><blockquote>Sleuth 已被 Micrometer Tracing 取代。新项目推荐 SkyWalking（国产，功能全面）。</blockquote>`},
{q:"微服务同步 vs 异步通信？",a:`<p><strong>同步：</strong>Feign（声明式）、gRPC（HTTP/2+Protobuf）、Dubbo</p><p><strong>异步：</strong>消息队列（RocketMQ/Kafka）、Spring Cloud Stream</p><table><tr><th>对比</th><th>同步</th><th>异步</th></tr><tr><td>实时性</td><td>实时</td><td>最终一致</td></tr><tr><td>耦合度</td><td>高</td><td>完全解耦</td></tr><tr><td>容错</td><td>调用失败</td><td>消息持久化可重试</td></tr><tr><td>场景</td><td>查询</td><td>通知、日志、削峰</td></tr></table>`}
]},
{id:"mysql",icon:"🗄️",title:"MySQL",desc:"索引 · 事务 · SQL优化 · 锁 · 日志 — 共31题",cards:[
{q:"B+树结构？为什么 MySQL 用 B+树做索引？",a:`<h4>B+树特点</h4><ul><li>数据都在叶子节点，非叶子只存索引</li><li>叶子节点双向链表连接</li><li>3-4 层存千万级数据</li><li>所有叶子同层，查询稳定</li></ul><h4>为什么不用其他结构</h4><ul><li><strong>vs B树：</strong>B树非叶子也存数据，树更高，IO 多。B+树叶子有链表，范围查询快</li><li><strong>vs 哈希：</strong>不支持范围查询、排序</li><li><strong>vs 红黑树：</strong>二叉树层数太高</li></ul><blockquote>16KB 页，bigint 主键，3层可存 2000 万+数据，只需 3 次磁盘 IO。</blockquote>`},
{q:"聚簇索引和非聚簇索引？",a:`<p><strong>聚簇索引：</strong>叶子存完整数据行。一张表只有一个。通常是主键。数据物理存储按聚簇索引排序。</p><p><strong>非聚簇索引（二级索引）：</strong>叶子存索引列值+主键值。查完整数据需要<strong>回表</strong>。</p><blockquote>回表代价高时，优化器可能放弃二级索引走全表扫描。这就是有时建了索引却不走的原因。</blockquote>`},
{q:"覆盖索引？",a:`<h4>是什么</h4><p>查询所需的所有列都能从<strong>二级索引</strong>直接获取，不需回表查聚簇索引。EXPLAIN 中 Extra 列显示 <code>Using index</code>。</p><h4>怎么用 — SQL 示例</h4><pre>-- 表结构：user(id PK, name, age, email, status)
-- 联合索引：idx_name_age(name, age)

-- 回表查询（Extra 无 Using index）
SELECT * FROM user WHERE name = '张三';
-- 二级索引只存 name + id，要查完整行需回聚簇索引

-- 覆盖索引（Extra: Using index）
SELECT id, name, age FROM user WHERE name = '张三';
-- 所需列 id, name, age 全在 idx_name_age 中

-- 覆盖索引 + 范围
SELECT name, age FROM user WHERE name LIKE '张%' AND age > 20;

-- 覆盖索引用于 COUNT
SELECT COUNT(*) FROM user WHERE name = '张三';
-- 直接扫描 idx_name_age，无需回表

-- 覆盖索引用于 ORDER BY
SELECT id, name, age FROM user WHERE name = '张三' ORDER BY age;
-- 排序字段也在索引中，避免 filesort</pre><h4>EXPLAIN 输出对比</h4><table><tr><th>SQL</th><th>type</th><th>key</th><th>Extra</th><th>说明</th></tr><tr><td>SELECT * FROM user WHERE name='张三'</td><td>ref</td><td>idx_name_age</td><td>—</td><td>需要回表</td></tr><tr><td>SELECT id,name,age FROM user WHERE name='张三'</td><td>ref</td><td>idx_name_age</td><td><strong>Using index</strong></td><td>覆盖索引命中</td></tr><tr><td>SELECT name FROM user WHERE name LIKE '张%'</td><td>range</td><td>idx_name_age</td><td><strong>Using where; Using index</strong></td><td>范围 + 覆盖</td></tr></table><h4>为什么有效</h4><ul><li>二级索引叶子节点存储：<strong>索引列值 + 主键值</strong>。如果 SELECT 的列全在索引中，就不需要拿主键回聚簇索引查完整行</li><li>减少随机 IO：回表是随机读聚簇索引，覆盖索引是顺序扫描二级索引</li><li>二级索引比聚簇索引小得多，扫描更快，内存缓存命中率更高</li></ul><h4>何时使用</h4><ul><li>频繁查询的字段组合建联合索引，让查询直接走覆盖索引</li><li>将 SELECT * 改为只查需要的字段</li><li>COUNT 统计场景，选最小的二级索引扫描</li><li>排序/分组字段也尽量包含在索引中</li></ul><blockquote>面试加分：提到"覆盖索引的本质是用索引叶子节点的数据代替聚簇索引的完整行数据"，并结合 EXPLAIN 的 Using index 来说明验证方式。</blockquote>`},
{q:"索引失效场景？",a:`<ol><li>对索引列使用函数/运算</li><li>隐式类型转换（varchar 传数字）</li><li>LIKE '%开头'</li><li>OR 条件部分列无索引</li><li>联合索引不满足最左前缀</li><li>!= / &lt;&gt; 可能失效</li><li>字符集不匹配</li></ol><blockquote>索引是否失效由优化器根据成本决定。用 EXPLAIN 验证。</blockquote>`},
{q:"最左前缀原则？",a:`<p>联合索引 (a,b,c)：查询条件必须从最左列连续匹配。</p><table><tr><th>查询</th><th>走索引</th><th>使用列</th></tr><tr><td>a=1</td><td>是</td><td>a</td></tr><tr><td>a=1 AND b=2</td><td>是</td><td>a,b</td></tr><tr><td>a=1 AND b=2 AND c=3</td><td>是</td><td>a,b,c</td></tr><tr><td>b=2</td><td>否</td><td>-</td></tr><tr><td>a=1 AND c=3</td><td>是</td><td>a（ICP 优化）</td></tr></table><p><strong>范围查询：</strong>遇到 &gt;、&lt;、BETWEEN 后，右边列就用不了索引了。</p>`},
{q:"如何选择索引？",a:`<ol><li>选择性高的列优先</li><li>查询/排序/分组列建索引</li><li>联合索引优先于多个单列索引</li><li>利用覆盖索引避免回表</li><li>单表索引不超 6 个</li><li>字符串用前缀索引</li><li>避免冗余索引</li></ol>`},
{q:"普通索引 vs 唯一索引？",a:`<h4>是什么</h4><ul><li><strong>普通索引（INDEX）：</strong>允许重复值，叶子节点按索引值排序后通过二分查找定位，查到第一条即返回（LIMIT 1）</li><li><strong>唯一索引（UNIQUE）：</strong>约束+索引，值不允许重复，查到第一条即可停止（引擎保证唯一性）</li></ul><h4>查询性能对比</h4><pre>-- 表结构：user(id PK, name UNIQUE INDEX, phone INDEX)
-- 数据量：100万行

-- 唯一索引查询：找到一条就停
SELECT * FROM user WHERE name = '张三';
-- 时间：约 0.5ms，只需一次索引查找

-- 普通索引查询：找到后还需继续向后扫描确认无重复
SELECT * FROM user WHERE phone = '13800138000';
-- 时间：约 0.5ms（等值查询差异极小）

-- 压测结果（sysbench 100万行，单条查询）
-- 唯一索引：QPS ≈ 85,000
-- 普通索引：QPS ≈ 83,000（差距 &lt; 3%）</pre><p><strong>结论：</strong>查询性能差距极小，因为两者都是 B+ 树等值匹配，只是普通索引需多判断一条记录。</p><h4>写入性能 — Change Buffer 是关键</h4><pre>Change Buffer（写缓冲区）：
├── 适用条件：非唯一二级索引 + 目标页不在 Buffer Pool 中
├── 原理：将 INSERT/UPDATE/DELETE 操作缓存在 Change Buffer 中
│   不立即写磁盘，等页面被读入内存时再合并
├── 唯一索引不用 Change Buffer：因为必须先验证唯一性（需要读原始页）
└── 大小：innodb_change_buffer_max_size = 25（默认占 Buffer Pool 25%）

写入流程对比：
普通索引 UPDATE：
  目标页在内存 → 直接更新
  目标页不在内存 → 写 Change Buffer（无磁盘随机IO）

唯一索引 UPDATE：
  目标页在内存 → 检查唯一性后直接更新
  目标页不在内存 → 必须先读页验证唯一性（产生随机IO）</pre><table><tr><th>维度</th><th>普通索引</th><th>唯一索引</th></tr><tr><td>查询性能</td><td>略差（继续扫一条）</td><td>略好（命中即停）</td></tr><tr><td>写入性能</td><td><strong>更好（可用 Change Buffer）</strong></td><td>较差（必须验证唯一性）</td></tr><tr><td>约束</td><td>无</td><td>强制唯一</td></tr><tr><td>NULL 值</td><td>允许多个 NULL</td><td>允许多个 NULL（MySQL中）</td></tr><tr><td>INSERT 性能差距</td><td colspan="2">写多读少场景，普通索引快 10%-30%</td></tr></table><h4>为什么唯一索引不能用 Change Buffer</h4><p>Change Buffer 的前提是"延迟写磁盘"。但唯一索引必须先<strong>读取目标页验证唯一性</strong>，这就意味着目标页已被加载到 Buffer Pool，不再满足"页不在内存"的条件，因此直接更新页，无法利用 Change Buffer 缓冲。</p><h4>决策流程</h4><ul><li>业务要求字段唯一（用户名、手机号、邮箱）→ 用<strong>唯一索引</strong>（约束+索引双重保障）</li><li>业务无唯一要求，只是加速查询 → 用<strong>普通索引</strong></li><li>写多读少场景（日志表）→ 优先普通索引（Change Buffer 收益大）</li><li>读多写少场景 → 两者差异可忽略，按业务需要选</li></ul><blockquote>面试要点：不要只说"唯一索引更慢"，要具体说明是 Change Buffer 机制导致的写入差异，并强调查询性能差异其实极小。</blockquote>`},
{q:"事务 ACID 各靠什么机制保证？",a:`<ul><li><strong>A 原子性：</strong>undo log</li><li><strong>C 一致性：</strong>ACD 共同保证 + 业务正确性</li><li><strong>I 隔离性：</strong>锁 + MVCC</li><li><strong>D 持久性：</strong>redo log (WAL)</li></ul><blockquote>一致性是目的，ACD 是手段。</blockquote>`},
{q:"事务隔离级别？",a:`<table><tr><th>级别</th><th>脏读</th><th>不可重复读</th><th>幻读</th></tr><tr><td>读未提交</td><td>可能</td><td>可能</td><td>可能</td></tr><tr><td>读已提交</td><td>解决</td><td>可能</td><td>可能</td></tr><tr><td>可重复读</td><td>解决</td><td>解决</td><td>InnoDB 基本解决</td></tr><tr><td>串行化</td><td>解决</td><td>解决</td><td>解决</td></tr></table><p>InnoDB 默认 RR。RR 下 MVCC 解决不可重复读，间隙锁防幻读。</p>`},
{q:"MVCC 实现原理？",a:`<h4>核心组件</h4><ul><li><strong>隐藏列：</strong>DB_TRX_ID（事务ID）+ DB_ROLL_PTR（回滚指针）</li><li><strong>undo log 版本链：</strong>新旧版本串联，头部最新</li><li><strong>Read View：</strong>m_ids（活跃事务）、min_trx_id、max_trx_id、creator_trx_id</li></ul><h4>可见性判断</h4><ul><li>trx_id &lt; min → 已提交，可见</li><li>trx_id &gt;= max → 未来事务，不可见</li><li>min ≤ trx_id &lt; max → 在 m_ids 中不可见，否则可见</li></ul><p><strong>RC vs RR：</strong>RC 每次 SELECT 重新生成 Read View；RR 只第一次生成后复用。</p>`},
{q:"当前读 vs 快照读？",a:`<p><strong>快照读：</strong>普通 SELECT，读 MVCC 历史版本，不加锁。</p><p><strong>当前读：</strong>SELECT FOR UPDATE / INSERT / UPDATE / DELETE，读最新版本并加锁。</p><blockquote>RR 下快照读能解决幻读（始终读同一快照），当前读需靠间隙锁。</blockquote>`},
{q:"间隙锁和临键锁？",a:`<p><strong>Record Lock：</strong>锁单行。</p><p><strong>Gap Lock：</strong>锁间隙，防插入。间隙锁不互斥。</p><p><strong>Next-Key Lock：</strong>Record + Gap，左开右闭 (a, b]。RR 默认。</p><p>唯一索引等值查询退化为 Record Lock。RC 级别下无间隙锁。</p>`},
{q:"EXPLAIN 各字段含义？",a:`<table><tr><th>字段</th><th>关注点</th></tr><tr><td>type</td><td>system &gt; const &gt; eq_ref &gt; ref &gt; range &gt; index &gt; <strong style="color:red">ALL</strong></td></tr><tr><td>key</td><td>NULL 说明没走索引</td></tr><tr><td>rows</td><td>预估扫描行数，越小越好</td></tr><tr><td>Extra</td><td>Using index(覆盖索引) / Using filesort(需优化) / Using temporary(需优化)</td></tr></table><p><strong>key_len 计算：</strong>varchar(50) utf8mb4 → 50×4+2+1 = 203</p>`},
{q:"深分页问题及解决方案？",a:`<pre>SELECT * FROM orders ORDER BY id LIMIT 10000000, 10;\n-- 实际扫描 10000010 条</pre><h4>解决方案</h4><ol><li><strong>延迟关联：</strong>子查询只查 id（覆盖索引），再 JOIN 取完整数据</li><li><strong>游标分页（推荐）：</strong><code>WHERE id &gt; #{lastMaxId} LIMIT 10</code></li><li><strong>限制最大页数</strong></li><li><strong>使用 ES</strong></li></ol>`},
{q:"redo log、undo log、binlog 各自作用？",a:`<table><tr><th>日志</th><th>作用</th><th>特点</th></tr><tr><td>redo log</td><td>持久性（crash-safe）</td><td>InnoDB 特有，物理日志，循环写</td></tr><tr><td>undo log</td><td>原子性 + MVCC</td><td>逻辑日志，记录修改前旧值</td></tr><tr><td>binlog</td><td>备份 + 主从复制</td><td>Server 层，逻辑操作，追加写</td></tr></table><h4>两阶段提交</h4><p>Prepare(redo) → 写 binlog → Commit(redo)。保证 redo 和 binlog 一致。</p>`},
{q:"WAL 机制？刷盘策略？",a:`<p><strong>WAL（预写日志）：</strong>先写 redo log 到磁盘，数据页修改在内存中，后续异步刷盘。</p><p><strong>优势：</strong>顺序写代替随机写，减少 IO，保证 crash-safe。</p><table><tr><th>flush 值</th><th>行为</th><th>安全</th></tr><tr><td>0</td><td>每秒刷一次</td><td>最多丢 1 秒</td></tr><tr><td>1（默认）</td><td>每次提交 fsync</td><td>不丢数据</td></tr><tr><td>2</td><td>每次写 OS cache，每秒 fsync</td><td>OS 宕机可能丢</td></tr></table>`},
{q:"主从复制原理？延迟解决？",a:`<ol><li>主库写 binlog → Binlog Dump 线程发送</li><li>从库 IO 线程接收 → 写 relay log</li><li>从库 SQL 线程重放 relay log</li></ol><h4>延迟解决</h4><ul><li>并行复制（多线程重放）</li><li>控制大事务</li><li>从库硬件升级</li></ul>`},
{q:"Buffer Pool 的 LRU 策略？",a:`<p>改良 LRU：分 New 区(5/8) + Old 区(3/8)。新页先进 Old 区，存活 &gt; 1s 再被访问才晋升 New 区。</p><p><strong>目的：</strong>防止全表扫描刷掉热数据。</p><p>配置建议：innodb_buffer_pool_size = 物理内存 60%-75%。</p>`}
]},
{id:"redis",icon:"⚡",title:"Redis",desc:"数据结构 · 持久化 · 高可用 · 缓存问题 — 共33题",cards:[
{q:"五种基本数据类型及使用场景？",a:`<h4>总览</h4><table><tr><th>类型</th><th>底层结构</th><th>时间复杂度</th><th>核心场景</th></tr><tr><td>String</td><td>SDS（简单动态字符串）</td><td>O(1) GET/SET</td><td>缓存、计数器、分布式锁、Session</td></tr><tr><td>Hash</td><td>ziplist→hashtable（Redis 7: listpack）</td><td>O(1) HGET/HSET</td><td>对象存储、字段级读写、购物车</td></tr><tr><td>List</td><td>quicklist（双向链表+压缩列表）</td><td>O(1) LPUSH/RPOP</td><td>消息队列、最新动态、文章列表</td></tr><tr><td>Set</td><td>intset→hashtable</td><td>O(1) SADD/SREM</td><td>标签、共同好友、去重、抽奖</td></tr><tr><td>ZSet</td><td>ziplist→skiplist+hashtable</td><td>O(logN) ZADD</td><td>排行榜、延迟队列、限流</td></tr></table><h4>1. String — 命令与实战</h4><pre># 缓存用户信息（JSON序列化）
SET user:1001 '{"name":"张三","age":28}' EX 3600
GET user:1001

# 分布式计数器（文章阅读量）
INCR article:1001:views        # +1
INCRBY article:1001:views 10  # +N
GET article:1001:views

# 分布式锁
SET order:lock:12345 unique_val NX PX 30000
# 释放锁（Lua保证原子性）
EVAL "if redis.call('get',KEYS[1])==ARGV[1] then return redis.call('del',KEYS[1]) else return 0 end" 1 order:lock:12345 unique_val

# Session 共享
SET session:abc123 '{"uid":1001}' EX 1800</pre><p><strong>真实场景：</strong>电商首页商品缓存，key=goods:{skuId}，value=JSON，TTL随机偏移防雪崩。</p><h4>2. Hash — 命令与实战</h4><pre># 存储用户对象（字段级读写，避免序列化整对象）
HSET user:1001 name "张三"
HSET user:1001 age 28
HSET user:1001 city "上海"
HGET user:1001 name         # 只取一个字段
HMGET user:1001 name age    # 取多个字段
HGETALL user:1001           # 取全部字段
HINCRBY user:1001 login_count 1

# 购物车
HSET cart:1001 goods:5001 '{"name":"iPhone","count":1}'
HSET cart:1001 goods:5002 '{"name":"AirPods","count":2}'
HGETALL cart:1001            # 查看购物车
HDEL cart:1001 goods:5001    # 删除商品</pre><p><strong>真实场景：</strong>用户中心用 Hash 存储，修改单个字段无需全量序列化，节省带宽和 CPU。</p><h4>3. List — 命令与实战</h4><pre># 简单消息队列（生产者-消费者）
LPUSH order:queue '{"orderId":1001,"action":"pay"}'
RPOP order:queue               # 消费一条
BRPOP order:queue 30           # 阻塞消费（超时30秒）

# 最新文章列表（保留最新100条）
LPUSH news:latest '{"title":"Redis 7.0..."}'
LTRIM news:latest 0 99         # 只保留前100条
LRANGE news:latest 0 9         # 取前10条

# 用户浏览历史
LPUSH user:1001:history 'goods:5001'
LTRIM user:1001:history 0 49   # 只留最近50条</pre><p><strong>真实场景：</strong>用 BRPOP 实现轻量级任务队列，消费者阻塞等待，来任务立即处理。</p><h4>4. Set — 命令与实战</h4><pre># 用户标签
SADD user:1001:tags "Java" "Redis" "Docker"
SMEMBERS user:1001:tags

# 共同好友
SADD user:1001:friends 1002 1003 1004
SADD user:1002:friends 1001 1003 1005
SINTER user:1001:friends user:1002:friends  # 交集：共同好友 = 1003

# 抽奖
SADD lottery:2024 user:1001 user:1002 user:1003 user:1004
SRANDMEMBER lottery:2024 3     # 抽3人（不删除）
SPOP lottery:2024 1            # 抽1人（删除，不重复中奖）

# 去重（已读文章）
SADD user:1001:read article:5001
SISMEMBER user:1001:read article:5001  # 是否已读</pre><p><strong>真实场景：</strong>推荐系统用 SINTER 算共同兴趣好友，用 SISMEMBER 做已读去重。</p><h4>5. ZSet（Sorted Set）— 命令与实战</h4><pre># 排行榜（实时热销商品）
ZADD sales:rank 1520 goods:5001
ZADD sales:rank 2380 goods:5002
ZINCRBY sales:rank 1 goods:5001  # 销量+1
ZREVRANGE sales:rank 0 9 WITHSCORES  # TOP 10（降序）
ZRANK sales:rank goods:5001          # 排名（升序，从0开始）

# 延迟队列（score=执行时间戳）
ZADD delay:queue 1704067200 '{"task":"closeOrder","orderId":1001}'
# 消费者轮询
ZRANGEBYSCORE delay:queue 0 1704067200 LIMIT 0 10
ZREMRANGEBYSCORE delay:queue 0 1704067200  # 取走后删除

# 滑动窗口限流
# key=rate:user:1001, score=时间戳, member=请求ID
ZADD rate:user:1001 1704067200 req:abc
ZREMRANGEBYSCORE rate:user:1001 0 1704067140  # 移除60秒前的
ZCARD rate:user:1001                          # 当前窗口请求数</pre><p><strong>真实场景：</strong>微博热搜榜用 ZINCRBY 累加热度，ZREVRANGE 取 TOP N 展示。</p><h4>高级类型（加分项）</h4><table><tr><th>类型</th><th>场景</th><th>关键命令</th></tr><tr><td>Bitmap</td><td>用户签到、在线状态</td><td>SETBIT/GETBIT/BITCOUNT</td></tr><tr><td>HyperLogLog</td><td>UV 统计（误差0.81%）</td><td>PFADD/PFCOUNT</td></tr><tr><td>GeoSpatial</td><td>附近的人、距离计算</td><td>GEOADD/GEODIST/GEORADIUS</td></tr><tr><td>Stream（5.0）</td><td>持久化消息队列</td><td>XADD/XREAD/XACK</td></tr></table><blockquote>面试要点：不要只背类型名称，要说出每个类型对应的 Redis 命令和真实业务场景。String 和 Hash 最常用，重点说清缓存和对象存储的 key 设计规范。</blockquote>`},
{q:"Redis 底层数据结构？",a:`<ul><li><strong>SDS：</strong>O(1) 获取长度，二进制安全，自动扩容，空间预分配+惰性释放</li><li><strong>ziplist/listpack：</strong>连续内存，小数据量紧凑。Redis 7.0 用 listpack 替代</li><li><strong>skiplist：</strong>多层有序链表，O(logN)，ZSet 核心</li><li><strong>intset：</strong>整数有序集合，支持编码升级</li><li><strong>hashtable：</strong>dict 结构，ht[0]+ht[1]，渐进式 rehash</li></ul>`},
{q:"ZSet 底层实现？跳表结构？",a:`<p>数据量小用 ziplist，大时用 <strong>skiplist + hashtable</strong>。</p><h4>跳表</h4><ul><li>多层有序链表，最底层包含所有元素</li><li>每层是下一层的"快速通道"</li><li>节点含 value、score、backward、levels[]（前进指针+跨度 span）</li></ul><p><strong>为什么需要哈希表？</strong>跳表按 score 范围查 O(logN+M)，哈希表按 member 查 score O(1)。</p><p><strong>为什么选跳表？</strong>实现简单、范围查找自然、并发修改友好。</p>`},
{q:"渐进式 rehash？",a:`<ol><li>为 ht[1] 分配新表</li><li>设 rehashidx = 0</li><li>每次增删改查时顺带迁移 ht[0][rehashidx] 到 ht[1]，rehashidx++</li><li>后台定时也批量迁移</li><li>完成后 ht[1] → ht[0]，新建空 ht[1]</li></ol><p>rehash 期间：新增直接写 ht[1]，查找先 ht[0] 再 ht[1]。</p>`},
{q:"RDB vs AOF？",a:`<h4>是什么</h4><table><tr><th>对比维度</th><th>RDB（Redis Database）</th><th>AOF（Append Only File）</th></tr><tr><td>原理</td><td>内存数据的二进制快照</td><td>逐条记录写命令（文本格式）</td></tr><tr><td>文件体积</td><td>小（压缩二进制，约内存50%）</td><td>大（文本，可达内存2-3倍）</td></tr><tr><td>恢复速度</td><td><strong>快</strong>（直接加载到内存）</td><td>慢（逐条重放命令）</td></tr><tr><td>数据安全</td><td>可能丢两次快照之间的数据</td><td>最多丢 1 秒（everysec）</td></tr><tr><td>CPU 开销</td><td>fork 时瞬时高，写快照低</td><td>每条写命令都追加，持续开销</td></tr></table><h4>恢复性能基准测试</h4><pre>测试环境：8GB 内存，100万条 key-value 数据

RDB 恢复：
  文件大小：~400MB
  恢复时间：~2.5秒
  内存占用：加载完直接到位

AOF 恢复（everysec 策略）：
  文件大小：~1.2GB（重写后约800MB）
  恢复时间：~15-25秒
  内存占用：逐条执行，内存渐增

结论：RDB 恢复速度约为 AOF 的 6-10 倍</pre><h4>怎么用 — 配置示例</h4><pre># ===== redis.conf RDB 配置 =====
save 900 1        # 900秒内有1次写操作则触发
save 300 10       # 300秒内有10次写操作则触发
save 60 10000     # 60秒内有10000次写操作则触发
dbfilename dump.rdb
dir /data/redis
rdbcompression yes    # 启用压缩（CPU换空间）
rdbchecksum yes       # 启用校验和

# ===== redis.conf AOF 配置 =====
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec  # 每秒刷盘（推荐，最多丢1秒）
# appendfsync always  # 每条命令都刷盘（最安全，性能差10倍）
# appendfsync no      # OS决定（最快，不可控）
no-appendfsync-on-rewrite yes  # 重写期间暂停AOF刷盘

# AOF 重写触发条件
auto-aof-rewrite-percentage 100  # AOF文件比上次重写后增长100%
auto-aof-rewrite-min-size 64mb   # 且至少64MB

# ===== 生产推荐：混合持久化（4.0+） =====
aof-use-rdb-preamble yes  # AOF重写时：前半RDB格式 + 后半AOF命令</pre><h4>生产环境推荐配置</h4><table><tr><th>场景</th><th>推荐方案</th><th>理由</th></tr><tr><td>生产环境（通用）</td><td>RDB + AOF + 混合持久化</td><td>恢复快（RDB部分）+ 数据完整（AOF部分）</td></tr><tr><td>纯缓存（可丢数据）</td><td>只开 RDB</td><td>恢复快，不需要100%数据安全</td></tr><tr><td>金融/交易场景</td><td>AOF always</td><td>零数据丢失，但吞吐量下降约50%</td></tr></table><h4>为什么两者都开</h4><ul><li>RDB 是"兜底快照"，即使 AOF 文件损坏也能快速恢复大部分数据</li><li>AOF 保证数据完整性，重启时优先加载 AOF（Redis 自动选择）</li><li>混合持久化让 AOF 重写后的文件：前段是 RDB 格式（恢复快），后段是增量 AOF 命令（数据完整）</li><li>备份策略：定期将 RDB 文件 rsync 到远端存储（S3/NAS），灾备恢复时用 RDB 快速拉起</li></ul><blockquote>面试要点：不要只说"RDB快AOF安全"，要提到混合持久化（aof-use-rdb-preamble）、AOF重写机制、以及实际生产如何配置。加分项：提到 no-appendfsync-on-rewrite 避免重写期间的 IO 竞争。</blockquote>`},
{q:"RDB fork+COW 原理？",a:`<ol><li>bgsave 触发 → fork 子进程（阻塞主线程，毫秒-百毫秒级）</li><li>父子共享内存页（写时复制 COW）</li><li>主进程修改内存页时 OS 复制该页给子进程</li><li>子进程遍历内存生成 RDB 文件</li></ol><p><strong>注意：</strong>fork 期间 Redis 无法处理请求。大内存实例关注 fork 耗时。</p>`},
{q:"混合持久化？",a:`<p>AOF 重写时：前半部分 <strong>RDB 格式快照</strong> + 后半部分 <strong>AOF 增量命令</strong>。</p><p>优势：恢复快（RDB部分）+ 数据完整（AOF部分）+ 体积适中。</p>`},
{q:"主从复制？全量 vs 增量同步？",a:`<h4>全量同步</h4><p>从节点发 PSYNC ? -1 → 主节点 BGSAVE → 发 RDB → 发缓冲命令。</p><h4>增量同步</h4><p>断线重连后发 PSYNC runid offset → 主节点检查 offset 差距 → 在 repl_backlog 范围内则只发增量命令。</p><p>建议调大 repl_backlog（默认 1MB）。</p>`},
{q:"哨兵（Sentinel）故障转移？",a:`<h4>故障检测</h4><p>主观下线（单哨兵判定）→ 客观下线（quorum 个哨兵都判定）</p><h4>故障转移</h4><ol><li>Raft 选举 Leader 哨兵</li><li>选新主节点（优先级 → offset 最大 → runid 最小）</li><li>提升为新主 SLAVEOF NO ONE</li><li>其他从节点切换新主</li><li>通知客户端</li></ol><p>部署建议：至少 3 哨兵，quorum=2。</p>`},
{q:"Redis Cluster 集群原理？",a:`<p><strong>数据分片：</strong>16384 个哈希槽，CRC16(key)%16384。每个主节点负责一部分。</p><p>客户端请求到错误节点返回 MOVED 重定向。</p><p><strong>Gossip 协议：</strong>节点间交换状态。去中心化。</p><p><strong>故障转移：</strong>超半数主节点标记 FAIL → 从节点选举晋升。至少 3 主 3 从。</p>`},
{q:"缓存穿透/击穿/雪崩？",a:`<table><tr><th>问题</th><th>原因</th><th>解决</th></tr><tr><td>穿透</td><td>查不存在的数据</td><td>布隆过滤器、缓存空值</td></tr><tr><td>击穿</td><td>热点 key 过期</td><td>互斥锁(SETNX)、逻辑过期、永不过期</td></tr><tr><td>雪崩</td><td>大量 key 同时过期</td><td>过期加随机值、多级缓存、限流降级</td></tr></table>`},
{q:"布隆过滤器原理？",a:`<p>二进制位数组 + 多个哈希函数。写入：k 个位置置 1。查询：全 1 可能存，有 0 一定不存在。</p><p><strong>缺点：</strong>误判率（False Positive），不支持删除。Redis RedisBloom 模块。</p>`},
{q:"双写一致性？",a:`<p><strong>推荐 Cache Aside：</strong>读先缓存后 DB；写先更新 DB 再删缓存。</p><h4>工程保障</h4><ul><li>延迟双删</li><li>MQ 重试删除</li><li>Canal 订阅 Binlog 异步更新缓存（最终一致性）</li></ul>`},
{q:"延迟双删？",a:`<ol><li>删缓存</li><li>更新 DB</li><li>延迟 N ms 后再删缓存</li></ol><p>N 应大于"读 DB + 写缓存"耗时，通常几百 ms。缺点：不好精确估算。建议配合 MQ 兜底或用 Canal。</p>`},
{q:"Redis 为什么快？",a:`<h4>是什么 — 五大核心原因</h4><h4>1. 纯内存操作</h4><pre>内存 vs 磁盘性能对比：
┌─────────────────────┬──────────────┬──────────────┐
│ 操作                │ 内存         │ SSD磁盘      │
├─────────────────────┼──────────────┼──────────────┤
│ 随机读延迟          │ ~100ns       │ ~100μs       │
│ 顺序读延迟          │ ~100ns       │ ~25μs        │
│ 吞吐量              │ GB/s 级别    │ 500MB/s      │
└─────────────────────┴──────────────┴──────────────┘
内存比 SSD 快 1000 倍，比机械硬盘快 100000 倍。</pre><h4>2. 单线程模型（命令执行阶段）</h4><pre>多线程的问题：
  线程A: SET key 100     ──┐
  线程B: INCR key         ──┤ 需要加锁，上下文切换
  线程C: GET key          ──┘

单线程：命令队列串行执行，无需锁
  Client1 ─┐                    ┌─ SET key 100
  Client2 ─┼→ 事件循环(多路复用) →├─ INCR key
  Client3 ─┘                    └─ GET key
  无锁竞争、无上下文切换、无线程创建销毁开销</pre><p><strong>Redis 6.0 多线程：</strong>网络 IO（读写socket）多线程，但<strong>命令执行仍单线程</strong>。解决了网络IO瓶颈，命令执行无锁优势不变。</p><h4>3. 高效数据结构</h4><table><tr><th>数据结构</th><th>设计亮点</th><th>性能</th></tr><tr><td>SDS</td><td>预分配空间+惰性释放，O(1)取长度</td><td>append 均摊 O(1)</td></tr><tr><td>跳表(Skiplist)</td><td>多层链表，替代平衡树</td><td>O(logN) 查找，范围查询天然友好</td></tr><tr><td>压缩列表(ziplist)</td><td>连续内存，小数据量紧凑</td><td>节省内存，CPU cache友好</td></tr><tr><td>整数集合(intset)</td><td>紧凑数组，支持编码升级</td><td>小集合二分查找 O(logN)</td></tr><tr><td>渐进式rehash</td><td>分批迁移，避免一次性卡顿</td><td>均摊 O(1) 字典操作</td></tr></table><h4>4. IO 多路复用（epoll）</h4><pre>传统模型：一个连接一个线程
  Thread-1: accept → read(阻塞等) → process → write
  Thread-2: accept → read(阻塞等) → process → write
  10000连接 = 10000线程 → 内存爆炸、频繁切换

IO多路复用模型：一个线程管理所有连接
  ┌──────────────────────────────────┐
  │  epoll_wait() 等待所有socket事件  │
  │  socket-1 readable → 处理请求    │
  │  socket-3 readable → 处理请求    │
  │  socket-7 writable → 返回响应    │
  │  继续 epoll_wait() ...           │
  └──────────────────────────────────┘

epoll 核心原理：
  1. epoll_create() → 创建 epoll 实例（红黑树+就绪队列）
  2. epoll_ctl()   → 注册关注的 socket 事件（可读/可写）
  3. epoll_wait()  → 阻塞等待，有事件时只返回就绪的 socket
  优势：O(1) 事件通知（select/poll 是 O(n) 遍历所有 fd）

Redis 事件循环伪代码：
  while (server.running) {
      events = epoll_wait(epfd, maxevents, timeout);
      for (event in events) {
          if (event.readable) readQueryFromClient(event.fd);
          if (event.writable) sendReplyToClient(event.fd);
      }
      processCommandAndResetClient();  // 执行命令（单线程）
  }</pre><h4>5. RESP 协议简单高效</h4><pre>RESP (Redis Serialization Protocol) 特点：
  - 文本协议，实现简单
  - 无锁解析，O(n) 线性解析
  - Pipeline 批量命令减少网络往返

请求示例：
  *2\r\n$3\r\nGET\r\n$3\r\nfoo\r\n
  即: GET foo

Pipeline 效果：
  无 Pipeline: RTT × N = 0.5ms × 1000 = 500ms
  有 Pipeline: RTT + 执行时间 = 0.5ms + 5ms ≈ 5.5ms
  提升约 100 倍！</pre><h4>性能基准数据</h4><pre>官方 redis-benchmark 测试（单核，8字节value）：
  SET:  ~110,000 QPS
  GET:  ~110,000 QPS
  LPUSH: ~100,000 QPS
  SADD:  ~100,000 QPS

实际生产环境（128字节value，Pipeline）：
  单实例：200,000-500,000 QPS
  集群模式（6节点）：1,000,000+ QPS

对比 MySQL：
  简单查询：~5,000-10,000 QPS
  Redis 约为 MySQL 的 10-20 倍</pre><blockquote>面试要点：不要只说"内存操作"，要展开讲 IO 多路复用（epoll）和单线程模型。6.0 多线程只用于网络IO，命令执行仍单线程，这是高频追问点。</blockquote>`},
{q:"过期策略和内存淘汰策略？",a:`<p><strong>过期：</strong>惰性删除 + 定期删除（每 100ms 随机检查）。</p><h4>淘汰策略</h4><table><tr><th>策略</th><th>说明</th></tr><tr><td>allkeys-lfu</td><td>所有 key 中最不常用（推荐）</td></tr><tr><td>allkeys-lru</td><td>最近最少使用</td></tr><tr><td>volatile-lfu</td><td>有过期时间的中最不常用</td></tr><tr><td>noeviction</td><td>不淘汰，拒绝写入</td></tr></table>`},
{q:"分布式锁实现？Redisson？",a:`<h4>基本 SETNX</h4><pre>SET lock_key unique_value NX PX 30000</pre><p>释放用 Lua 脚本保证原子性。</p><h4>Redisson</h4><ul><li><strong>可重入锁：</strong>Hash 结构存线程标识和重入次数</li><li><strong>看门狗续期：</strong>每 10s 检查并续期，持有者释放后停止</li><li><strong>RedLock：</strong>5 个独立实例，大多数获取成功才算成功（有争议）</li></ul>`},
{q:"MULTI/EXEC vs Lua 脚本？",a:`<p><strong>MULTI/EXEC：</strong>顺序执行，不支持回滚，原子性有限。</p><p><strong>Lua 脚本：</strong>整个脚本原子执行，更灵活，性能更好（一次网络往返）。</p><p>生产推荐 Lua 脚本。WATCH 可实现乐观锁。</p>`},
{q:"Pipeline 的作用？",a:`<p>多条命令打包一次发送，减少网络往返。1000 条命令 RTT=1ms 时，普通需 1000ms，Pipeline 约 1ms。</p><p><strong>注意：</strong>不保证原子性。建议每批 500 条。命令间不能有依赖。</p>`},
{q:"单线程模型和 6.0 多线程？",a:`<p>核心命令处理单线程。6.0 引入 IO 多线程：多个线程并行处理网络读写和协议解析，<strong>命令执行仍单线程</strong>。</p><p>只在 QPS > 10 万且瓶颈在网络 IO 时才有明显收益。</p>`},
{q:"大 Key 问题？",a:`<p><strong>危害：</strong>阻塞主线程、内存不均、网络带宽、慢查询。</p><p><strong>排查：</strong>redis-cli --bigkeys、MEMORY USAGE、RDB 分析工具。</p><p><strong>解决：</strong>拆分为多个小 key、压缩 value、UNLINK 异步删除。</p>`},
{q:"热 Key 问题？",a:`<p><strong>排查：</strong>业务预判、redis-cli --hotkeys（需 LFU）。</p><p><strong>解决：</strong>本地缓存（Caffeine，5-30s）、读写分离、热 key 复制到多节点、限流降级。</p>`},
{q:"多级缓存架构？",a:`<p>L1(本地缓存 Caffeine) → L2(Redis) → DB</p><p>更新 DB 后删 L2，通过 MQ/Redis Pub-Sub 通知所有实例清 L1。L1 设短过期兜底。</p><p>适合读多写少、对延迟敏感的场景。</p>`},
{q:"延迟队列实现？",a:`<h4>ZSet + 轮询</h4><pre>ZADD delay_queue timestamp task_id\nZRANGEBYSCORE delay_queue 0 now LIMIT 0 N\n-- 配合 Lua 脚本原子 ZREM</pre><h4>Redisson RDelayedQueue</h4><p>封装 ZSet，提供阻塞获取 API。生产推荐。</p>`}
]},
{id:"mq",icon:"📨",title:"消息队列",desc:"MQ基础 · 核心问题 · RocketMQ/Kafka — 共20题",cards:[
{q:"为什么要使用消息队列？",a:`<h4>是什么</h4><p>消息队列（MQ）是应用间的异步通信中间件，通过"生产-消费"模式实现<strong>解耦、异步、削峰</strong>三大核心能力。</p><h4>1. 解耦 — 上下游不再直接依赖</h4><pre>// 改造前：订单服务直接调用下游（强耦合）
public void createOrder(Order order) {
    orderDao.insert(order);           // 20ms
    inventoryService.deduct(order);   // 15ms  -- 库存服务挂了？订单也失败
    couponService.use(order);         // 10ms  -- 优惠券服务也挂了？
    smsService.send(order);           // 30ms  -- 短信超时？用户等着
    pointService.add(order);          // 10ms
    // 总耗时：85ms，任一服务故障导致订单失败
}

// 改造后：通过 MQ 解耦
public void createOrder(Order order) {
    orderDao.insert(order);           // 20ms
    mqProducer.send("order.created", order);  // 5ms
    // 总耗时：25ms，下游各自独立消费
}
// 下游消费者各自独立：
// InventoryConsumer: 消费 order.created → 扣库存
// CouponConsumer:    消费 order.created → 用券
// SmsConsumer:       消费 order.created → 发短信
// 某个消费者挂了，消息堆积在 MQ，恢复后继续消费</pre><h4>2. 异步 — 响应时间大幅下降</h4><pre>// 用户注册场景 — 改造前后对比

// 改造前（同步调用链）
register(user) {
    userDao.insert(user);       // 20ms
    emailService.sendWelcome();  // 200ms
    smsService.sendVerify();     // 150ms
    pointService.initBonus();    // 30ms
    // 总耗时：400ms → 用户要等
}

// 改造后（异步 MQ）
register(user) {
    userDao.insert(user);       // 20ms
    mqProducer.send("user.registered", user);  // 5ms
    // 总耗时：25ms → 用户几乎无感知
}
// 邮件/短信/积分服务异步消费，失败可重试</pre><table><tr><th>指标</th><th>改造前（同步）</th><th>改造后（MQ异步）</th><th>提升</th></tr><tr><td>接口响应时间</td><td>400ms</td><td>25ms</td><td><strong>16倍</strong></td></tr><tr><td>下游服务故障影响</td><td>整体失败</td><td>无影响（消息堆积）</td><td>解耦</td></tr><tr><td>可水平扩展</td><td>不能</td><td>消费者可独立扩缩</td><td>弹性</td></tr></table><h4>3. 削峰 — 保护下游系统</h4><pre>// 秒杀场景：10万 QPS 涌入
// 改造前：直接打到数据库
  用户请求 → Controller → Service → DB（MySQL 单表约 3000 QPS）
  结果：数据库连接打满 → 雪崩

// 改造后：MQ 做缓冲
  用户请求 → Controller → MQ（RocketMQ 10万+ QPS）
                        ↓
                   消费者按能力匀速消费（如 2000 QPS）→ DB

// 效果对比
┌─────────────┬──────────────┬──────────────┐
│             │ 不用 MQ      │ 用 MQ        │
├─────────────┼──────────────┼──────────────┤
│ 峰值 QPS    │ 10万 → DB    │ 2000 → DB    │
│ DB 压力     │ 打满崩溃      │ 稳定可控     │
│ 用户体验    │ 全部超时      │ 排队等通知   │
│ 系统可用性  │ 雪崩          │ 削峰保护     │
└─────────────┴──────────────┴──────────────┘</pre><h4>真实生产场景</h4><ul><li><strong>电商下单：</strong>订单服务发 MQ → 库存/积分/物流/通知各自消费</li><li><strong>日志采集：</strong>应用 → Kafka → ELK（Filebeat/Fluentd）</li><li><strong>数据同步：</strong>MySQL Binlog → Canal → Kafka → ES/Redis/HBase</li><li><strong>事件驱动：</strong>用户行为埋点 → MQ → 实时推荐/风控引擎</li></ul><blockquote>面试要点：不要只说"解耦异步削峰"三个词，要结合具体业务场景（如订单、注册、秒杀）说明改造前后的代码变化和性能数据对比。</blockquote>`},
{q:"消息队列的缺点？",a:`<h4>是什么 — 引入 MQ 的四大代价</h4><h4>1. 系统可用性降低</h4><p><strong>问题：</strong>MQ 成为关键链路节点，MQ 宕机 → 整个消息链路瘫痪。</p><pre>真实故障场景：
  RabbitMQ 单节点宕机 → 生产者发送失败 → 上游服务超时
  Kafka Broker 挂掉  → Partition leader 选举 → 短暂不可用(秒级)

解决方案：
  ├── 集群部署：Kafka 3+ Broker，RocketMQ 主从
  ├── 高可用：Kafka ISR 机制（min.insync.replicas=2）
  ├── 生产者降级：MQ 不可用时走备用链路（如直连下游/本地重试）
  └── 监控告警：Prometheus + Grafana 监控 Broker 健康、磁盘、网络</pre><h4>2. 系统复杂度大幅提高</h4><table><tr><th>复杂度问题</th><th>具体表现</th><th>解决方案</th></tr><tr><td><strong>消息丢失</strong></td><td>生产者发了但消费者没收到</td><td>生产者 ack 确认 + Broker 持久化 + 消费者手动提交 offset</td></tr><tr><td><strong>消息重复</strong></td><td>网络抖动导致重复投递</td><td>消费端幂等：唯一ID + 数据库去重 / Redis SETNX</td></tr><tr><td><strong>消息顺序性</strong></td><td>多 Partition/多消费者导致乱序</td><td>相同业务 key 路由到同一 Partition，单消费者顺序消费</td></tr><tr><td><strong>消息积压</strong></td><td>消费速度 &lt; 生产速度</td><td>扩消费者、优化消费逻辑、临时转发、监控告警</td></tr><tr><td><strong>消息一致性</strong></td><td>分布式事务难保证</td><td>事务消息（RocketMQ）、本地消息表、最大努力通知</td></tr></table><h4>3. 数据一致性问题</h4><pre>问题场景：订单创建成功但 MQ 发送失败
  订单服务：INSERT order（成功）
  订单服务：MQ.send(msg)（失败！）
  结果：DB 有订单，但下游没收到通知 → 数据不一致

解决方案一：本地消息表（最终一致性）
  BEGIN TRANSACTION;
    INSERT INTO orders ...;
    INSERT INTO mq_messages (msg_id, topic, body, status) VALUES ...;
  COMMIT;
  后台定时任务扫描 mq_messages 表中 status=pending 的消息，重发到 MQ
  消费者收到后回调更新 status=done

解决方案二：RocketMQ 事务消息
  1. Producer 发送 half 消息（消费者不可见）
  2. Producer 执行本地事务
  3. 根据结果 commit/rollback half 消息
  4. Broker 定时回查未确认的 half 消息

解决方案三：最大努力通知
  本地事务成功后，发 MQ + 记录到重试表
  定时任务多次重试（1min, 5min, 30min, 1h...）
  最终一致即可</pre><h4>4. 延迟问题</h4><pre>消息从生产到消费完成的延迟组成：
  生产端延迟：网络传输 + Broker 处理（通常 &lt; 1ms）
  Broker延迟：持久化 + 副本同步（Kafka ~2-5ms）
  消费端延迟：拉取/推送 + 业务处理（取决于消费逻辑）
  总延迟：通常 10-100ms（正常），积压时可达秒/分钟级

对比直接 RPC 调用：
  直接调用：20-50ms（一次网络往返）
  MQ 异步：  50-200ms（生产者→Broker→消费者）
  代价：多了一个网络跳转，但换了解耦和异步

缓解方案：
  ├── 减少 Broker 持久化延迟（Kafka acks=1 代替 all）
  ├── 消费者 push 模式（RocketMQ 长轮询 ~1ms）
  ├── 减少消费逻辑耗时（异步处理、批量消费）
  └── 监控消费延迟（Kafka lag、RocketMQ diffTotal）</pre><blockquote>面试要点：不要只列举缺点，要对每个缺点说出具体的解决方案。这样展示的是"既知道风险又有落地经验"的工程思维。重点展开一致性问题（本地消息表/事务消息）。</blockquote>`},
{q:"Kafka / RabbitMQ / RocketMQ 选型？",a:`<table><tr><th>特性</th><th>Kafka</th><th>RabbitMQ</th><th>RocketMQ</th></tr><tr><td>吞吐</td><td>百万级/秒</td><td>万级/秒</td><td>十万级/秒</td></tr><tr><td>延迟</td><td>ms级</td><td>us级</td><td>ms级</td></tr><tr><td>事务消息</td><td>不支持</td><td>不支持</td><td>支持</td></tr><tr><td>场景</td><td>大数据/日志</td><td>中小业务</td><td>金融/电商</td></tr></table>`},
{q:"如何保证消息不丢失？",a:`<h4>生产者端</h4><p>RocketMQ 同步发送+重试。Kafka <code>acks=all</code> + <code>enable.idempotence=true</code>。</p><h4>Broker 端</h4><p>持久化到磁盘。Kafka <code>replication.factor>=3</code>，<code>min.insync.replicas>=2</code>。</p><h4>消费者端</h4><p>手动提交 offset，业务成功后再 commitSync()。</p>`},
{q:"如何保证消息顺序性？",a:`<p><strong>Kafka：</strong>Partition 内有序，相同业务 key 路由到同一 Partition。</p><p><strong>RocketMQ：</strong>MessageQueueSelector + MessageListenerOrderly。</p><p><strong>场景：</strong>订单"创建→支付→发货"，用订单 ID 做 sharding key。</p><p>顺序消费会牺牲吞吐量。</p>`},
{q:"如何处理消息积压？",a:`<h4>紧急</h4><ol><li>扩容消费者（不超 Partition 数）</li><li>临时扩分区+转发</li><li>跳过非关键消息</li></ol><h4>长期</h4><p>优化消费逻辑、批量消费、异步消费、增 Partition、监控告警。</p>`},
{q:"如何保证幂等性？",a:`<h4>是什么</h4><p>幂等性：同一操作执行多次，效果等同于执行一次。在消息队列场景下，消费者可能收到重复消息（网络抖动、超时重试），必须保证业务不重复执行。</p><h4>1. 唯一ID + 数据库去重（最常用）</h4><pre>-- 数据库表设计
CREATE TABLE mq_consume_log (
    id BIGINT PRIMARY KEY AUTO_INCREMENT,
    msg_id VARCHAR(64) NOT NULL COMMENT '消息唯一ID',
    biz_type VARCHAR(32) COMMENT '业务类型',
    biz_key VARCHAR(128) COMMENT '业务主键',
    consume_time DATETIME DEFAULT CURRENT_TIMESTAMP,
    UNIQUE KEY uk_msg_id (msg_id),          -- 消息ID唯一索引
    UNIQUE KEY uk_biz (biz_type, biz_key)    -- 业务幂等键
);

-- 消费时插入，重复消息会报唯一键冲突
INSERT INTO mq_consume_log (msg_id, biz_type, biz_key)
VALUES ('msg_20240101_001', 'order_pay', 'order_1001');
-- 第二次消费同一消息 → Duplicate entry → 直接忽略

Java 代码：
  @RocketMQMessageListener(topic = "order-pay", ...)
  public class PayConsumer implements RocketMQListener&lt;OrderMsg&gt; {
      public void onMessage(OrderMsg msg) {
          try {
              consumeLogDao.insert(msg.getMsgId(), "order_pay", msg.getOrderId());
              orderService.markPaid(msg.getOrderId());  // 业务逻辑
          } catch (DuplicateKeyException e) {
              log.info("重复消息，跳过: {}", msg.getMsgId());
          }
      }
  }</pre><h4>2. Redis 去重（高性能场景）</h4><pre># 消费前用 SETNX 抢占（原子操作）
SET consume:lock:order_1001 unique_val NX EX 86400
# 返回 1 → 首次消费，执行业务
# 返回 0 → 重复消息，跳过

Java 代码：
  String key = "consume:lock:" + msg.getOrderId();
  Boolean acquired = redisTemplate.opsForValue()
      .setIfAbsent(key, "1", 24, TimeUnit.HOURS);
  if (Boolean.FALSE.equals(acquired)) {
      log.info("重复消息，跳过: {}", msg.getMsgId());
      return;  // 已消费过
  }
  // 执行业务逻辑
  orderService.markPaid(msg.getOrderId());

优点：高并发性能好（Redis O(1)）
缺点：Redis 宕机可能丢失去重标记；TTL 过期后重复消息无法拦截
适用：高吞吐 + 允许极小概率重复的场景</pre><h4>3. 状态机校验（业务天然幂等）</h4><pre>-- 订单状态：待支付(0) → 已支付(1) → 已发货(2) → 已完成(3)
-- 利用状态流转的单向性保证幂等

UPDATE orders SET status = 1
WHERE order_id = 'order_1001' AND status = 0;
-- 影响行数 = 1 → 首次处理
-- 影响行数 = 0 → 已支付（重复消息），无需操作

Java 代码：
  int affected = orderDao.updateStatus(orderId, PAID, PENDING);
  if (affected == 0) {
      log.info("订单已支付，跳过重复消息: {}", orderId);
      return;
  }
  // 首次处理，继续后续逻辑

优点：不依赖额外组件，业务层面天然幂等
缺点：只适用于有状态流转的业务</pre><h4>4. 乐观锁 — version 字段</h4><pre>-- 表设计：增加 version 字段
CREATE TABLE account (
    id BIGINT PRIMARY KEY,
    balance DECIMAL(10,2),
    version INT DEFAULT 0
);

-- 扣款操作
UPDATE account
SET balance = balance - 100, version = version + 1
WHERE id = 1 AND version = 5;
-- version=5 匹配 → 扣款成功，version变6
-- 重复消费时 version=6 ≠ 5 → 影响0行，不重复扣

Java 代码（MyBatis-Plus）：
  @Version
  private Integer version;  // 自动在 UPDATE 中加 version 条件</pre><h4>5. Token 机制（防表单重复提交）</h4><pre>流程：
  1. 客户端请求 → 服务端生成 token 存 Redis → 返回给客户端
  2. 客户端提交表单时携带 token
  3. 服务端用 SETNX 验证 token：
     - 成功（首次）→ 执行业务 + 删除 token
     - 失败（重复）→ 拒绝

// 生成 token
String token = UUID.randomUUID().toString();
redisTemplate.opsForValue().set("token:" + userId, token, 30, TimeUnit.MINUTES);

// 提交时验证
String storedToken = redisTemplate.opsForValue().get("token:" + userId);
if (storedToken != null &amp;&amp; storedToken.equals(submitToken)) {
    redisTemplate.delete("token:" + userId);  // 删除，防二次提交
    orderService.create(order);
} else {
    throw new BizException("请勿重复提交");
}</pre><h4>方案选型对比</h4><table><tr><th>方案</th><th>适用场景</th><th>性能</th><th>复杂度</th><th>可靠性</th></tr><tr><td>唯一ID + DB去重</td><td>通用（推荐默认）</td><td>中</td><td>低</td><td>高</td></tr><tr><td>Redis SETNX</td><td>高并发</td><td>高</td><td>低</td><td>中（Redis故障风险）</td></tr><tr><td>状态机校验</td><td>有状态流转的业务</td><td>高</td><td>低</td><td>高</td></tr><tr><td>乐观锁 version</td><td>更新操作</td><td>高</td><td>低</td><td>高</td></tr><tr><td>Token 机制</td><td>前端防重复提交</td><td>高</td><td>中</td><td>高</td></tr></table><blockquote>面试要点：不要只列方案名称，要说清楚代码实现和数据库设计。推荐组合使用：唯一ID+DB去重（兜底）+ Redis SETNX（高性能前置拦截）+ 状态机校验（业务层保障）。</blockquote>`},
{q:"死信队列和延迟消息？",a:`<p><strong>死信队列：</strong>消息被拒绝/过期/队列满时转入。RocketMQ 重试 16 次后进入死信队列。</p><h4>延迟消息</h4><ul><li>RocketMQ：18 个固定延迟级别，5.0 支持任意时间</li><li>RabbitMQ：TTL+死信队列 或 delayed-message-exchange 插件</li><li>Kafka：不原生支持，需自建</li></ul>`},
{q:"RocketMQ 架构？",a:`<ul><li><strong>NameServer：</strong>轻量注册中心，去中心化</li><li><strong>Broker：</strong>Master-Slave，CommitLog 顺序写入</li><li><strong>Producer：</strong>同步/异步/单向发送</li><li><strong>Consumer：</strong>Push(长轮询)/Pull</li></ul><p>亮点：CommitLog 顺序写 + 零拷贝 + ConsumeQueue 索引。</p>`},
{q:"RocketMQ 事务消息？",a:`<ol><li>发半消息（消费者不可见）</li><li>执行本地事务</li><li>Commit 或 Rollback</li><li>异常时 Broker 回查（最多 15 次），查本地事务表确定状态</li></ol><p>需要配合本地事务表。保证最终一致性。</p>`},
{q:"Kafka 为什么吞吐量高？",a:`<ol><li><strong>顺序写入磁盘</strong>（约 600MB/s）</li><li><strong>零拷贝</strong>（sendfile，减少 2 次拷贝+2 次切换）</li><li><strong>分区并行</strong></li><li><strong>批量处理</strong></li><li><strong>Page Cache</strong>（依赖 OS 缓存）</li><li><strong>数据压缩</strong>（Snappy/LZ4/Zstd）</li></ol><p>单机百万级消息/秒。</p>`},
{q:"Kafka Partition 和 Consumer Group？",a:`<p><strong>Partition：</strong>有序不可变消息序列，并行处理基本单元。只保证 Partition 内有序。</p><p><strong>Consumer Group：</strong>组内一个 Partition 只能被一个消费者消费。</p><ul><li>消费者数 ≤ Partition 数</li><li>不同 Group 独立消费同一 Topic</li></ul><p><strong>Rebalance：</strong>消费者变化时重新分配，期间 Stop The World。</p>`},
{q:"Kafka 如何保证数据不丢？",a:`<p><strong>Producer：</strong>acks=all + retries + enable.idempotence=true</p><p><strong>Broker：</strong>replication.factor≥3 + min.insync.replicas≥2 + unclean.leader.election.enable=false</p><p><strong>Consumer：</strong>关闭自动提交 + 手动 commitSync()</p>`},
{q:"RocketMQ 高可用？",a:`<p><strong>NameServer：</strong>多实例去中心化。</p><p><strong>Broker：</strong>Master-Slave 或 DLedger(Raft) 多副本。</p><p><strong>刷盘：</strong>同步刷盘(SYNC_FLUSH) 数据零丢失；异步刷盘吞吐高。</p><p>生产推荐：DLedger + 同步刷盘。</p>`},
{q:"RocketMQ 消息存储机制？",a:`<p><strong>CommitLog：</strong>所有 Topic 顺序写入同一文件（1GB），写入性能极高。</p><p><strong>ConsumeQueue：</strong>每 Topic 每 QueueId 一个索引文件，每条 20 字节（offset+size+tagHash）。</p><p><strong>IndexFile：</strong>支持按 key/时间查询。</p><p>CommitLog 默认保留 72 小时。</p>`}
]},
{id:"docker",icon:"🐳",title:"Docker / K8s",desc:"Docker · Kubernetes · DevOps — 共22题",cards:[
{q:"Docker 镜像分层结构？",a:`<h4>是什么</h4><p>Docker 镜像采用<strong>联合文件系统（UnionFS）</strong>分层存储。每个 Dockerfile 指令生成一个只读层，容器启动时在顶层添加一个<strong>可写层（Container Layer）</strong>。</p><h4>怎么用 — docker history 示例</h4><pre># Dockerfile
FROM openjdk:11-jre-slim          # Layer 1: 基础镜像（~70MB）
WORKDIR /app                       # Layer 2: 设置工作目录（~0B）
COPY target/myapp.jar app.jar      # Layer 3: 复制应用包（~50MB）
ENV JAVA_OPTS="-Xms256m"           # Layer 4: 环境变量（~0B）
EXPOSE 8080                        # Layer 5: 声明端口（~0B）
ENTRYPOINT ["java","-jar","app.jar"]  # Layer 6: 启动命令（~0B）

# 查看镜像层级
$ docker history myapp:1.0
IMAGE          CREATED BY                           SIZE
abc123         ENTRYPOINT ["java"...]                0B        ← Layer 6
def456         EXPOSE 8080                           0B        ← Layer 5
ghi789         ENV JAVA_OPTS=-Xms256m                0B        ← Layer 4
jkl012         COPY target/myapp.jar app.jar         50MB      ← Layer 3
mno345         WORKDIR /app                          0B        ← Layer 2
pqr678         FROM openjdk:11-jre-slim              70MB      ← Layer 1

# 镜像总大小 = 所有层之和 = 120MB（不是 6 × 120MB）</pre><h4>为什么用分层 — 层共享机制</h4><pre>场景：10个 Java 微服务，都用 openjdk:11-jre-slim 基础镜像

传统方式（不分层）：
  服务A: 70MB（JDK） + 50MB（应用） = 120MB
  服务B: 70MB（JDK） + 30MB（应用） = 100MB
  服务C: 70MB（JDK） + 40MB（应用） = 110MB
  总共: 330MB

Docker 分层（共享基础层）：
  共享层: openjdk:11-jre-slim = 70MB（只存一份）
  服务A: + 50MB
  服务B: + 30MB
  服务C: + 40MB
  总共: 70 + 50 + 30 + 40 = 190MB（节省 42%）

构建缓存优势：
  第一次构建：所有层全部构建
  第二次构建（只改了应用代码）：Layer 1-2 命中缓存（秒级），只重建 Layer 3
  推送到 Registry：只上传有变化的层，增量推送</pre><h4>容器可写层（Copy-on-Write）</h4><pre>镜像层（只读）：
  Layer 3: /app/myapp.jar
  Layer 2: /app (WORKDIR)
  Layer 1: / (openjdk 基础系统)
  ──────────────────────────
  Container Layer（可写）：容器运行时新增/修改的文件
    - 日志文件 /app/logs/app.log
    - 临时文件 /tmp/xxx
    - 修改的文件会被 Copy-on-Write 复制到可写层

注意：容器删除后可写层丢失，重要数据用 Volume 挂载
容器层的大小可通过 docker ps -s 查看</pre><h4>面试补充：镜像层数优化</h4><pre># 不推荐：太多层
RUN apt-get update
RUN apt-get install -y curl
RUN apt-get install -y vim
RUN rm -rf /var/lib/apt/lists/*   # 4层

# 推荐：合并 RUN（减少层数，减小镜像体积）
RUN apt-get update &amp;&amp; \
    apt-get install -y curl vim &amp;&amp; \
    rm -rf /var/lib/apt/lists/*   # 1层</pre><blockquote>面试要点：要说出联合文件系统（UnionFS）的概念、层共享带来的空间和构建缓存优势、以及 Copy-on-Write 机制。加分项：提到容器层和镜像层的区别，以及合并 RUN 优化镜像。</blockquote>`},
{q:"Dockerfile 常用指令？",a:`<table><tr><th>指令</th><th>作用</th></tr><tr><td>FROM</td><td>基础镜像</td></tr><tr><td>RUN</td><td>执行命令生成新层</td></tr><tr><td>COPY / ADD</td><td>复制文件（ADD 支持解压 tar）</td></tr><tr><td>WORKDIR</td><td>工作目录</td></tr><tr><td>ENV</td><td>环境变量</td></tr><tr><td>EXPOSE</td><td>声明端口（仅文档）</td></tr><tr><td>CMD</td><td>启动命令（可被覆盖）</td></tr><tr><td>ENTRYPOINT</td><td>启动入口（不被覆盖）</td></tr></table><p>CMD vs ENTRYPOINT：CMD 可被 docker run 参数覆盖，ENTRYPOINT 参数会追加。</p>`},
{q:"Docker 网络模式？",a:`<ul><li><strong>bridge（默认）：</strong>虚拟网桥，独立 IP，端口映射 -p</li><li><strong>host：</strong>共享宿主机网络，性能最好</li><li><strong>none：</strong>无网络</li><li><strong>container：</strong>与指定容器共享网络（sidecar）</li></ul>`},
{q:"Docker 资源限制？",a:`<pre>-m 512m --memory-swap=512m  # 内存\n--cpus 1.5                    # CPU\n--cpuset-cpus="0,1"           # 绑定 CPU\n--device-read-bps             # 磁盘IO</pre><p>生产环境一定要设资源限制，防止"吵闹的邻居"。</p>`},
{q:"Docker 镜像优化？",a:`<ol><li><strong>精简基础镜像：</strong>alpine/distroless</li><li><strong>多阶段构建：</strong>构建阶段和运行阶段分离</li><li><strong>合并 RUN：</strong>减少层数</li><li><strong>善用缓存：</strong>不变指令放前</li><li><strong>.dockerignore：</strong>排除不必要文件</li></ol>`},
{q:"K8s 核心组件？",a:`<h4>是什么 — Master 控制平面</h4><ul><li><strong>API Server：</strong>集群统一入口，所有操作通过 RESTful API（kubectl、Controller、Scheduler 都与 API Server 通信）。支持认证/鉴权/准入控制。是唯一直接读写 etcd 的组件</li><li><strong>etcd：</strong>分布式 KV 存储（Raft 一致性协议），存储集群所有状态数据（Pod、Service、ConfigMap、Secret 等）。建议 3 或 5 节点部署（容忍 (n-1)/2 故障）</li><li><strong>Controller Manager：</strong>运行一组控制器，持续将"实际状态"向"期望状态"调节。包括 Deployment Controller、ReplicaSet Controller、Node Controller 等</li><li><strong>Scheduler：</strong>监听新建但未绑定 Node 的 Pod，根据资源需求、亲和性、污点等策略选择最优 Node。流程：预选(Filter) → 优选(Score) → 绑定(Bind)</li></ul><h4>Node 工作节点</h4><ul><li><strong>Kubelet：</strong>Node 上的代理，负责 Pod 生命周期管理（创建/启停/监控容器）。定期向 Master 汇报节点状态。通过 CRI 与容器运行时交互</li><li><strong>Kube-proxy：</strong>维护节点上的网络规则。模式：userspace（已弃用）、iptables（默认，规则数随Service线性增长）、IPVS（大规模集群推荐，O(1)查找）</li><li><strong>Container Runtime：</strong>实际运行容器的组件（containerd、CRI-O 等），遵循 CRI 接口规范</li></ul><h4>组件交互流程 — 部署一个应用</h4><pre>用户操作：kubectl apply -f nginx-deployment.yaml

完整交互流程：
┌──────────┐    ① kubectl apply     ┌────────────┐
│  用户     │ ─────────────────────→ │ API Server │
└──────────┘                        └─────┬──────┘
                                          │
                    ② 写入 etcd（创建 Deployment 对象）
                                          │
                                    ┌─────▼──────┐
                                    │   etcd      │
                                    └─────┬──────┘
                                          │
          ③ Deployment Controller watch 到新 Deployment
          创建 ReplicaSet 对象 → 写入 etcd
                                          │
          ④ ReplicaSet Controller watch 到新 ReplicaSet
          创建 N 个 Pod 对象（Pending 状态）→ 写入 etcd
                                          │
          ⑤ Scheduler watch 到 Pending Pod
          预选+优选 → 绑定到 Node-2 → 更新 etcd
                                          │
          ⑥ Node-2 的 Kubelet watch 到 Pod 被调度到自己节点
          通过 CRI 调用 containerd 拉取镜像并启动容器
                                          │
          ⑦ Kubelet 汇报 Pod Running 状态 → API Server → etcd
          ⑧ Kube-proxy 更新 iptables/IPVS 规则

实际部署场景：
  3 Master（高可用） + 5 Node（工作节点）
  Master: API Server + etcd + Controller + Scheduler（每个 Master 各一份）
  Node:   Kubelet + Kube-proxy + containerd</pre><h4>附加组件（加分项）</h4><table><tr><th>组件</th><th>作用</th><th>场景</th></tr><tr><td>CoreDNS</td><td>集群内部 DNS 解析</td><td>Service 名称 → ClusterIP</td></tr><tr><td>Metric Server</td><td>采集节点和 Pod 资源指标</td><td>HPA 自动伸缩依赖</td></tr><tr><td>Ingress Controller</td><td>HTTP/HTTPS 入口路由</td><td>Nginx/Traefik 对外暴露服务</td></tr><tr><td>Prometheus</td><td>监控告警</td><td>采集 K8s 指标 + Grafana 可视化</td></tr></table><blockquote>面试要点：不只说组件名，要说清楚组件之间的交互流程（声明式 API + watch 机制）。加分项：提到 etcd 的 Raft 协议、Scheduler 的预选+优选两阶段、以及 IPVS vs iptables 的区别。</blockquote>`},
{q:"Pod 的生命周期？",a:`<p>最小调度单元。同 Pod 容器共享网络和存储。</p><h4>状态</h4><ul><li>Pending → Running → Succeeded/Failed/Unknown</li></ul><h4>重启策略</h4><ul><li>Always（默认，Deployment）</li><li>OnFailure（Job）</li><li>Never</li></ul>`},
{q:"Deployment vs StatefulSet？",a:`<table><tr><th>对比</th><th>Deployment</th><th>StatefulSet</th></tr><tr><td>应用</td><td>无状态</td><td>有状态</td></tr><tr><td>Pod 名称</td><td>随机</td><td>有序固定</td></tr><tr><td>扩缩容</td><td>任意</td><td>有序</td></tr><tr><td>存储</td><td>共享</td><td>独立 PVC</td></tr><tr><td>场景</td><td>Web/微服务</td><td>DB/MQ</td></tr></table>`},
{q:"Service 类型？",a:`<ul><li><strong>ClusterIP：</strong>集群内部虚拟 IP（默认）</li><li><strong>NodePort：</strong>每个 Node 开放端口 30000-32767</li><li><strong>LoadBalancer：</strong>云负载均衡器</li><li><strong>ExternalName：</strong>映射外部域名</li></ul><p>Headless Service：clusterIP: None，DNS 直接返回 Pod IP。</p>`},
{q:"ConfigMap vs Secret？",a:`<h4>是什么</h4><ul><li><strong>ConfigMap：</strong>存储非敏感配置（明文 key-value），用于将配置与容器镜像解耦</li><li><strong>Secret：</strong>存储敏感信息（Base64 编码），如密码、Token、证书</li></ul><h4>怎么用 — YAML 示例</h4><pre># ===== ConfigMap 示例 =====
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # 简单 key-value
  APP_ENV: "production"
  LOG_LEVEL: "info"
  # 配置文件
  application.yml: |
    server:
      port: 8080
    spring:
      datasource:
        url: jdbc:mysql://mysql:3306/mydb

# ===== Secret 示例 =====
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  # Base64 编码：echo -n "admin123" | base64 → YWRtaW4xMjM=
  DB_PASSWORD: YWRtaW4xMjM=
  API_TOKEN: dG9rZW4xMjM0NTY=
# 或用 stringData（K8s 自动 Base64 编码）
stringData:
  DB_PASSWORD: "admin123"    # 明文写，K8s 自动编码存储</pre><h4>两种注入方式对比</h4><pre># ===== 方式一：环境变量注入 =====
apiVersion: v1
kind: Pod
metadata:
  name: myapp
spec:
  containers:
  - name: myapp
    image: myapp:1.0
    env:
    - name: APP_ENV              # 环境变量名
      valueFrom:
        configMapKeyRef:
          name: app-config       # ConfigMap 名称
          key: APP_ENV           # ConfigMap 中的 key
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: DB_PASSWORD
    # 容器内使用：System.getenv("APP_ENV") → "production"

# ===== 方式二：Volume 挂载（推荐） =====
apiVersion: v1
kind: Pod
metadata:
  name: myapp
spec:
  containers:
  - name: myapp
    image: myapp:1.0
    volumeMounts:
    - name: config-vol
      mountPath: /app/config      # 挂载到容器内路径
      readOnly: true
    - name: secret-vol
      mountPath: /app/secrets
      readOnly: true
  volumes:
  - name: config-vol
    configMap:
      name: app-config            # ConfigMap 内容变成文件
      # /app/config/APP_ENV → "production"
      # /app/config/application.yml → 文件内容
  - name: secret-vol
    secret:
      secretName: db-secret       # Secret 内容变成文件
      # /app/secrets/DB_PASSWORD → "admin123"</pre><h4>两种注入方式对比表</h4><table><tr><th>对比维度</th><th>环境变量注入（env）</th><th>Volume 挂载</th></tr><tr><td>使用方式</td><td><code>System.getenv("KEY")</code></td><td>读取文件 <code>/app/config/key</code></td></tr><tr><td>配置更新</td><td><strong>需要重启 Pod</strong></td><td><strong>自动热更新</strong>（~1分钟）</td></tr><tr><td>适用场景</td><td>少量简单配置（端口、环境标识）</td><td>配置文件、证书、多 key 场景</td></tr><tr><td>子路径挂载</td><td>不支持</td><td>支持 subPath（单文件挂载不覆盖目录）</td></tr><tr><td>安全性</td><td>env 可见于 /proc/PID/environ</td><td>文件权限可控（defaultMode）</td></tr></table><h4>Secret 安全加固</h4><ul><li><strong>Base64 不是加密：</strong>任何人拿到 Secret 都能 base64 -d 解码看到明文</li><li><strong>生产必须做的：</strong></li><ol><li>启用 etcd 静态加密（EncryptionConfiguration）：<code>--encryption-provider-config</code></li><li>RBAC 限制 Secret 访问权限（最小权限原则）</li><li>使用外部密钥管理：HashiCorp Vault、AWS Secrets Manager</li><li>审计 Secret 访问（API Server audit log）</li></ol></ul><pre># 启用 etcd 加密配置示例
apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
  - resources: ["secrets"]
    providers:
      - aescbc:
          keys:
            - name: key1
              secret: &lt;base64-encoded-32byte-key&gt;
      - identity: {}   # 回退读取未加密数据</pre><blockquote>面试要点：要说清楚两种注入方式的差异（特别是 Volume 支持热更新而 env 不支持），以及 Base64 不是加密这个陷阱。加分项：提到 etcd 静态加密和 Vault 集成。</blockquote>`},
{q:"HPA 自动伸缩？",a:`<p>根据 CPU/内存/自定义指标自动调整 Pod 副本数。HPA Controller 每 15 秒检查一次。</p><pre>minReplicas: 2\nmaxReplicas: 10\nmetrics:\n  - cpu averageUtilization: 70\n  - memory averageUtilization: 80</pre><p>需要先设 resources.requests。缩容冷却 5 分钟。</p>`},
{q:"探针（Probe）类型？",a:`<ul><li><strong>Liveness：</strong>失败则重启容器（检测死锁/假死）</li><li><strong>Readiness：</strong>失败则从 Service 移除（不接收流量）</li><li><strong>Startup：</strong>启动完成前 Liveness/Readiness 不生效（防慢启动误杀）</li></ul><p>探测方式：httpGet、tcpSocket、exec。Spring Boot Actuator 提供 /actuator/health/liveness 和 readiness。</p>`},
{q:"Ingress 的作用？",a:`<p>七层网关：域名路由 + 路径路由 + TLS 终止 + 负载均衡。</p><p>需要 Ingress Controller（Nginx/Traefik/Kong）来执行规则。</p><pre>host: api.example.com\n  /users → user-service\n  /orders → order-service</pre>`},
{q:"CI/CD 流水线设计？",a:`<h4>CI</h4><p>代码提交 → SonarQube 检查 → 单元测试 → Maven 构建 → Docker 镜像推送</p><h4>CD</h4><p>部署测试环境 → 集成测试 → 预发布 → 人工审批 → 生产发布</p><p>推荐 GitOps：ArgoCD 监听 Git 变化自动同步到 K8s。</p>`},
{q:"蓝绿部署 vs 金丝雀发布？",a:`<table><tr><th>维度</th><th>蓝绿</th><th>金丝雀</th></tr><tr><td>资源</td><td>双倍</td><td>增量少量</td></tr><tr><td>切换</td><td>一次性</td><td>渐进式</td></tr><tr><td>风险</td><td>中</td><td>低</td></tr><tr><td>回滚</td><td>快</td><td>快</td></tr><tr><td>适合</td><td>高风险需快速回滚</td><td>逐步验证</td></tr></table>`},
{q:"滚动更新和回滚？",a:`<pre>rollingUpdate:\n  maxSurge: 1         # 最多多出 1 个 Pod\n  maxUnavailable: 0    # 不允许不可用</pre><p><code>kubectl rollout undo deployment/app</code> 回滚上一版本。</p><p>revisionHistoryLimit 控制保留历史版本数（默认 10）。</p>`},
{q:"Docker vs 虚拟机？",a:`<table><tr><th>维度</th><th>Docker</th><th>虚拟机</th></tr><tr><td>虚拟化</td><td>OS 级，共享内核</td><td>硬件级，独立内核</td></tr><tr><td>启动</td><td>秒级</td><td>分钟级</td></tr><tr><td>资源</td><td>MB</td><td>GB</td></tr><tr><td>性能</td><td>接近原生</td><td>有损耗</td></tr><tr><td>隔离</td><td>较弱</td><td>完全隔离</td></tr></table><p>容器本质是受限进程（Namespace 隔离 + Cgroup 限制）。</p>`},
{q:"Pod 调度策略？",a:`<h4>是什么</h4><p>Pod 调度策略决定了 Pod 被分配到哪个 Node 上运行。K8s Scheduler 负责调度，但可以通过多种策略影响调度行为。</p><h4>1. nodeSelector — 最简单的标签匹配</h4><pre># 先给 Node 打标签
# kubectl label nodes node-1 disk=ssd
# kubectl label nodes node-2 disk=hdd zone=us-east-1

apiVersion: v1
kind: Pod
metadata:
  name: db-pod
spec:
  nodeSelector:
    disk: ssd        # 只调度到有 disk=ssd 标签的 Node
  containers:
  - name: mysql
    image: mysql:8.0

# 优点：简单直接
# 缺点：只支持硬性匹配，不支持软性偏好或复杂表达式</pre><h4>2. Node 亲和性（NodeAffinity）— 更灵活</h4><pre>apiVersion: v1
kind: Pod
metadata:
  name: web-pod
spec:
  affinity:
    nodeAffinity:
      # 硬性要求（必须满足，类似 nodeSelector 但更强大）
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: zone
            operator: In           # In, NotIn, Exists, DoesNotExist
            values: ["us-east-1", "us-west-2"]
          - key: gpu
            operator: DoesNotExist  # 不能在有 GPU 的节点
      # 软性偏好（尽量满足，不满足也调度）
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80                  # 权重越高越优先
        preference:
          matchExpressions:
          - key: disk
            operator: In
            values: ["ssd"]         # 优先调度到 SSD 节点
      - weight: 20
        preference:
          matchExpressions:
          - key: cpu-cores
            operator: Gt            # 优先 CPU 多的节点
            values: ["8"]
  containers:
  - name: web
    image: nginx:1.25</pre><h4>3. Pod 亲和/反亲和（PodAffinity / PodAntiAffinity）</h4><pre>apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
spec:
  replicas: 3
  template:
    spec:
      affinity:
        # Pod 反亲和：同一应用的 Pod 分散到不同 Node（高可用）
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: web-app
            topologyKey: "kubernetes.io/hostname"  # 按 Node 分散
            # 也可用 "topology.kubernetes.io/zone" 按可用区分散
        # Pod 亲和：和指定 Pod 部署在同一节点（减少网络延迟）
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 60
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: redis-cache   # 尽量和 Redis 在同一 Node
              topologyKey: "kubernetes.io/hostname"
      containers:
      - name: web
        image: web-app:1.0</pre><h4>4. 污点和容忍（Taints &amp; Tolerations）</h4><pre># 给 Node 设置污点
# kubectl taint nodes node-1 role=gpu:NoSchedule
# NoSchedule:      新 Pod 不调度到此节点（除非有容忍）
# NoExecute:       已运行的 Pod 也会被驱逐（除非有容忍）
# PreferNoSchedule: 尽量不调度（软性）

apiVersion: v1
kind: Pod
metadata:
  name: gpu-training
spec:
  tolerations:
  - key: "role"
    operator: "Equal"
    value: "gpu"
    effect: "NoSchedule"     # 容忍 gpu 污点，可以调度到此节点
  nodeSelector:
    role: gpu                 # 同时选择 GPU 节点
  containers:
  - name: training
    image: pytorch:2.0
    resources:
      limits:
        nvidia.com/gpu: 1

# 系统组件（如 DaemonSet）通常设置容忍，保证在所有节点运行
tolerations:
- operator: "Exists"         # 容忍所有污点</pre><h4>5. PriorityClass — 优先级调度</h4><pre># 创建优先级类
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000000           # 数值越大优先级越高
globalDefault: false
preemptionPolicy: PreemptLowerPriority  # 可驱逐低优先级 Pod

# Pod 使用优先级
apiVersion: v1
kind: Pod
metadata:
  name: critical-service
spec:
  priorityClassName: high-priority
  containers:
  - name: app
    image: critical:1.0

# 资源不足时：
# 高优先级 Pod → 驱逐低优先级 Pod 腾出资源
