"java_0": `<div class="fu"><div class="fu-q">Q: HashMap 和 HashTable 的区别？</div><div class="fu-a">HashTable 是 JDK 1.0 的遗留类，所有方法加 synchronized，效率低。HashMap 允许 null key 和 null value，HashTable 不允许。实际开发中不用 HashTable，线程安全用 ConcurrentHashMap。</div></div><div class="fu"><div class="fu-q">Q: HashMap 的容量为什么必须是2的幂？</div><div class="fu-a">因为 <code>(n-1) &amp; hash</code> 等价于 <code>hash % n</code>（当 n 是 2 的幂时），位运算比取模快很多。同时扩容时用 <code>hash &amp; oldCap</code> 判断新位置，也依赖 2 的幂特性。</div></div>`,
"java_2": `<div class="fu"><div class="fu-q">Q: ConcurrentHashMap 的 size() 怎么做到高效？</div><div class="fu-a">类似 LongAdder 的分段计数：baseCount + CounterCell[]。多线程更新时分散到不同 Cell，减少竞争。最终 size = baseCount + 所有 Cell 之和。</div></div><div class="fu"><div class="fu-q">Q: ConcurrentHashMap 的 put 流程中 CAS 和 synchronized 各用在什么时候？</div><div class="fu-a">桶为空时用 CAS 插入（无锁）；桶不为空时用 synchronized 锁住头节点再遍历链表/红黑树插入。get() 全程无锁，靠 volatile 保证可见性。</div></div>`,
"java_3": `<div class="fu"><div class="fu-q">Q: HashMap 和 ConcurrentHashMap 哪个更适合做本地缓存？</div><div class="fu-a">单线程用 HashMap，多线程用 ConcurrentHashMap。但生产环境建议用 Caffeine/Guava Cache，有淘汰策略、统计、弱引用等专业功能。</div></div>`,
"java_4": `<div class="fu"><div class="fu-q">Q: 线程池参数怎么设置合理？你项目中怎么配的？</div><div class="fu-a">CPU 密集型 N+1，IO 密集型 2N 或更多。实际建议：先根据业务估算，上线后通过监控（队列积压量、拒绝次数）调优。项目中用自定义 ThreadFactory 命名线程方便排查，队列用有界 ArrayBlockingQueue 防 OOM。</div></div><div class="fu"><div class="fu-q">Q: Executors 工厂方法有哪些坑？</div><div class="fu-a">newFixedThreadPool/newSingleThread 用 LinkedBlockingQueue（无界）可能 OOM。newCachedThreadPool 用 SynchronousQueue 但 maxPoolSize 是 MAX_VALUE，可能创建大量线程导致 OOM。生产环境应直接用 ThreadPoolExecutor 构造。</div></div>`,
"java_8": `<div class="fu"><div class="fu-q">Q: volatile 和 synchronized 什么时候选哪个？</div><div class="fu-a">一写多读选 volatile（如状态标志）。多写场景用 synchronized。volatile 不保证原子性（count++ 不安全），需要原子操作用 AtomicInteger。</div></div>`,
"java_6": `<div class="fu"><div class="fu-q">Q: ThreadLocal 在线程池中为什么一定要 remove？</div><div class="fu-a">线程池线程被复用，如果不 remove，下一个任务可能读到上个任务的 ThreadLocal 数据（数据串）。且 ThreadLocalMap 的启发式清理不能保证 100% 清理，长期运行会内存泄漏。</div></div><div class="fu"><div class="fu-q">Q: InheritableThreadLocal 是什么？</div><div class="fu-a">可以让子线程继承父线程的 ThreadLocal 值。但线程池场景下同样有泄漏问题。阿里开源了 TransmittableThreadLocal(TTL) 解决线程池场景的值传递。</div></div>`,
"java_7": `<div class="fu"><div class="fu-q">Q: AQS 中 state 的含义在不同实现中有什么区别？</div><div class="fu-a">ReentrantLock: state=重入次数。Semaphore: state=剩余许可数。CountDownLatch: state=计数值。ReentrantReadWriteLock: 高16位=读锁数，低16位=写锁重入数。</div></div><div class="fu"><div class="fu-q">Q: StampedLock 了解吗？</div><div class="fu-a">JDK 8 引入，提供乐观读锁（读不阻塞写，性能更好）。不支持重入，不支持 Condition。适合读多写少且不需要重入的场景。</div></div>`,
"java_17": `<div class="fu"><div class="fu-q">Q: JVM 栈帧里有什么？</div><div class="fu-a">局部变量表（方法参数+局部变量）、操作数栈（运算中间结果）、动态链接（指向运行时常量池的方法引用）、方法返回地址。</div></div><div class="fu"><div class="fu-q">Q: 方法区和永久代、元空间的关系？</div><div class="fu-a">方法区是 JVM 规范定义的概念。JDK 7 用永久代（PermGen，在堆中）实现，JDK 8 改为元空间（Metaspace，用本地内存），不再受 JVM 堆大小限制。</div></div>`,
"java_19": `<div class="fu"><div class="fu-q">Q: CMS 收集器为什么被淘汰了？</div><div class="fu-a">CPU 敏感、浮动垃圾、产生内存碎片。碎片严重时会触发 Full GC（退化为 Serial Old），停顿很长。JDK 14 已移除 CMS。G1 和 ZGC 是替代方案。</div></div>`,
"java_21": `<div class="fu"><div class="fu-q">Q: 双亲委派在什么场景下需要打破？</div><div class="fu-a">SPI 机制（JDBC Driver 加载）、Tomcat 的 Web 应用隔离（每个应用有独立的 WebAppClassLoader，子优先策略）、OSGi 模块化、热部署。</div></div>`,
"java_24": `<div class="fu"><div class="fu-q">Q: CPU 飙高但 jstack 看不到明显问题怎么办？</div><div class="fu-a">可能是频繁 GC。用 jstat -gcutil 确认 GC 频率，用 Arthas 的 profiler 生成火焰图分析热点方法。如果 GC 正常，检查是否有正则回溯、死循环、大量序列化等。</div></div>`,
// ===== Spring =====
"spring_0": `<div class="fu"><div class="fu-q">Q: Spring 的 Bean 是线程安全的吗？</div><div class="fu-a">默认单例 Bean 不是线程安全的。如果有可变成员变量就会有问题。解决：1) 设计为无状态（推荐）；2) prototype 作用域；3) ThreadLocal；4) 加锁。</div></div>`,
"spring_2": `<div class="fu"><div class="fu-q">Q: 为什么三级缓存不用两级？</div><div class="fu-a">三级缓存存的是 ObjectFactory，作用是延迟代理对象的创建。如果 A 需要 AOP 代理，三级缓存在被请求时才决定是否创建代理。两级缓存在实例化后就要决定，可能过早创建代理。</div></div><div class="fu"><div class="fu-q">Q: @Lazy 怎么解决构造器循环依赖？</div><div class="fu-a">@Lazy 注入的不是真实 Bean 而是代理对象，实际使用时才去容器获取真正的 Bean，从而打破构造器注入的循环。</div></div>`,
"spring_4": `<div class="fu"><div class="fu-q">Q: @Transactional 内部调用怎么解决？</div><div class="fu-a">三种方式：1) 注入自身（@Autowired 注入自己再调用）；2) AopContext.currentProxy() 获取代理对象调用；3) 拆到不同类。推荐方式3，代码更清晰。</div></div><div class="fu"><div class="fu-q">Q: REQUIRED vs REQUIRES_NEW 实际使用场景？</div><div class="fu-a">REQUIRES_NEW 典型场景：记录操作日志（不管主事务是否回滚，日志都要保存）。REQUIRED 是大多数业务场景的选择。</div></div>`,
"spring_7": `<div class="fu"><div class="fu-q">Q: 自动配置和 Starter 的关系？</div><div class="fu-a">Starter 提供依赖 + 自动配置类。自动配置是 Spring Boot 的核心机制（@EnableAutoConfiguration + @Conditional），Starter 是自动配置的封装和分发方式。</div></div><div class="fu"><div class="fu-q">Q: 自定义 Starter 怎么做？</div><div class="fu-a">1) 创建 @Configuration 类 + @Conditional 注解；2) 在 META-INF/spring/AutoConfiguration.imports 中声明；3) 打包为 jar 发布。</div></div>`,
"spring_13": `<div class="fu"><div class="fu-q">Q: Nacos 的 AP 和 CP 模式怎么选？</div><div class="fu-a">临时实例用 AP（默认，心跳保活，性能好），永久实例用 CP（服务端健康检查，数据强一致）。大多数微服务场景用临时实例 AP 模式即可。</div></div>`,
"spring_16": `<div class="fu"><div class="fu-q">Q: 熔断器的半开状态怎么工作的？</div><div class="fu-a">熔断器打开后经过一段时间（如 Sentinel 默认 10s），进入半开状态，放行少量探测请求。如果成功则恢复关闭状态；如果失败则继续打开。这是自动探测恢复机制。</div></div><div class="fu"><div class="fu-q">Q: Sentinel 的限流算法有哪些？</div><div class="fu-a">固定窗口、滑动时间窗口（LeapArray）、令牌桶、漏桶。还支持热点参数限流（对特定参数值限流）和系统自适应限流（根据系统负载自动调整）。</div></div>`,
"spring_17": `<div class="fu"><div class="fu-q">Q: @RefreshScope 的原理？</div><div class="fu-a">标注 @RefreshScope 的 Bean 被代理，配置变更时标记为过期，下次访问时重新创建 Bean 实例（用新的配置值）。不是真正"热更新"，而是"懒刷新"。</div></div>`,
"spring_19": `<div class="fu"><div class="fu-q">Q: 微服务怎么拆分的？拆分的依据是什么？</div><div class="fu-a">按业务域拆分（DDD 限界上下文）、按数据边界拆分（不同实体归属不同服务）、按团队边界拆分。原则：高内聚低耦合，一个服务对应一个团队，数据不跨服务 JOIN。</div></div>`,
// ===== MySQL =====
"mysql_0": `<div class="fu"><div class="fu-q">Q: B+ 树和 B 树的核心区别？</div><div class="fu-a">B 树非叶子节点也存数据，每个节点能存的索引数少，树更高。B+ 树非叶子只存索引，同样磁盘页能存更多索引，树更矮。B+ 树叶子有链表，范围查询天然高效。</div></div><div class="fu"><div class="fu-q">Q: 哈希索引和 B+ 树索引的区别？</div><div class="fu-a">哈希 O(1) 等值查询但不支持范围、排序。InnoDB 的自适应哈希索引（AHI）会自动为热点数据创建哈希索引，对开发者透明。</div></div>`,
"mysql_5": `<div class="fu"><div class="fu-q">Q: 为什么推荐自增主键？UUID 做主键有什么问题？</div><div class="fu-a">自增主键保证顺序插入，聚簇索引不需要频繁页分裂。UUID 随机插入导致页分裂频繁，写入性能差，且占用更多空间。如果必须用 UUID，考虑有序 UUID（如雪花算法）。</div></div>`,
"mysql_7": `<div class="fu"><div class="fu-q">Q: 大数据量下如何优化查询？</div><div class="fu-a">索引优化（覆盖索引、联合索引最左匹配）、分表策略（按业务维度分表）、读写分离、归档策略（历史数据移到冷库）。先优化 SQL 和索引，再考虑分表。</div></div><div class="fu"><div class="fu-q">Q: 深分页怎么优化？</div><div class="fu-a">用游标分页（WHERE id > lastId LIMIT N）替代 OFFSET，避免扫描大量无用行。或者用延迟关联（先查主键再 JOIN 回原表取完整数据）。</div></div>`,
"mysql_10": `<div class="fu"><div class="fu-q">Q: 长事务对 MVCC 的影响？</div><div class="fu-a">长事务持有最早的 Read View，导致 undo log 版本链上的旧版本无法被 purge 线程清理，undo log 膨胀。解决：监控 innodb_trx，使用短事务，autocommit=1。</div></div>`,
"mysql_12": `<div class="fu"><div class="fu-q">Q: EXPLAIN 中 type=ALL 怎么优化？</div><div class="fu-a">ALL 是全表扫描。检查：1) 是否有索引；2) 索引是否失效（函数、隐式转换、LIKE '%xx'）；3) 优化器是否认为全表更快（数据量很小或要查的数据占比很大）。</div></div><div class="fu"><div class="fu-q">Q: Extra 中 Using filesort 是什么意思？怎么消除？</div><div class="fu-a">表示需要额外排序（不能通过索引直接获得有序结果）。通过让 ORDER BY 的列与索引顺序一致来消除，或者建立覆盖排序的联合索引。</div></div>`,
"mysql_15": `<div class="fu"><div class="fu-q">Q: binlog 可以用来做什么？误删数据怎么恢复？</div><div class="fu-a">binlog 可以恢复数据：用 mysqlbinlog 工具解析指定时间范围的 binlog，找到误删前的 INSERT 语句重新执行。生产建议 binlog 保留 7 天以上，格式用 ROW。</div></div>`,
"mysql_17": `<div class="fu"><div class="fu-q">Q: Buffer Pool 命中率高但查询还是慢可能是什么原因？</div><div class="fu-a">可能是锁等待、SQL 写得差（大量计算、函数调用）、网络延迟、或者查询返回数据量太大。Buffer Pool 命中率只是其中一个指标，需结合 EXPLAIN 和慢查询日志综合分析。</div></div>`,
// ===== Redis =====
"redis_0": `<div class="fu"><div class="fu-q">Q: String 的 int/embstr/raw 编码区别？</div><div class="fu-a">int: 纯数字。embstr: ≤44 字节，一次内存分配（连续），不可修改（修改后变 raw）。raw: 长字符串，使用 SDS，支持动态扩容。</div></div>`,
"redis_5": `<div class="fu"><div class="fu-q">Q: Hash 什么时候从 ziplist 变成 hashtable？</div><div class="fu-a">字段数 ≥ 128 或任一字段值 ≥ 64 字节时升级。Redis 7.0 用 listpack 替代 ziplist，解决连锁更新问题。</div></div>`,
"redis_4": `<div class="fu"><div class="fu-q">Q: RDB 快照时 fork 的阻塞时间大概多长？</div><div class="fu-a">与内存大小正相关。10GB 内存大约几十到上百毫秒。生产控制单实例 ≤ 10-15GB，关闭 THP（Transparent Huge Pages），使用 SSD 和高主频 CPU。</div></div>`,
"redis_6": `<div class="fu"><div class="fu-q">Q: 混合持久化文件加载时怎么工作的？</div><div class="fu-a">先按 RDB 格式加载前半部分（快），再按 AOF 格式重放后半部分命令（保证完整）。redis-check-aof 只能修复 AOF 部分，但整体数据完整性优于纯 RDB。</div></div>`,
"redis_10": `<div class="fu"><div class="fu-q">Q: Cluster 的 MOVED 和 ASK 重定向有什么区别？</div><div class="fu-a">MOVED: slot 已永久迁移到其他节点，客户端应更新本地路由表。ASK: slot 正在迁移中（MIGRATING 状态），客户端先 ASKING 再发命令到目标节点，是一次性临时重定向。</div></div><div class="fu"><div class="fu-q">Q: 为什么 Cluster 用 16384 个 slot？</div><div class="fu-a">Redis 作者解释：1) 心跳包大小合理（16384 slot 的 bitmap 约 2KB）；2) 节点数通常不超过 1000 个；3) 压缩比好。</div></div>`,
"redis_11": `<div class="fu"><div class="fu-q">Q: 缓存穿透除了布隆过滤器还有什么方案？</div><div class="fu-a">缓存空值（查 DB 为空也缓存 null，设短 TTL 如 2-5 分钟）。缺点是如果攻击者用大量随机 key，会缓存大量空值。布隆过滤器是更根本的解决方案。</div></div><div class="fu"><div class="fu-q">Q: 缓存击穿的互斥锁怎么做？</div><div class="fu-a">用 SETNX 获取锁，只有一个线程去查 DB 并回填缓存，其他线程 sleep 后重试。注意设锁过期时间防死锁，finally 中释放锁。</div></div>`,
"redis_16": `<div class="fu"><div class="fu-q">Q: Redisson 看门狗默认续期时间是多少？</div><div class="fu-a">默认锁超时 30s，看门狗每 10s（lockWatchdogTimeout/3）续期一次。只要持有锁的线程还活着，锁就不会过期。线程释放锁后看门狗停止续期。</div></div><div class="fu"><div class="fu-q">Q: RedLock 为什么有争议？</div><div class="fu-a">Martin Kleppmann 指出：如果多个 Redis 实例时钟跳跃（NTP 同步），可能导致多个客户端同时持有锁。Redis 作者 Antirez 回应说实际场景中时钟跳跃很小。高安全场景建议用 ZooKeeper。</div></div>`,
"redis_21": `<div class="fu"><div class="fu-q">Q: 延迟队列除了 ZSet 还有什么方案？</div><div class="fu-a">Redisson RDelayedQueue（基于 ZSet 封装，支持阻塞获取）。也可以用 Keyspace Notifications（key 过期事件），但不保证可靠性和实时性。生产推荐 ZSet+Lua 或 Redisson。</div></div>`,
// ===== 消息队列 =====
"mq_2": `<div class="fu"><div class="fu-q">Q: 如果让你重新选型你会怎么选？</div><div class="fu-a">大数据/日志 → Kafka（百万级吞吐，分区天然支持）。核心业务（需事务消息、延迟消息）→ RocketMQ。中小系统、路由灵活 → RabbitMQ。Java 团队优先 RocketMQ（方便二次开发和问题排查）。</div></div>`,
"mq_3": `<div class="fu"><div class="fu-q">Q: 消息不丢失的完整链路怎么保证？</div><div class="fu-a">生产者: acks=all + 重试。Broker: 多副本 + 同步刷盘。消费者: 手动提交 offset + 业务成功后才确认。整个链路任一环失败都有兜底（重试、补偿、死信队列告警）。</div></div><div class="fu"><div class="fu-q">Q: 同步刷盘和异步刷盘怎么选？</div><div class="fu-a">金融、订单等核心链路用同步刷盘（零丢失，吞吐略低）。日志、通知等非核心场景用异步刷盘（吞吐高，极端情况可能丢少量消息）。</div></div>`,
"mq_5": `<div class="fu"><div class="fu-q">Q: 幂等方案中 Redis 去重和数据库去重怎么选？</div><div class="fu-a">高并发用 Redis SETNX（快，毫秒级），但有过期问题。强一致性用数据库唯一索引（可靠但略慢）。生产建议：Redis 做快速拦截 + 数据库唯一索引做兜底。</div></div>`,
"mq_9": `<div class="fu"><div class="fu-q">Q: RocketMQ 事务消息的回查机制是怎么工作的？</div><div class="fu-a">Broker 定时（60s）检查未 Commit/Rollback 的半消息，回调 Producer 的 checkLocalTransaction 方法。Producer 查本地事务表确定状态，返回 COMMIT/ROLLBACK/UNKNOW。最多回查 15 次。</div></div>`,
"mq_11": `<div class="fu"><div class="fu-q">Q: Kafka 的 Rebalance 期间会发生什么？怎么减少影响？</div><div class="fu-a">Rebalance 期间消费者停止消费（Stop The World），重新分配 Partition。减少不必要 Rebalance：设合理的 session.timeout.ms 和 heartbeat.interval.ms，避免消费者因 GC 暂停被误判下线。</div></div>`,
// ===== Docker/K8s =====
"docker_4": `<div class="fu"><div class="fu-q">Q: Docker 镜像太大的实际优化经验？</div><div class="fu-a">alpine 基础镜像（~5MB）+ 多阶段构建（Maven 构建和 JDK 运行分开）+ 合并 RUN + .dockerignore。Java 应用镜像通常可以控制在 200MB 以内。</div></div>`,
"docker_6": `<div class="fu"><div class="fu-q">Q: Pod Pending 怎么排查？</div><div class="fu-a">kubectl describe pod 看 Events。常见原因：资源不足（CPU/内存不满足 requests）、nodeSelector/affinity 不匹配、PVC 绑定失败、污点不容忍。kubectl get events 看集群事件。</div></div>`,
"docker_16": `<div class="fu"><div class="fu-q">Q: 滚动更新过程中怎么保证零停机？</div><div class="fu-a">maxUnavailable: 0 保证所有 Pod 都可用。maxSurge: 1 先启动新 Pod 再停旧 Pod。配合 Readiness Probe，新 Pod 就绪后才接收流量，旧 Pod 优雅下线。</div></div>`,
"docker_12": `<div class="fu"><div class="fu-q">Q: CI/CD 工具链怎么选的？</div><div class="fu-a">GitLab CI（与代码仓库集成好）构建镜像 → Harbor 存储 → Helm 更新部署清单 → ArgoCD 自动同步到 K8s（GitOps 模式）。全程配置和代码一样版本化管理，变更可追溯、可回滚。</div></div>`,
// ===== 项目经验 =====
"project_0": `<div class="fu"><div class="fu-q">Q: 面试官追问"你能画一下系统架构图吗"怎么办？</div><div class="fu-a">面试前准备好架构图（网关→微服务集群→DB/缓存/MQ），能说出各层职责和技术选型理由。不需要画得很漂亮，逻辑清晰即可。</div></div><div class="fu"><div class="fu-q">Q: 项目介绍的 STAR 控制在多长时间？</div><div class="fu-a">3 分钟以内：30s 背景 + 1min 架构职责 + 1min 技术亮点 + 30s 成果量化。超过 3 分钟面试官会不耐烦。</div></div>`,
"project_4": `<div class="fu"><div class="fu-q">Q: 面试官问"你还有什么要问我的"怎么回答？</div><div class="fu-a">好问题：团队技术栈和发展方向？目前最大的技术挑战是什么？新人入职后的培养路径？避免问：薪资（HR 环节再谈）、加班情况（容易减分）。</div></div>`,
"project_5": `<div class="fu"><div class="fu-q">Q: 没用过的技术面试官追问细节怎么办？</div><div class="fu-a">坦诚说"实际项目中没有引入，但我自己研究过/做过 demo"，然后说出你了解的部分和调研结论。比瞎编被戳穿好得多。面试官考的是学习能力而非经验广度。</div></div>`,
"project_3": `<div class="fu"><div class="fu-q">Q: 面试官追问"你们的 QPS 3000 是怎么扛住的"？</div><div class="fu-a">从多个维度回答：1) 缓存命中率 95%+ 减轻 DB 压力；2) 数据库读写分离+合理索引；3) MQ 异步处理非核心逻辑；4) 连接池合理配置；5) HPA 自动扩容应对峰值。数据要自洽。</div></div>`
};

// State
let currentTopic = DATA[0].id;
let reviewed = {};
try { reviewed = JSON.parse(localStorage.getItem('fu_reviewed') || '{}'); } catch(e) { reviewed = {}; }
let searchTerm = '';
let testMode = false;
let testFilter = 'all';
let mastery = {};
try { mastery = JSON.parse(localStorage.getItem('fu_mastery') || '{}'); } catch(e) { mastery = {}; }

// Init
function init() {
  // 修正 Windows 缩放下的视口高度
  function setVH() {
    document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);

  var pIdx = DATA.findIndex(function(t) { return t.id === 'personal'; });
  if (pIdx > 0) { var p = DATA.splice(pIdx, 1)[0]; DATA.unshift(p); currentTopic = p.id; }
  renderNav();
  renderContent();
  updateProgress();
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    renderContent();
  });
}

function renderNav() {
  const nav = document.getElementById('sideNav');
  nav.innerHTML = DATA.map(t => {
    const total = t.cards.length;
    const done = t.cards.filter((_, i) => reviewed[t.id + '_' + i]).length;
    return `<div class="nav-item ${t.id === currentTopic ? 'active' : ''}" onclick="switchTopic('${t.id}')">
      <span><span class="topic-icon">${t.icon}</span>${t.title}</span>
      <span class="badge">${done}/${total}</span>
    </div>`;
  }).join('');
}

var scrollPositions = {};
function switchTopic(id) {
  scrollPositions[currentTopic] = window.scrollY;
  currentTopic = id;
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  renderNav();
  renderContent();
  document.getElementById('sidebar').classList.remove('open');
  if (scrollPositions[id] !== undefined) {
    setTimeout(function() { window.scrollTo(0, scrollPositions[id]); }, 0);
  } else {
    window.scrollTo(0, 0);
  }
}

function renderContent() {
  const area = document.getElementById('contentArea');
  const topic = DATA.find(t => t.id === currentTopic);
  if (!topic) return;

  let filtered = topic.cards;
  if (searchTerm) {
    filtered = topic.cards.filter((c, i) => {
      const fuKey = topic.id + '_' + i;
      const fuText = FU[fuKey] ? FU[fuKey].replace(/<[^>]+>/g, '').toLowerCase() : '';
      return c.q.toLowerCase().includes(searchTerm) ||
        c.a.replace(/<[^>]+>/g, '').toLowerCase().includes(searchTerm) ||
        fuText.includes(searchTerm);
    });
  }

  if (testMode && testFilter !== 'all') {
    filtered = filtered.filter((c) => {
      const realIdx = topic.cards.indexOf(c);
      const key = topic.id + '_' + realIdx;
      if (testFilter === 'unrated') return !mastery[key];
      return mastery[key] === testFilter;
    });
  }

  if (filtered.length === 0) {
    area.innerHTML = `<div class="section active"><div class="no-results"><p style="font-size:48px;margin-bottom:16px">🔍</p><h3>未找到匹配结果</h3><p>换个关键词试试</p></div></div>`;
    return;
  }

  let html = '<div class="section active fade-in">';
  html += `<h2 class="section-title">${topic.icon} ${topic.title}</h2>`;
  html += `<p class="section-desc">${topic.desc}</p>`;

  if (testMode) {
    const counts = { all: topic.cards.length, mastered: 0, fuzzy: 0, unmastered: 0, unrated: 0 };
    topic.cards.forEach((_, i) => {
      const k = topic.id + '_' + i;
      const m = mastery[k];
      if (m === 'mastered') counts.mastered++;
      else if (m === 'fuzzy') counts.fuzzy++;
      else if (m === 'unmastered') counts.unmastered++;
      else counts.unrated++;
    });
    html += `<div class="test-banner"><span>🎯 自测模式 — 先看题思考，再揭晓答案并自评</span><span>已评 ${counts.mastered + counts.fuzzy + counts.unmastered}/${counts.all}</span></div>`;
    html += `<div class="test-filter">`;
    html += `<button class="test-filter-btn ${testFilter === 'all' ? 'active' : ''}" onclick="setTestFilter('all')">全部<span class="cnt">${counts.all}</span></button>`;
    html += `<button class="test-filter-btn ${testFilter === 'mastered' ? 'active' : ''}" onclick="setTestFilter('mastered')">✅ 熟练<span class="cnt">${counts.mastered}</span></button>`;
    html += `<button class="test-filter-btn ${testFilter === 'fuzzy' ? 'active' : ''}" onclick="setTestFilter('fuzzy')">⚠️ 模糊<span class="cnt">${counts.fuzzy}</span></button>`;
    html += `<button class="test-filter-btn ${testFilter === 'unmastered' ? 'active' : ''}" onclick="setTestFilter('unmastered')">❌ 不会<span class="cnt">${counts.unmastered}</span></button>`;
    html += `<button class="test-filter-btn ${testFilter === 'unrated' ? 'active' : ''}" onclick="setTestFilter('unrated')">⬜ 未评<span class="cnt">${counts.unrated}</span></button>`;
    html += `</div>`;
  }

  filtered.forEach((card, idx) => {
    const realIdx = topic.cards.indexOf(card);
    const key = topic.id + '_' + realIdx;
    const isReviewed = reviewed[key];
    const qNum = realIdx + 1;
    const m = mastery[key] || '';
    const masteryClass = m ? m : '';

    if (testMode) {
      html += `<div class="card ${masteryClass}" id="card_${key}">
        <div class="card-header" onclick="toggleCard('${key}')">
          <div class="card-q"><span class="q-tag">Q${qNum}</span>${card.q}${FU[key] ? '<span class="fu-tag">追问</span>' : ''}</div>
          <div class="card-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-answer hidden-answer" id="ans_${key}">${card.a}${FU[key] ? '<div class="followup-wrap"><h4>&#128172; 面试官可能的追问</h4>' + FU[key] + '</div>' : ''}</div>
          <button class="show-answer-btn" id="sabtn_${key}" onclick="event.stopPropagation();revealAnswer('${key}')">💡 揭晓答案</button>
          <div class="rate-bar" id="rate_${key}" style="display:none">
            <span>掌握程度：</span>
            <button class="rate-btn r-green ${m === 'mastered' ? 'chosen' : ''}" onclick="event.stopPropagation();rateCard('${key}','mastered')">✅ 熟练</button>
            <button class="rate-btn r-yellow ${m === 'fuzzy' ? 'chosen' : ''}" onclick="event.stopPropagation();rateCard('${key}','fuzzy')">⚠️ 模糊</button>
            <button class="rate-btn r-red ${m === 'unmastered' ? 'chosen' : ''}" onclick="event.stopPropagation();rateCard('${key}','unmastered')">❌ 不会</button>
          </div>
        </div>
      </div>`;
    } else {
      html += `<div class="card ${isReviewed ? 'reviewed' : ''}" id="card_${key}">
        <div class="card-header" onclick="toggleCard('${key}')">
          <div class="card-check ${isReviewed ? 'checked' : ''}" onclick="event.stopPropagation();toggleReview('${key}')"></div>
          <div class="card-q"><span class="q-tag">Q${qNum}</span>${card.q}${FU[key] ? '<span class="fu-tag">追问</span>' : ''}</div>
          <div class="card-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-answer">${card.a}${FU[key] ? '<div class="followup-wrap"><h4>&#128172; 面试官可能的追问</h4>' + FU[key] + '</div>' : ''}</div>
        </div>
      </div>`;
    }
  });

  html += '</div>';
  area.innerHTML = html;
  // 同步个人定制 prio-item 的掌握程度样式
  if (currentTopic === 'personal') {
    area.querySelectorAll('.prio-item[onclick*="togglePrio"]').forEach(function(el) {
      var match = el.getAttribute('onclick').match(/togglePrio\('([^']+)',(\d+)\)/);
      if (match) {
        var key = match[1] + '_' + match[2];
        var m = mastery[key] || '';
        if (m) el.classList.add(m);
      }
    });
  }
}

function toggleCard(key) {
  const card = document.getElementById('card_' + key);
  if (card) card.classList.toggle('open');
}

function toggleReview(key) {
  reviewed[key] = !reviewed[key];
  try { localStorage.setItem('fu_reviewed', JSON.stringify(reviewed)); } catch(e) {}
  renderNav();
  renderContent();
  updateProgress();
}

function updateProgress() {
  let total = 0, done = 0;
  DATA.forEach(t => {
    t.cards.forEach((_, i) => {
      total++;
      if (reviewed[t.id + '_' + i]) done++;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressText').textContent = done + '/' + total;
  document.getElementById('progressFill').style.width = pct + '%';
}

function expandAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
}

// ========== 自测模式 ==========
function toggleTestMode() {
  testMode = !testMode;
  const btn = document.getElementById('testModeBtn');
  btn.classList.toggle('active', testMode);
  btn.textContent = testMode ? '退出自测' : '自测模式';
  testFilter = 'all';
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  renderContent();
}

function setTestFilter(f) {
  testFilter = f;
  renderContent();
}

function revealAnswer(key) {
  const ans = document.getElementById('ans_' + key);
  const btn = document.getElementById('sabtn_' + key);
  const rateBar = document.getElementById('rate_' + key);
  if (ans) ans.classList.remove('hidden-answer');
  if (btn) btn.style.display = 'none';
  if (rateBar) rateBar.style.display = 'flex';
}

function rateCard(key, level) {
  if (mastery[key] === level) {
    delete mastery[key];
  } else {
    mastery[key] = level;
  }
  try { localStorage.setItem('fu_mastery', JSON.stringify(mastery)); } catch(e) {}
  renderContent();
}

// ========== 面试模拟 ==========
let mockState = null;
let mockTimerInterval = null;

function openMockInterview() {
  const questions = pickMockQuestions(8);
  mockState = {
    questions: questions,
    current: 0,
    answers: [],
    revealed: [],
    startTime: Date.now(),
    elapsed: 0
  };
  document.getElementById('mockOverlay').classList.add('active');
  startMockTimer();
  renderMockQuestion();
}

function pickMockQuestions(count) {
  const all = [];
  DATA.forEach(function(topic) {
    topic.cards.forEach(function(card, i) {
      all.push({
        topic: topic.title,
        topicIcon: topic.icon,
        topicId: topic.id,
        idx: i,
        q: card.q,
        a: card.a,
        fu: FU[topic.id + '_' + i] || '',
        key: topic.id + '_' + i
      });
    });
  });
  for (var i = all.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = all[i]; all[i] = all[j]; all[j] = tmp;
  }
  var topicPicks = {};
  var result = [];
  for (var k = 0; k < all.length && result.length < count; k++) {
    var t = all[k].topicId;
    if (!topicPicks[t] || topicPicks[t] < 2) {
      topicPicks[t] = (topicPicks[t] || 0) + 1;
      result.push(all[k]);
    }
  }
  while (result.length < count && result.length < all.length) {
    var next = all.find(function(x) { return result.indexOf(x) === -1; });
    if (next) result.push(next); else break;
  }
  return result;
}

function startMockTimer() {
  if (mockTimerInterval) clearInterval(mockTimerInterval);
  mockTimerInterval = setInterval(function() {
    if (!mockState) return;
    mockState.elapsed = Math.floor((Date.now() - mockState.startTime) / 1000);
    var el = document.getElementById('mockTimerDisplay');
    if (el) {
      var m = Math.floor(mockState.elapsed / 60);
      var s = mockState.elapsed % 60;
      el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }
  }, 1000);
}

function renderMockQuestion() {
  var container = document.getElementById('mockContainer');
  if (!mockState) return;
  var idx = mockState.current;
  var q = mockState.questions[idx];
  var total = mockState.questions.length;

  var dotsHtml = '';
  for (var i = 0; i < total; i++) {
    var cls = 'mock-dot';
    if (i === idx) cls += ' current';
    else if (mockState.answers[i] === 'good') cls += ' answered';
    else if (mockState.answers[i] === 'fuzzy') cls += ' fuzzy';
    else if (mockState.answers[i] === 'skip') cls += ' skipped';
    dotsHtml += '<div class="' + cls + '">' + (i + 1) + '</div>';
  }

  var isRevealed = mockState.revealed[idx];
  var answerHtml = '';
  if (isRevealed) {
    answerHtml = '<div class="mock-answer-area visible"><h4>📖 参考答案</h4>' + q.a;
    if (q.fu) answerHtml += '<h5>💬 面试官可能的追问</h5>' + q.fu;
    answerHtml += '</div>';
  }

  var currentAnswer = mockState.answers[idx] || '';

  container.innerHTML = '<div class="mock-header">' +
    '<h2>🎤 模拟面试</h2>' +
    '<div class="mock-timer" id="mockTimerDisplay">00:00</div>' +
    '</div>' +
    '<div class="mock-progress">' + dotsHtml + '</div>' +
    '<div class="mock-topic-tag">' + q.topicIcon + ' ' + q.topic + '</div>' +
    '<div class="mock-question"><h3>Q' + (idx + 1) + '. ' + q.q + '</h3></div>' +
    answerHtml +
    '<div class="mock-nav">' +
    (idx > 0 ? '<button class="mock-btn-secondary" onclick="mockPrev()">⬅ 上一题</button>' : '') +
    (!isRevealed ? '<button class="mock-btn-primary" onclick="mockReveal()">💡 查看参考答案</button>' : '') +
    '<button class="mock-btn-success" onclick="mockRate(\'good\')" ' + (currentAnswer === 'good' ? 'style="opacity:0.6"' : '') + '>✅ 答得好</button>' +
    '<button class="mock-btn-secondary" onclick="mockRate(\'fuzzy\')" ' + (currentAnswer === 'fuzzy' ? 'style="opacity:0.6"' : '') + '>⚠️ 模糊</button>' +
    '<button class="mock-btn-danger" onclick="mockRate(\'skip\')" ' + (currentAnswer === 'skip' ? 'style="opacity:0.6"' : '') + '>⏭ 跳过</button>' +
    (idx < total - 1 ? '<button class="mock-btn-primary" onclick="mockNext()">下一题 ➡</button>' : '<button class="mock-btn-primary" onclick="mockFinish()" style="background:#10b981">📊 查看总结</button>') +
    '</div>' +
    '<div style="text-align:center;margin-top:24px"><button class="mock-btn-danger" onclick="closeMock()" style="font-size:12px">退出模拟</button></div>';

  var timerEl = document.getElementById('mockTimerDisplay');
  if (timerEl && mockState.elapsed > 0) {
    var m = Math.floor(mockState.elapsed / 60);
    var s = mockState.elapsed % 60;
    timerEl.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }
}

function mockReveal() {
  mockState.revealed[mockState.current] = true;
  renderMockQuestion();
}

function mockRate(level) {
  mockState.answers[mockState.current] = level;
  var total = mockState.questions.length;
  if (mockState.current < total - 1) {
    mockState.current++;
    renderMockQuestion();
  } else {
    renderMockQuestion();
  }
}

function mockNext() {
  if (mockState.current < mockState.questions.length - 1) {
    mockState.current++;
    renderMockQuestion();
  }
}

function mockPrev() {
  if (mockState.current > 0) {
    mockState.current--;
    renderMockQuestion();
  }
}

function mockFinish() {
  var total = mockState.questions.length;
  var good = 0, fuzzy = 0, skip = 0, unanswer = 0;
  for (var i = 0; i < total; i++) {
    var a = mockState.answers[i];
    if (a === 'good') good++;
    else if (a === 'fuzzy') fuzzy++;
    else if (a === 'skip') skip++;
    else unanswer++;
  }
  var mins = Math.floor(mockState.elapsed / 60);
  var secs = mockState.elapsed % 60;

  var reviewHtml = '';
  for (var i = 0; i < total; i++) {
    var q = mockState.questions[i];
    var ans = mockState.answers[i] || 'unanswered';
    var verdictClass = ans === 'good' ? 'verdict-good' : ans === 'fuzzy' ? 'verdict-fuzzy' : 'verdict-skip';
    var verdictText = ans === 'good' ? '✅ 答得好' : ans === 'fuzzy' ? '⚠️ 模糊' : ans === 'skip' ? '⏭ 跳过' : '⬜ 未评';
    reviewHtml += '<div class="mock-review-item">' +
      '<div class="topic">' + q.topicIcon + ' ' + q.topic + '</div>' +
      '<div class="question">' + q.q + '</div>' +
      '<span class="verdict ' + verdictClass + '">' + verdictText + '</span>' +
      '</div>';
  }

  document.getElementById('mockContainer').innerHTML =
    '<div class="mock-summary">' +
    '<h2>📊 模拟面试总结</h2>' +
    '<div class="mock-stat-row">' +
    '<div class="mock-stat"><div class="num">' + total + '</div><div class="label">总题数</div></div>' +
    '<div class="mock-stat"><div class="num" style="color:#10b981">' + good + '</div><div class="label">答得好</div></div>' +
    '<div class="mock-stat"><div class="num" style="color:#f59e0b">' + fuzzy + '</div><div class="label">模糊</div></div>' +
    '<div class="mock-stat"><div class="num" style="color:#ef4444">' + (skip + unanswer) + '</div><div class="label">跳过/未答</div></div>' +
    '<div class="mock-stat"><div class="num">' + mins + ':' + (secs < 10 ? '0' : '') + secs + '</div><div class="label">用时</div></div>' +
    '</div>' +
    '<div style="text-align:center;margin-bottom:20px;color:#94a3b8;font-size:14px">正确率 ' + Math.round(good / total * 100) + '% — ' +
    (good >= total * 0.7 ? '表现不错，继续保持！' : good >= total * 0.4 ? '还有提升空间，重点复习模糊的题。' : '建议回到自测模式加强练习。') +
    '</div>' +
    '<h4 style="color:#e2e8f0;margin-bottom:12px;font-size:15px">📝 题目回顾</h4>' +
    reviewHtml +
    '</div>' +
    '<div class="mock-nav" style="justify-content:center">' +
    '<button class="mock-btn-primary" onclick="openMockInterview()">🔄 再来一轮</button>' +
    '<button class="mock-btn-secondary" onclick="closeMock()">返回学习</button>' +
    '</div>';
}

function closeMock() {
  document.getElementById('mockOverlay').classList.remove('active');
  if (mockTimerInterval) clearInterval(mockTimerInterval);
  mockState = null;
}

{t:'Redis',q:'Redis 分布式锁的正确实现方式是？',o:['SETNX + EXPIRE 两条命令','SET key value NX EX timeout 一条命令','GETSET 命令','INCR 命令'],a:1,e:'SETNX + EXPIRE 两条命令不是原子的，如果 SETNX 成功后进程崩溃，EXPIRE 没执行会导致死锁。正确做法是 SET key value NX EX timeout 一条命令原子设置值和过期时间。Redisson 在此基础上加了看门狗自动续期。'},
{t:'Redis',q:'缓存穿透是指什么？',o:['缓存中数据过期了','查询一个不存在的数据，缓存和数据库都查不到','大量缓存同时过期导致请求打到数据库','缓存数据与数据库不一致'],a:1,e:'缓存穿透：查询不存在的数据，缓存不命中，每次都查数据库。解决方案：布隆过滤器拦截、缓存空值。缓存击穿：热点 key 过期瞬间大量请求打到 DB。缓存雪崩：大量 key 同时过期。'},
{t:'Redis',q:'Redis Cluster 使用多少个哈希槽（slot）？',o:['1024','4096','16384','65536'],a:2,e:'Redis Cluster 使用 16384 个哈希槽。原因：1) 心跳包大小合理（bitmap 约 2KB）；2) 节点数通常不超过 1000；3) 压缩比好。每个 key 通过 CRC16(key) % 16384 分配到对应 slot。'},
{t:'Redis',q:'Cache Aside 模式的正确更新顺序是？',o:['先更新缓存，再更新数据库','先删除缓存，再更新数据库','先更新数据库，再删除缓存','先更新数据库，再更新缓存'],a:2,e:'Cache Aside：读时先查缓存，miss 则查 DB 并写缓存。写时先更新 DB，再删除缓存（不是更新缓存）。删除比更新更安全，避免并发写导致脏数据。配合延迟双删或 Canal 订阅 Binlog 可进一步保证一致性。'},
{t:'消息队列',q:'以下哪项不是 Kafka 高吞吐的原因？',o:['顺序写磁盘','零拷贝（sendfile）','分区并行处理','所有数据存储在内存中'],a:3,e:'Kafka 高吞吐原因：顺序写磁盘（比随机写快 10 倍+）、零拷贝（sendfile 减少数据拷贝）、分区并行（多 Partition 多 Consumer 并行处理）、批量发送压缩。Kafka 数据在磁盘上，不在内存中。'},
{t:'消息队列',q:'RocketMQ 如何保证消息不丢失？',o:['异步刷盘','同步刷盘 + 多副本同步复制','只在内存中保存','消费者自动确认'],a:1,e:'RocketMQ 保证不丢失：生产端同步发送+重试、Broker 端同步刷盘（数据写磁盘后才返回 ACK）+ 多副本同步复制（主从都写成功才算成功）、消费端手动 ACK（业务处理成功后才确认）。'},
{t:'Spring',q:'以下哪种情况会导致 @Transactional 失效？',o:['在不同类之间调用','方法为 public','同类方法内部调用','抛出 RuntimeException'],a:2,e:'@Transactional 基于 AOP 代理实现。同类内部调用时走的是原始方法而非代理方法，所以事务不生效。解决：注入自身再调用、AopContext.currentProxy()、或拆到不同类。其他失效场景：private 方法、非 Spring 管理的类、异常被 catch 吞掉。'},
{t:'Spring',q:'Spring Boot 自动配置的核心机制是什么？',o:['@ComponentScan 扫描包路径','@EnableAutoConfiguration + @Conditional 条件注解','XML 配置文件加载','Spring Cloud Config'],a:1,e:'自动配置核心：@EnableAutoConfiguration 触发 AutoConfigurationImportSelector，加载 META-INF/spring/AutoConfiguration.imports 中的配置类，每个配置类通过 @ConditionalOnClass、@ConditionalOnMissingBean 等条件注解判断是否生效。'},
{t:'Spring Cloud',q:'Nacos 注册中心支持哪两种一致性模式？',o:['只支持 AP','只支持 CP','AP 和 CP 模式','强一致性和最终一致性'],a:2,e:'Nacos 同时支持 AP（临时实例，Distro 协议，心跳保活，性能好）和 CP（永久实例，Raft 协议，服务端健康检查，数据强一致）。默认使用 AP 模式，大多数微服务场景够用。'},
{t:'Spring Cloud',q:'微服务中熔断器的主要作用是什么？',o:['提高系统性能','增加系统吞吐量','防止故障级联传播','实现负载均衡'],a:2,e:'熔断器（Circuit Breaker）的作用：当下游服务故障率超过阈值时，熔断器打开，后续请求直接走 fallback，不再调用故障服务。防止故障级联传播（雪崩效应），给下游服务恢复的时间。经过探测期后自动尝试恢复。'},
{t:'Docker/K8s',q:'K8s 中 Deployment 和 StatefulSet 的主要区别是？',o:['Deployment 用于生产环境，StatefulSet 用于测试环境','StatefulSet 维护 Pod 的稳定标识（名称、网络、存储）','Deployment 不支持滚动更新','StatefulSet 不支持副本数设置'],a:1,e:'StatefulSet 用于有状态应用（如数据库），保证 Pod 的稳定标识：稳定的网络标识（pod-0, pod-1）、稳定的持久化存储（PVC 与 Pod 绑定）、有序部署和删除。Deployment 用于无状态应用，Pod 名称和存储都是随机的。'},
{t:'Docker/K8s',q:'蓝绿部署的核心特点是什么？',o:['逐步替换旧版本实例','同时维护新旧两套完整环境，切换流量实现零停机','先部署到一小部分节点测试','通过修改代码配置实现灰度'],a:1,e:'蓝绿部署：维护两套完整环境（蓝色=当前版本，绿色=新版本），新版本在绿色环境验证通过后，通过负载均衡器一次性切换所有流量到绿色环境。优点：零停机、可快速回滚。缺点：需要双倍资源。金丝雀发布是逐步替换，不是一次性切换。'},
{t:'Java并发',q:'AQS 中 state 字段在 Semaphore 中表示什么？',o:['重入次数','剩余许可数','等待线程数','队列长度'],a:1,e:'AQS 中 state 的含义因实现而异：ReentrantLock 中 state = 重入次数；Semaphore 中 state = 剩余许可数；CountDownLatch 中 state = 计数值；ReentrantReadWriteLock 中高 16 位 = 读锁数，低 16 位 = 写锁重入数。'},
{t:'JVM',q:'JVM 栈帧中不包含以下哪个部分？',o:['局部变量表','操作数栈','动态链接','堆对象引用'],a:3,e:'JVM 栈帧包含：局部变量表（方法参数+局部变量）、操作数栈（运算中间结果）、动态链接（指向运行时常量池的方法引用）、方法返回地址。栈帧中存的是对象引用（地址），不是堆对象本身。'},
{t:'Redis',q:'Redis 单线程为什么还能有高并发性能？',o:['使用了多核并行计算','纯内存操作 + IO 多路复用 + 单线程避免上下文切换和锁竞争','使用了协程','底层用了多线程'],a:1,e:'Redis 快的原因：1) 纯内存操作（纳秒级）；2) IO 多路复用（epoll，单线程处理大量连接）；3) 单线程避免多线程上下文切换和锁竞争开销。6.0 引入的多线程只用于网络 I/O 读写，命令执行仍然是单线程。'},
{t:'MySQL',q:'聚簇索引和非聚簇索引的核心区别是什么？',o:['聚簇索引更快','聚簇索引的叶子节点存储完整行数据，非聚簇索引存储主键值','非聚簇索引不能用','聚簇索引只能有一个'],a:1,e:'聚簇索引（主键索引）：B+ 树叶子节点存储完整行数据。非聚簇索引（二级索引）：叶子节点存储主键值，查完整数据需要回表（再到聚簇索引查一次）。覆盖索引可以避免回表。'},
{t:'消息队列',q:'消息队列中幂等性设计的最佳实践是？',o:['消费端做去重即可','生产端不重试','Redis SETNX 快速拦截 + 数据库唯一索引兜底','依赖 MQ 自带的幂等保证'],a:2,e:'幂等性最佳实践是双重保障：1) Redis SETNX 做快速去重（毫秒级，高并发下拦截重复消息）；2) 数据库唯一索引做兜底（强一致，即使 Redis 失效也不会重复处理业务）。单独用任一种都有风险。'}
];
var quizState = null;

function openQuiz() {
  var shuffled = QUIZ_DATA.slice();
  for (var i = shuffled.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
  }
  quizState = {
    questions: shuffled.slice(0, 20),
    current: 0,
    answers: [],
    correct: 0,
    answered: false
  };
  document.getElementById('quizOverlay').classList.add('active');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  var c = document.getElementById('quizContainer');
  var s = quizState;
  if (!s) return;
  var idx = s.current;
  var total = s.questions.length;
  var q = s.questions[idx];
  var pct = Math.round((idx / total) * 100);
  var labels = ['A','B','C','D'];

  var optHtml = '';
  for (var i = 0; i < q.o.length; i++) {
    var cls = 'quiz-option';
    if (s.answered) {
      cls += ' disabled';
      if (i === s.answers[idx] && i === q.a) cls += ' selected-correct';
      else if (i === s.answers[idx] && i !== q.a) cls += ' selected-wrong';
      else if (i === q.a) cls += ' show-correct';
    }
    optHtml += '<div class="' + cls + '" onclick="quizSelect(' + i + ')">' +
      '<span class="opt-label">' + labels[i] + '</span>' +
      '<span>' + q.o[i] + '</span></div>';
  }

  var explainHtml = '';
  if (s.answered) {
    explainHtml = '<div class="quiz-explain visible"><strong>💡 解析：</strong>' + q.e + '</div>';
  }

  c.innerHTML = '<div class="quiz-header"><h2>📝 选择题模式</h2>' +
    '<span class="quiz-score">' + s.correct + '/' + total + ' 正确</span></div>' +
    '<div class="quiz-progress"><div class="quiz-progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="quiz-topic-tag">' + q.t + '</div>' +
    '<div class="quiz-question"><h3>' + (idx + 1) + '. ' + q.q + '</h3></div>' +
    '<div class="quiz-options">' + optHtml + '</div>' +
    explainHtml +
    '<div class="quiz-nav">' +
    (s.answered ? (idx < total - 1
      ? '<button class="mock-btn-primary" onclick="quizNext()">下一题 ➡</button>'
      : '<button class="mock-btn-success" onclick="quizFinish()">📊 查看结果</button>')
      : '') +
    '<button class="mock-btn-danger" onclick="closeQuiz()" style="font-size:12px">退出</button>' +
    '</div>';
}

function quizSelect(optIdx) {
  if (!quizState || quizState.answered) return;
  var q = quizState.questions[quizState.current];
  quizState.answers[quizState.current] = optIdx;
  quizState.answered = true;
  if (optIdx === q.a) quizState.correct++;
  renderQuizQuestion();
}

function quizNext() {
  if (quizState.current < quizState.questions.length - 1) {
    quizState.current++;
    quizState.answered = false;
    renderQuizQuestion();
  }
}

function quizFinish() {
  var s = quizState;
  var total = s.questions.length;
  var pct = Math.round(s.correct / total * 100);
  var reviewHtml = '';
  for (var i = 0; i < total; i++) {
    var q = s.questions[i];
    var isCorrect = s.answers[i] === q.a;
    reviewHtml += '<div class="quiz-review-item">' +
      '<div class="qr-q">' + (i + 1) + '. ' + q.q + '</div>' +
      '<div class="qr-result ' + (isCorrect ? 'qr-correct' : 'qr-wrong') + '">' +
      (isCorrect ? '✅ 答对' : '❌ 答错 — 正确答案：' + ['A','B','C','D'][q.a]) + '</div></div>';
  }
  document.getElementById('quizContainer').innerHTML =
    '<div class="quiz-summary"><h2>📊 选择题结果</h2>' +
    '<div class="mock-stat-row">' +
    '<div class="mock-stat"><div class="num">' + total + '</div><div class="label">总题数</div></div>' +
    '<div class="mock-stat"><div class="num" style="color:#10b981">' + s.correct + '</div><div class="label">答对</div></div>' +
    '<div class="mock-stat"><div class="num" style="color:#ef4444">' + (total - s.correct) + '</div><div class="label">答错</div></div>' +
    '<div class="mock-stat"><div class="num">' + pct + '%</div><div class="label">正确率</div></div>' +
    '</div>' +
    '<div style="text-align:center;margin-bottom:20px;color:#94a3b8;font-size:14px">' +
    (pct >= 80 ? '优秀！基础扎实，继续保持。' : pct >= 60 ? '不错，还有提升空间，重点复习答错的题。' : '建议回到卡片模式系统学习后再来挑战。') +
    '</div>' +
    '<h4 style="color:#e2e8f0;margin-bottom:12px;font-size:15px">📝 答题回顾</h4>' +
    reviewHtml + '</div>' +
    '<div class="quiz-nav" style="justify-content:center">' +
    '<button class="mock-btn-primary" onclick="openQuiz()">🔄 再来一轮</button>' +
    '<button class="mock-btn-secondary" onclick="closeQuiz()">返回学习</button></div>';
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('active');
  quizState = null;
}

// ========== 个人定制展开查看 ==========
function togglePrio(topicId, cardIdx) {
  var el = event.currentTarget;
  var key = topicId + '_' + cardIdx;
  var existing = el.nextElementSibling;
  // 如果已展开，关闭
  if (existing && existing.classList.contains('prio-expand')) {
    existing.classList.remove('open');
    el.classList.remove('expanded');
    setTimeout(function() { if (existing.parentNode) existing.parentNode.removeChild(existing); }, 400);
    return;
  }
  // 关闭其他已展开的
  document.querySelectorAll('.prio-expand.open').forEach(function(pe) {
    pe.classList.remove('open');
    if (pe.previousElementSibling) pe.previousElementSibling.classList.remove('expanded');
    setTimeout(function() { if (pe.parentNode) pe.parentNode.removeChild(pe); }, 400);
  });
  // 查找卡片数据
  var topic = DATA.find(function(t) { return t.id === topicId; });
  if (!topic || !topic.cards[cardIdx]) return;
  var card = topic.cards[cardIdx];
  var fu = FU[key] || '';
  var m = mastery[key] || '';
  // 创建展开面板
  var wrap = document.createElement('div');
  wrap.className = 'prio-expand';
  var inner = '<div class="prio-expand-inner">' + card.a;
  if (fu) inner += '<div class="followup-wrap"><h4>&#128172; 面试官可能的追问</h4>' + fu + '</div>';
  inner += '<div class="prio-actions"><span>掌握程度：</span>';
  inner += '<button class="prio-rate-btn rg ' + (m==='mastered'?'chosen':'') + '" onclick="event.stopPropagation();prioRate(\'' + key + '\',\'mastered\')">✅ 熟练</button>';
  inner += '<button class="prio-rate-btn ry ' + (m==='fuzzy'?'chosen':'') + '" onclick="event.stopPropagation();prioRate(\'' + key + '\',\'fuzzy\')">⚠️ 模糊</button>';
  inner += '<button class="prio-rate-btn rr ' + (m==='unmastered'?'chosen':'') + '" onclick="event.stopPropagation();prioRate(\'' + key + '\',\'unmastered\')">❌ 不会</button>';
  inner += '<span class="prio-jump-link" onclick="event.stopPropagation();jumpTo(\'' + topicId + '\',' + cardIdx + ')">去原卡片 →</span>';
  inner += '</div></div>';
  wrap.innerHTML = inner;
  el.parentNode.insertBefore(wrap, el.nextSibling);
  el.classList.add('expanded');
  // 动画展开
  requestAnimationFrame(function() { wrap.classList.add('open'); });
  // 同步 mastery 样式
  updatePrioMasteryStyle(el, key);
}
function updatePrioMasteryStyle(el, key) {
  var m = mastery[key] || '';
  el.classList.remove('mastered', 'fuzzy', 'unmastered');
  if (m) el.classList.add(m);
}
function prioRate(key, level) {
  if (mastery[key] === level) { delete mastery[key]; } else { mastery[key] = level; }
  try { localStorage.setItem('fu_mastery', JSON.stringify(mastery)); } catch(e) {}
  // 更新当前展开面板的按钮
  var panel = document.querySelector('.prio-expand.open .prio-expand-inner');
  if (panel) {
    panel.querySelectorAll('.prio-rate-btn').forEach(function(btn) { btn.classList.remove('chosen'); });
    var m = mastery[key] || '';
    if (m === 'mastered') panel.querySelector('.rg').classList.add('chosen');
    if (m === 'fuzzy') panel.querySelector('.ry').classList.add('chosen');
    if (m === 'unmastered') panel.querySelector('.rr').classList.add('chosen');
  }
  // 更新 prio-item 的边框样式
  var el = event.target.closest('.prio-expand');
  if (el && el.previousElementSibling) updatePrioMasteryStyle(el.previousElementSibling, key);
  // 如果当前在其他板块，也刷新（同步标记）
  if (currentTopic !== 'personal') renderContent();
}

// ========== 个人定制跳转 ==========
function jumpTo(topicId, cardIdx) {
  if (testMode) toggleTestMode();
  currentTopic = topicId;
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  renderNav();
  renderContent();
  setTimeout(function() {
    var key = topicId + '_' + cardIdx;
    var card = document.getElementById('card_' + key);
    if (card) {
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.transition = 'box-shadow .3s';
      card.style.boxShadow = '0 0 0 3px #818cf8';
      setTimeout(function() { card.style.boxShadow = ''; }, 2000);
    }
  }, 100);
}

init();
</script>
