<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Java 面试知识卡片 - 3年经验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4f46e5;--primary-light:#eef2ff;--sidebar-bg:#1e293b;--sidebar-w:clamp(200px,16vw,280px);--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;--bg:#f8fafc;--card-bg:#fff;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--code-bg:#f1f5f9;--vh:1vh;--content-px:clamp(16px,4vw,64px)}
html{overflow-y:scroll;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;min-height:100dvh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);color:#e2e8f0;position:fixed;top:0;left:0;height:100vh;height:100dvh;overflow-y:auto;overflow-y:overlay;z-index:100;transition:transform .3s}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-header h1{font-size:18px;color:#fff;font-weight:700}
.sidebar-header p{font-size:12px;color:#94a3b8;margin-top:4px}
.sidebar-nav{padding:12px 0}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;transition:all .2s;font-size:14px;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.08);border-left-color:var(--primary);color:#fff}
.nav-item .badge{background:rgba(255,255,255,.15);color:#94a3b8;font-size:11px;padding:2px 8px;border-radius:10px;min-width:28px;text-align:center}
.nav-item.active .badge{background:var(--primary);color:#fff}
.sidebar-stats{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#818cf8);border-radius:3px;transition:width .5s}
.stats-text{font-size:12px;color:#94a3b8}
.main{margin-left:var(--sidebar-w);min-height:100vh;min-height:100dvh;width:calc(100% - var(--sidebar-w))}
.topbar{position:sticky;top:0;background:rgba(248,250,252,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px var(--content-px);display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);z-index:50}
.search-box{flex:1;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:#fff;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-light)}
.topbar-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:var(--text);transition:all .2s;white-space:nowrap}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#4338ca}
.content{padding:24px var(--content-px) 80px}
.section{display:none}
.section.active{display:block}
.section-title{font-size:clamp(20px,2vw,26px);font-weight:700;margin-bottom:8px;color:var(--text)}
.section-desc{font-size:clamp(13px,1.2vw,15px);color:var(--text-light);margin-bottom:24px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.card.reviewed{border-left:3px solid var(--success)}
.card-header{padding:16px 20px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;user-select:none}
.card-header:hover{background:var(--primary-light)}
.card-check{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.card-check.checked{background:var(--success);border-color:var(--success)}
.card-check.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.card-q{flex:1;font-weight:600;font-size:15px;color:var(--text)}
.card-q .q-tag{display:inline-block;background:var(--primary-light);color:var(--primary);font-size:11px;padding:1px 6px;border-radius:4px;margin-right:6px;font-weight:700}
.card-arrow{color:var(--text-light);transition:transform .3s;flex-shrink:0;margin-top:4px}
.card.open .card-arrow{transform:rotate(180deg)}
.card-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.card.open .card-body{max-height:10000px}
.card-answer{padding:0 20px 20px;border-top:1px solid var(--border);font-size:14px;line-height:1.8}
.card-answer h4{margin:16px 0 8px;color:var(--primary);font-size:14px}
.card-answer p{margin:8px 0}
.card-answer ul,.card-answer ol{margin:8px 0 8px 20px}
.card-answer li{margin:4px 0}
.card-answer strong{color:var(--text);font-weight:600}
.card-answer table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.card-answer th,.card-answer td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.card-answer th{background:var(--primary-light);color:var(--primary);font-weight:600}
.card-answer tr:nth-child(even){background:#f8fafc}
.followup-wrap{margin-top:20px;border-top:2px dashed var(--border);padding-top:16px}
.followup-wrap h4{color:var(--warning);font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.fu{background:#fffbeb;border-left:3px solid var(--warning);padding:10px 14px;margin:8px 0;border-radius:0 8px 8px 0;font-size:13px;line-height:1.7}
.fu-q{font-weight:700;color:#b45309;margin-bottom:4px}
.fu-a{color:#78350f}
.fu-tag{display:inline-block;background:#fffbeb;color:var(--warning);font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600;border:1px solid #fde68a}
pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:10px 0;font-size:13px;line-height:1.5}
code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:13px}
p code,li code,td code{background:var(--code-bg);padding:2px 6px;border-radius:4px;color:#e11d48;font-size:12px}
blockquote{background:var(--primary-light);border-left:3px solid var(--primary);padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0;font-size:13px;color:#4338ca}
.top-list{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.top-list h3{font-size:18px;margin-bottom:16px;color:var(--text)}
.top-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.top-item:last-child{border:none}
.top-rank{width:28px;height:28px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:12px;flex-shrink:0}
.top-item:nth-child(-n+3) .top-rank{background:var(--primary);color:#fff}
.plan-table{width:100%;border-collapse:collapse;margin:12px 0}
.plan-table th,.plan-table td{border:1px solid var(--border);padding:10px 14px;font-size:14px}
.plan-table th{background:var(--primary);color:#fff}
.plan-table tr:nth-child(even){background:var(--primary-light)}
.search-highlight{background:#fef08a;padding:1px 2px;border-radius:2px}
.no-results{text-align:center;padding:60px 20px;color:var(--text-light)}
.no-results svg{margin-bottom:16px}
.menu-toggle{display:none;position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:24px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(79,70,229,.4)}
@media(max-width:1024px){
:root{--sidebar-w:220px}
.sidebar-header h1{font-size:16px}
.nav-item{padding:8px 16px;font-size:13px}
}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0;width:100%}
.topbar{padding:10px 12px;flex-wrap:wrap}
.topbar-actions{flex-wrap:wrap;gap:6px}
.btn{padding:6px 12px;font-size:12px}
.content{padding:12px 14px 60px}
.menu-toggle{display:flex;align-items:center;justify-content:center}
}
.topic-icon{font-size:18px;margin-right:8px}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.btn-test{background:#f59e0b;color:#fff;border-color:#f59e0b}.btn-test:hover{background:#d97706}
.btn-test.active{background:#d97706;box-shadow:inset 0 2px 4px rgba(0,0,0,.2)}
.btn-mock{background:#8b5cf6;color:#fff;border-color:#8b5cf6}.btn-mock:hover{background:#7c3aed}
.test-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #f59e0b;border-radius:10px;padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;font-size:14px;color:#92400e}
.test-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.test-filter-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:var(--text);transition:all .2s}
.test-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.test-filter-btn .cnt{background:rgba(0,0,0,.1);padding:1px 6px;border-radius:10px;margin-left:4px;font-size:11px}
.test-filter-btn.active .cnt{background:rgba(255,255,255,.3)}
.card.mastered{border-left:3px solid #10b981}.card.fuzzy{border-left:3px solid #f59e0b}.card.unmastered{border-left:3px solid #ef4444}
.card-answer.hidden-answer{display:none}
.show-answer-btn{display:block;margin:16px 20px;padding:10px 24px;background:linear-gradient(135deg,var(--primary),#818cf8);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s}
.show-answer-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.rate-bar{display:flex;gap:8px;padding:0 20px 16px;align-items:center}
.rate-bar span{font-size:13px;color:var(--text-light);margin-right:4px}
.rate-btn{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid;transition:all .2s;background:#fff}
.rate-btn.r-green{border-color:#10b981;color:#10b981}.rate-btn.r-green:hover,.rate-btn.r-green.chosen{background:#10b981;color:#fff}
.rate-btn.r-yellow{border-color:#f59e0b;color:#f59e0b}.rate-btn.r-yellow:hover,.rate-btn.r-yellow.chosen{background:#f59e0b;color:#fff}
.rate-btn.r-red{border-color:#ef4444;color:#ef4444}.rate-btn.r-red:hover,.rate-btn.r-red.chosen{background:#ef4444;color:#fff}
.mock-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#0f172a;z-index:1000;overflow-y:auto}
.mock-overlay.active{display:block}
.mock-container{max-width:760px;margin:0 auto;padding:40px 24px 80px}
.mock-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.mock-header h2{color:#fff;font-size:20px}
.mock-timer{background:rgba(255,255,255,.1);color:#e2e8f0;padding:8px 16px;border-radius:8px;font-size:16px;font-family:monospace}
.mock-progress{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.mock-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;color:#64748b;transition:all .3s}
.mock-dot.current{background:var(--primary);color:#fff;transform:scale(1.15)}
.mock-dot.answered{background:rgba(16,185,129,.3);color:#10b981}
.mock-dot.fuzzy{background:rgba(245,158,11,.3);color:#f59e0b}
.mock-dot.skipped{background:rgba(239,68,68,.3);color:#ef4444}
.mock-topic-tag{display:inline-block;background:rgba(139,92,246,.2);color:#a78bfa;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:16px}
.mock-question{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:28px 24px;margin-bottom:24px}
.mock-question h3{color:#fff;font-size:18px;line-height:1.7;font-weight:600}
.mock-answer-area{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px;margin-bottom:24px;color:#e2e8f0;font-size:14px;line-height:1.8;display:none}
.mock-answer-area.visible{display:block}
.mock-answer-area h4{color:#10b981;margin-bottom:12px;font-size:14px}
.mock-answer-area h5{margin:12px 0 6px;color:#f59e0b;font-size:13px}
.mock-nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.mock-nav button{padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;border:none;transition:all .2s}
.mock-btn-primary{background:var(--primary);color:#fff}.mock-btn-primary:hover{background:#4338ca}
.mock-btn-secondary{background:rgba(255,255,255,.1);color:#e2e8f0}.mock-btn-secondary:hover{background:rgba(255,255,255,.2)}
.mock-btn-success{background:#10b981;color:#fff}.mock-btn-success:hover{background:#059669}
.mock-btn-danger{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}.mock-btn-danger:hover{background:rgba(239,68,68,.3)}
.mock-summary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:32px;margin-bottom:24px}
.mock-summary h2{color:#fff;font-size:22px;margin-bottom:20px;text-align:center}
.mock-stat-row{display:flex;justify-content:center;gap:32px;margin-bottom:24px;flex-wrap:wrap}
.mock-stat{text-align:center}.mock-stat .num{font-size:28px;font-weight:700;color:#fff}.mock-stat .label{font-size:12px;color:#94a3b8;margin-top:4px}
.mock-review-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:16px;margin-bottom:12px}
.mock-review-item .topic{font-size:11px;color:#a78bfa;margin-bottom:4px}
.mock-review-item .question{color:#e2e8f0;font-size:14px;margin-bottom:8px;font-weight:600}
.mock-review-item .verdict{font-size:12px;padding:2px 8px;border-radius:4px;display:inline-block}
.verdict-good{background:rgba(16,185,129,.15);color:#10b981}
.verdict-fuzzy{background:rgba(245,158,11,.15);color:#f59e0b}
.verdict-skip{background:rgba(239,68,68,.15);color:#ef4444}
@media(max-width:768px){.mock-container{padding:20px 12px 60px}.mock-question{padding:20px 16px}.mock-question h3{font-size:16px}}
.btn-quiz{background:#06b6d4;color:#fff;border-color:#06b6d4}.btn-quiz:hover{background:#0891b2}
.quiz-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#0f172a;z-index:1000;overflow-y:auto}
.quiz-overlay.active{display:block}
.quiz-container{max-width:700px;margin:0 auto;padding:40px 24px 80px}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.quiz-header h2{color:#fff;font-size:20px}
.quiz-score{color:#94a3b8;font-size:14px}
.quiz-progress{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-bottom:28px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#06b6d4,#818cf8);border-radius:3px;transition:width .4s}
.quiz-topic-tag{display:inline-block;background:rgba(6,182,212,.2);color:#67e8f9;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:16px}
.quiz-question{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px;margin-bottom:20px}
.quiz-question h3{color:#fff;font-size:17px;line-height:1.7;font-weight:600}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.quiz-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;cursor:pointer;transition:all .2s;color:#e2e8f0;font-size:14px;line-height:1.6;text-align:left}
.quiz-option:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.quiz-option.selected-correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.selected-wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.show-correct{background:rgba(16,185,129,.1);border-color:#10b981;color:#6ee7b7}
.quiz-option.disabled{pointer-events:none}
.quiz-option .opt-label{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#94a3b8;flex-shrink:0}
.quiz-option.selected-correct .opt-label{background:#10b981;color:#fff}
.quiz-option.selected-wrong .opt-label{background:#ef4444;color:#fff}
.quiz-option.show-correct .opt-label{background:#10b981;color:#fff}
.quiz-explain{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px 20px;margin-bottom:20px;color:#cbd5e1;font-size:13px;line-height:1.8;display:none}
.quiz-explain.visible{display:block}
.quiz-explain strong{color:#67e8f9}
.quiz-nav{display:flex;gap:12px;justify-content:center}
.quiz-summary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:32px;margin-bottom:24px}
.quiz-summary h2{color:#fff;font-size:22px;margin-bottom:20px;text-align:center}
.quiz-review-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px;margin-bottom:10px;font-size:13px}
.quiz-review-item .qr-q{color:#e2e8f0;font-weight:600;margin-bottom:6px}
.quiz-review-item .qr-result{font-size:12px}
.qr-correct{color:#10b981}.qr-wrong{color:#ef4444}
@media(max-width:768px){.quiz-container{padding:20px 12px 60px}.quiz-question{padding:18px 14px}.quiz-question h3{font-size:15px}.quiz-option{padding:12px 14px;font-size:13px}}
.profile-card{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:12px;padding:24px;color:#fff;margin-bottom:8px}
.profile-card h3{font-size:18px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.profile-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.profile-tag{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:12px;backdrop-filter:blur(4px)}
.profile-tag.warn{background:rgba(239,68,68,.3);border:1px solid rgba(255,255,255,.2)}
.profile-tag.ok{background:rgba(16,185,129,.3);border:1px solid rgba(255,255,255,.2)}
.profile-advice{background:rgba(255,255,255,.1);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8}
.profile-advice strong{color:#fde68a}
.prio-group{margin-bottom:20px}
.prio-group h4{font-size:15px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:6px}
.prio-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;background:#fff}
.prio-item:hover{border-color:var(--primary);background:var(--primary-light);transform:translateX(4px)}
.prio-item .pi-q{font-size:13px;font-weight:500;flex:1}
.prio-item .pi-from{font-size:11px;color:var(--text-light);margin-left:8px;white-space:nowrap}
.prio-item .pi-star{color:#f59e0b;margin-right:8px;font-size:14px;flex-shrink:0}
.prio-item .pi-num{background:var(--primary-light);color:var(--primary);font-size:11px;padding:2px 8px;border-radius:10px;margin-right:10px;font-weight:600;flex-shrink:0}
.prio-item .pi-arrow{color:var(--text-light);transition:transform .3s;flex-shrink:0;font-size:12px}
.prio-item.expanded .pi-arrow{transform:rotate(180deg)}
.prio-item.mastered{border-left:3px solid #10b981;background:#f0fdf4}

{q:"第一周：夯实基础",a:`<table class="plan-table"><tr><th>日期</th><th>复习内容</th><th>预计时间</th></tr><tr><td>Day 1-2</td><td>Java基础：集合框架（HashMap、ConcurrentHashMap必背）</td><td>3-4h/天</td></tr><tr><td>Day 3-4</td><td>Java基础：并发编程（线程池、锁、JUC工具类必背）</td><td>3-4h/天</td></tr><tr><td>Day 5</td><td>Java基础：JVM（内存模型、GC、调优参数）</td><td>3-4h</td></tr><tr><td>Day 6-7</td><td>Spring：IOC/AOP原理、Bean生命周期、事务</td><td>3-4h/天</td></tr></table>`},

{id:"java",icon:"☕",title:"Java 基础",desc:"集合框架 · 并发编程 · JVM — 共25题",cards:[
{q:"HashMap 的底层实现原理是什么？JDK8 前后有什么区别？",a:`<h4>JDK 1.7 及之前</h4><ul><li>底层采用 <strong>数组 + 链表</strong> 实现，数组是 <code>Entry&lt;K,V&gt;[]</code></li><li>通过 key 的 <code>hashCode()</code> 计算哈希值，再经过扰动函数 <code>(h = key.hashCode()) ^ (h &gt;&gt;&gt; 16)</code> 得到数组下标</li><li>发生哈希冲突时，新元素以<strong>头插法</strong>插入链表</li><li>扩容时需要 rehash，多线程下头插法会导致<strong>链表形成环形结构</strong>，造成死循环</li></ul><h4>JDK 1.8</h4><ul><li>底层改为 <strong>数组 + 链表 + 红黑树</strong>，节点类型变为 <code>Node&lt;K,V&gt;</code></li><li>当链表长度 <strong>&gt;= 8</strong> 且数组长度 <strong>&gt;= 64</strong> 时，链表转化为红黑树，查找时间复杂度从 O(n) 降为 O(log n)</li><li>当红黑树节点数 <strong>&lt;= 6</strong> 时，退化回链表</li><li>插入改为<strong>尾插法</strong>，解决了扩容时的环形链表问题</li></ul><h4>关键设计细节</h4><ul><li>数组长度必须是 2 的幂次方，可以用 <code>(n - 1) &amp; hash</code> 代替取模运算</li><li>默认初始容量 16，负载因子 0.75，阈值 = 容量 × 负载因子</li></ul>`},
{q:"HashMap 的扩容机制是怎样的？",a:`<h4>扩容触发条件</h4><p>当 <code>size &gt; threshold</code>（容量 × 负载因子，默认 12）时触发扩容。</p><h4>扩容过程（JDK 1.8）</h4><ol><li>容量翻倍（<code>newCap = oldCap &lt;&lt; 1</code>），阈值也翻倍</li><li>创建新的 <code>Node[]</code> 数组</li><li>遍历旧数组每个桶：<ul><li>只有一个节点：直接计算新位置 <code>e.hash &amp; (newCap - 1)</code></li><li>链表：利用 <code>e.hash &amp; oldCap</code> 拆成两条链表（0 留原位，1 移到 原索引+oldCap）</li><li>红黑树：同样拆分，节点数 &lt;= 6 则退化为链表</li></ul></li></ol><h4>设计巧妙之处</h4><p>不需要重新计算 hash，只需要看 hash 值新增的那一位是 0 还是 1，就能确定新位置。</p><blockquote>HashMap 的 resize() 在多线程下仍不安全，可能出现数据覆盖。</blockquote>`},
{q:"ConcurrentHashMap 的实现原理？JDK8 前后区别？",a:`<h4>JDK 1.7 — 分段锁（Segment）</h4><ul><li>底层是 <code>Segment[]</code>，每个 Segment 继承 <code>ReentrantLock</code></li><li>默认 16 个 Segment，最多支持 16 线程并发写入</li><li>定位元素需要两次 hash</li></ul><h4>JDK 1.8 — CAS + synchronized</h4><ul><li>采用 <code>Node[]</code> 数组 + 链表 + 红黑树</li><li>使用 <strong>CAS</strong> 进行数组初始化和节点插入（桶为空时）</li><li>使用 <strong>synchronized 锁住头节点</strong>，粒度更细</li><li><code>size()</code> 使用 <code>baseCount + CounterCell[]</code>，类似 LongAdder</li><li><code>get()</code> 完全无锁，利用 volatile 保证可见性</li></ul><table><tr><th>特性</th><th>JDK 1.7</th><th>JDK 1.8</th></tr><tr><td>锁粒度</td><td>Segment（段锁）</td><td>桶头节点（行锁）</td></tr><tr><td>并发度</td><td>默认 16</td><td>数组长度</td></tr><tr><td>数据结构</td><td>数组+链表</td><td>数组+链表+红黑树</td></tr><tr><td>锁方式</td><td>ReentrantLock</td><td>synchronized+CAS</td></tr></table>`},
{q:"ArrayList 和 LinkedList 的区别及使用场景？",a:`<table><tr><th>操作</th><th>ArrayList</th><th>LinkedList</th></tr><tr><td>随机访问 get(i)</td><td>O(1)</td><td>O(n)</td></tr><tr><td>尾部插入</td><td>均摊 O(1)</td><td>O(1)</td></tr><tr><td>中间插入</td><td>O(n)</td><td>O(n)</td></tr><tr><td>头部插入</td><td>O(n)</td><td>O(1)</td></tr><tr><td>内存占用</td><td>较少</td><td>较多</td></tr></table><p><strong>ArrayList</strong> 默认容量 10，扩容为 1.5 倍。实现了 <code>RandomAccess</code> 接口。</p><p><strong>选择建议：</strong>绝大多数情况选 ArrayList（缓存友好、随机访问快）。选 LinkedList 的场景：频繁头部插入/删除、需要双端队列功能。</p>`},
{q:"HashMap 为什么线程不安全？",a:`<ol><li><strong>JDK 1.7 扩容死循环：</strong>多线程同时扩容时，头插法导致链表形成环形结构，get() 死循环 CPU 100%</li><li><strong>JDK 1.8 数据覆盖：</strong>两个线程同时 put 到同一个空桶，后执行的覆盖先执行的</li><li><strong>size 不准确：</strong><code>size++</code> 不是原子操作，多线程下丢失更新</li><li><strong>并发修改异常：</strong>迭代中另一线程修改结构，抛出 <code>ConcurrentModificationException</code></li></ol><blockquote>面试建议：HashMap 不安全体现在 JDK7 扩容死循环、JDK8 并发 put 数据覆盖、size 计数不准确。需要线程安全用 ConcurrentHashMap。</blockquote>`},
{q:"HashSet 的实现原理？",a:`<p>HashSet 内部持有一个 <strong>HashMap</strong>，元素存储在 HashMap 的 <strong>key</strong> 中，value 统一使用 <code>PRESENT</code> 常量。</p><pre>private transient HashMap&lt;E,Object&gt; map;\nprivate static final Object PRESENT = new Object();\npublic boolean add(E e) {\n    return map.put(e, PRESENT) == null;\n}</pre><p><strong>去重机制：</strong>先算 hashCode 定位桶，再 equals 比较。需正确重写 hashCode() 和 equals()。</p><p>需要有序用 <code>LinkedHashSet</code>（维护插入顺序）或 <code>TreeSet</code>（自然排序）。</p>`},
{q:"TreeMap 和 LinkedHashMap 的区别？",a:`<p><strong>TreeMap：</strong>底层红黑树，key 有序，O(log n)。支持 firstKey()、subMap() 等范围操作。key 不能为 null。适合按 key 排序的场景。</p><p><strong>LinkedHashMap：</strong>继承 HashMap，额外维护双向链表记录插入顺序。支持访问顺序模式（<code>accessOrder=true</code>），可实现 LRU 缓存。</p><pre>class LRUCache&lt;K,V&gt; extends LinkedHashMap&lt;K,V&gt; {\n    private int capacity;\n    public LRUCache(int capacity) {\n        super(capacity, 0.75f, true);\n        this.capacity = capacity;\n    }\n    @Override\n    protected boolean removeEldestEntry(Map.Entry&lt;K,V&gt; eldest) {\n        return size() > capacity;\n    }\n}</pre>`},
{q:"synchronized 和 ReentrantLock 的区别？",a:`<table><tr><th>特性</th><th>synchronized</th><th>ReentrantLock</th></tr><tr><td>层面</td><td>JVM 关键字</td><td>API 类</td></tr><tr><td>释放锁</td><td>自动释放</td><td>手动 unlock()</td></tr><tr><td>灵活性</td><td>较低</td><td>支持 tryLock、超时、中断</td></tr><tr><td>公平锁</td><td>不支持</td><td>支持</td></tr><tr><td>条件变量</td><td>wait/notify</td><td>多个 Condition</td></tr></table><h4>synchronized 锁升级（JDK 1.6）</h4><p>无锁 → 偏向锁（CAS 存线程ID）→ 轻量级锁（自旋）→ 重量级锁（OS Mutex）</p><p><strong>选择建议：</strong>简单场景用 synchronized，需要高级功能用 ReentrantLock。</p>`},
{q:"volatile 关键字的作用和原理？",a:`<h4>两大作用</h4><p><strong>1. 保证可见性：</strong>写操作后立即刷新到主内存，读操作直接从主内存读取。底层通过内存屏障实现。</p><p><strong>2. 禁止指令重排序：</strong>经典案例——双重检查锁单例：</p><pre>private static volatile Singleton instance;\npublic static Singleton getInstance() {\n    if (instance == null) {\n        synchronized (Singleton.class) {\n            if (instance == null) {\n                instance = new Singleton(); // 1.分配内存 2.初始化 3.引用赋值\n            }                               // 没有volatile可能重排为1→3→2\n        }\n    }\n    return instance;\n}</pre><p><strong>volatile 不保证原子性：</strong><code>count++</code> 仍不安全，需要 AtomicInteger 或加锁。</p><p><strong>适用场景：</strong>状态标志位、双重检查锁定、一写多读。</p>`},
{q:"CAS 原理及 ABA 问题？",a:`<h4>一、是什么（核心概念）</h4><p><strong>CAS（Compare And Swap，比较并交换）</strong>是一种无锁的原子操作机制，属于乐观锁思想。它包含三个操作数：</p><ul><li><strong>V（内存地址）：</strong>要修改的变量的当前内存位置</li><li><strong>A（期望值）：</strong>我们认为变量现在应该是什么值</li><li><strong>B（新值）：</strong>我们希望将变量更新为什么值</li></ul><p><strong>语义：</strong>仅当 V 的当前值等于 A 时，才将 V 更新为 B；否则不做任何操作（或重试）。这是一条 CPU 原子指令（x86 上是 <code>CMPXCHG</code>）。</p><blockquote>CAS 的通俗理解：就像你去银行改密码，你跟柜员说"如果我的密码还是 abc123，就帮我改成 xyz789"。如果期间别人已经改过密码了（不再是 abc123），那操作失败，你得重新查一下当前密码再试。</blockquote><h4>二、怎么用（代码示例）</h4><p><strong>AtomicInteger 内部就是 CAS 实现：</strong></p><pre>AtomicInteger count = new AtomicInteger(0);

// incrementAndGet() 底层原理（伪代码）：
// for (;;) {                          // 自旋
//     int current = get();            // 读取当前值 V
//     int next = current + 1;         // 计算新值 B
//     if (compareAndSet(current, next)) // CAS(V, current, next)
//         return next;
// }

// 实际使用
ExecutorService pool = Executors.newFixedThreadPool(10);
for (int i = 0; i &lt; 1000; i++) {
    pool.submit(() -&gt; count.incrementAndGet());
}
pool.shutdown();
pool.awaitTermination(5, TimeUnit.SECONDS);
System.out.println(count.get()); // 结果一定是 1000

// 对比：如果用普通 int count++，多线程下结果 &lt; 1000</pre><p><strong>Unsafe 类中的 CAS 方法：</strong></p><pre>// JDK 内部通过 sun.misc.Unsafe 调用 CPU 指令
// public final native boolean compareAndSwapInt(
//     Object o,     // 对象
//     long offset,  // 字段内存偏移量
//     int expected, // 期望值 A
//     int update    // 新值 B
// );</pre><h4>三、为什么（与 synchronized 对比）</h4><table><tr><th>维度</th><th>CAS（无锁）</th><th>synchronized（有锁）</th></tr><tr><td>阻塞</td><td>不阻塞线程（自旋重试）</td><td>阻塞线程（内核态切换，开销大）</td></tr><tr><td>适用场景</td><td>竞争不激烈、单变量</td><td>竞争激烈、多变量复合操作</td></tr><tr><td>性能</td><td>低竞争下优于锁（无上下文切换）</td><td>JDK 1.6 锁升级后性能也较好</td></tr><tr><td>ABA 问题</td><td>存在</td><td>不存在（互斥访问）</td></tr><tr><td>CPU 开销</td><td>高竞争下自旋浪费 CPU</td><td>线程切换有开销</td></tr></table><blockquote>生产经验：高并发计数器场景（如 QPS 统计），AtomicLong 比 synchronized 快 5-10 倍。但如果竞争极端激烈（如秒杀扣库存），自旋反而浪费 CPU，此时 LongAdder 更优（分段 CAS，类似 ConcurrentHashMap 思路）。</blockquote><h4>四、CAS 三大问题</h4><ol><li><strong>ABA 问题：</strong>值从 A 变为 B 再变回 A，CAS 检查时发现值没变，但实际上中间发生了变化。
<ul><li><strong>解决：</strong><code>AtomicStampedReference</code>（带版本号），每次修改不仅比较值还比较版本号</li></ul>
<pre>// ABA 问题演示与解决
AtomicStampedReference&lt;Integer&gt; ref = new AtomicStampedReference&lt;&gt;(100, 1);
int stamp = ref.getStamp(); // 获取版本号 1

// 线程1：值从 100 → 200 → 100（模拟 ABA）
ref.compareAndSet(100, 200, stamp, stamp + 1); // 100→200, stamp: 1→2
ref.compareAndSet(200, 100, 2, 3);              // 200→100, stamp: 2→3

// 线程2：CAS 虽然值相同，但版本号不同，会失败
boolean success = ref.compareAndSet(100, 300, 1, 2);
System.out.println(success); // false，因为 stamp 已经从 1 变成 3 了</pre></li><li><strong>自旋开销：</strong>竞争激烈时 CAS 持续失败重试，长时间自旋浪费 CPU。JDK 8 引入 <code>LongAdder</code> 通过分散热点解决。</li><li><strong>只能保证单个变量的原子性：</strong>多变量原子操作可以用 <code>AtomicReference</code> 封装为一个对象，或者使用锁。</li></ol><h4>五、CPU 指令级别原理</h4><p>CAS 在 x86 架构上对应 <code>CMPXCHG</code> 指令。多核 CPU 上需要加 <code>LOCK</code> 前缀来锁总线或锁缓存行，保证操作的原子性：</p><ul><li><strong>锁总线：</strong>早期 CPU 做法，锁住整个内存总线，其他 CPU 无法访问内存，性能差</li><li><strong>锁缓存行（Cache Line Locking）：</strong>现代 CPU 做法，只锁住对应缓存行（64 字节），其他 CPU 仍可访问其他内存区域</li></ul><p>这就是为什么 CAS 在高竞争下性能下降——频繁锁缓存行导致缓存一致性协议（MESI）开销增大。</p>`},
{q:"线程池的核心参数和工作流程？",a:`<h4>7 个核心参数</h4><table><tr><th>参数</th><th>说明</th></tr><tr><td>corePoolSize</td><td>核心线程数</td></tr><tr><td>maximumPoolSize</td><td>最大线程数</td></tr><tr><td>keepAliveTime</td><td>非核心线程空闲存活时间</td></tr><tr><td>unit</td><td>时间单位</td></tr><tr><td>workQueue</td><td>任务等待队列</td></tr><tr><td>threadFactory</td><td>线程工厂</td></tr><tr><td>handler</td><td>拒绝策略</td></tr></table><h4>工作流程（必问）</h4><pre>提交任务 → 线程数 &lt; core? → 是 → 创建核心线程\n    ↓否\nworkQueue 未满? → 是 → 任务入队\n    ↓否(满了)\n线程数 &lt; max? → 是 → 创建非核心线程\n    ↓否\n执行拒绝策略</pre><h4>队列类型</h4><ul><li><code>LinkedBlockingQueue</code>：无界/有界（默认无界，注意 OOM）</li><li><code>ArrayBlockingQueue</code>：有界（推荐）</li><li><code>SynchronousQueue</code>：不存储元素（CachedThreadPool 使用）</li></ul><p><strong>配置建议：</strong>CPU 密集型 N+1，IO 密集型 2N。</p>`},
{q:"线程池的拒绝策略有哪些？",a:`<h4>一、是什么（核心概念）</h4><p>当线程池的核心线程都在忙、任务队列已满、最大线程数也达到上限时，新提交的任务无法被处理，此时线程池需要执行<strong>拒绝策略（RejectedExecutionHandler）</strong>来决定如何处置这个任务。</p><blockquote>形象理解：餐厅座位满了（核心线程），等位区也满了（队列），加座也加到了上限（最大线程），这时候新来的客人（新任务）怎么处理？直接赶走？让经理自己接待？让最早等位的客人走？</blockquote><h4>二、怎么用（四种内置策略）</h4><table><tr><th>策略</th><th>行为</th><th>适用场景</th></tr><tr><td><strong>AbortPolicy</strong>（默认）</td><td>直接抛出 <code>RejectedExecutionException</code></td><td>不允许丢失任务的场景，调用方需要感知拒绝并处理异常</td></tr><tr><td><strong>CallerRunsPolicy</strong></td><td>由提交任务的线程自己执行该任务</td><td>不丢失任务 + 自动反压限流，推荐用于生产环境</td></tr><tr><td><strong>DiscardOldestPolicy</strong></td><td>丢弃队列中等待最久的任务（队头），重新提交当前任务</td><td>允许丢弃旧任务，如日志采集、监控数据上报</td></tr><tr><td><strong>DiscardPolicy</strong></td><td>静默丢弃，不抛异常不通知</td><td>几乎不推荐使用，任务丢了都不知道</td></tr></table><p><strong>CallerRunsPolicy 的反压原理：</strong></p><pre>// 假设调用者是主线程，不断提交任务
// 当线程池和队列都满时，CallerRunsPolicy 让主线程自己执行任务
// 主线程忙于执行任务 → 无法提交新任务 → 自然形成限流
// 类似 TCP 的流量控制：接收方处理不过来 → 发送方降速</pre><h4>三、为什么（自定义拒绝策略）</h4><p>生产环境中，内置策略往往不够用。我们通常需要：</p><ul><li>记录被拒绝的任务到日志（排查问题）</li><li>将任务持久化到数据库/消息队列（兜底补偿）</li><li>发送告警通知（监控）</li></ul><p><strong>自定义拒绝策略代码示例：</strong></p><pre>// 自定义拒绝策略：记录日志 + 持久化 + 告警
public class CustomRejectedHandler implements RejectedExecutionHandler {

    private static final Logger log = LoggerFactory.getLogger(
        CustomRejectedHandler.class);

    @Override
    public void rejectedExecution(Runnable r, ThreadPoolExecutor executor) {
        // 1. 记录拒绝日志（包含线程池状态，方便排查）
        log.error("任务被拒绝! 线程池状态: activeCount={}, poolSize={}, "
            + "queueSize={}, completedTaskCount={}",
            executor.getActiveCount(),
            executor.getPoolSize(),
            executor.getQueue().size(),
            executor.getCompletedTaskCount());

        // 2. 持久化到数据库或消息队列（兜底补偿）
        try {
            // 假设任务可以序列化保存
            TaskRecord record = new TaskRecord();
            record.setTaskInfo(r.toString());
            record.setRejectTime(new Date());
            taskRecordDao.save(record); // 存入数据库，后续补偿执行
        } catch (Exception e) {
            log.error("持久化被拒绝任务失败", e);
        }

        // 3. 发送告警（钉钉/飞书/邮件）
        alertService.send("线程池任务被拒绝，请关注！"
            + " activeCount=" + executor.getActiveCount());
    }
}

// 使用
ThreadPoolExecutor executor = new ThreadPoolExecutor(
    8, 16, 60, TimeUnit.SECONDS,
    new ArrayBlockingQueue&lt;&gt;(200),
    new ThreadFactoryBuilder().setNameFormat("biz-pool-%d").build(),
    new CustomRejectedHandler()  // 使用自定义拒绝策略
);</pre><h4>四、生产场景分析</h4><p><strong>场景：电商订单处理系统</strong></p><ul><li>用户下单后，异步任务写入 MQ → 消费线程池处理订单（发货、扣库存、发通知）</li><li>大促期间订单量暴增，线程池队列堆满</li><li><strong>如果用 AbortPolicy：</strong>直接抛异常，但 MQ 消费者需要 catch 后重试，可能反复拒绝反复重试形成恶性循环</li><li><strong>如果用 CallerRunsPolicy：</strong>消费者线程自己处理订单，处理期间不再拉取新消息，自动形成反压。推荐！</li><li><strong>如果用 DiscardPolicy：</strong>订单丢了客户收不到货，严重 P0 事故</li><li><strong>推荐方案：</strong>自定义拒绝策略 = CallerRunsPolicy + 日志记录 + 监控告警</li></ul><blockquote>面试加分点：提到"CallerRunsPolicy 的反压本质是让生产者降速"，以及"生产环境一定要自定义拒绝策略加日志和监控"，展示有实际生产经验。</blockquote>`},
{q:"CountDownLatch、CyclicBarrier、Semaphore 使用场景？",a:`<h4>一、是什么（核心概念）</h4><p>这三个工具类都是 JUC 包下基于 AQS 共享模式实现的并发协调器，但解决的是不同场景的问题：</p><p><strong>CountDownLatch（倒计时门闩）：</strong>允许一个或多个线程等待其他 N 个线程完成各自的任务后再继续执行。核心思想是"计数递减到 0，门闩打开"。<strong>一次性的</strong>，计数到 0 后不可重置。</p><p><strong>CyclicBarrier（循环栅栏）：</strong>让 N 个线程互相等待，当所有线程都到达屏障点后，一起继续执行。核心思想是"人齐了才发车"。<strong>可循环使用</strong>的，所有线程通过后屏障自动重置。</p><p><strong>Semaphore（信号量）：</strong>控制同时访问某一资源的线程数量，本质是一个"许可证管理器"。核心思想是"有限资源的并发准入控制"。</p><blockquote>形象类比：CountDownLatch 像老师等所有学生交卷后才能离开；CyclicBarrier 像旅游团等人齐了才发车；Semaphore 像停车场入口的闸机，车位满了就得等。</blockquote><h4>二、怎么用（代码示例）</h4><p><strong>CountDownLatch 示例：主线程等待 3 个子任务完成后汇总</strong></p><pre>// 创建计数值为 3 的门闩\nCountDownLatch latch = new CountDownLatch(3);\nList&lt;String&gt; results = new CopyOnWriteArrayList&lt;&gt;();\n\n// 启动 3 个子任务线程\nfor (int i = 0; i &lt; 3; i++) {\n    final int taskId = i;\n    new Thread(() -&gt; {\n        try {\n            Thread.sleep(1000 * taskId); // 模拟耗时\n            results.add("任务" + taskId + "的结果");\n        } catch (InterruptedException e) {\n            Thread.currentThread().interrupt();\n        } finally {\n            latch.countDown(); // 完成一个任务，计数 -1\n        }\n    }).start();\n}\n\nlatch.await(); // 主线程阻塞，直到计数为 0\nSystem.out.println("所有任务完成，汇总：" + results);</pre><p><strong>CyclicBarrier 示例：多线程分段计算后合并</strong></p><pre>// 3 个线程互相等待，到齐后一起执行 barrierAction\nCyclicBarrier barrier = new CyclicBarrier(3, () -&gt; {\n    System.out.println("所有线程到达屏障，开始合并结果！");\n});\n\nfor (int i = 0; i &lt; 3; i++) {\n    final int segment = i;\n    new Thread(() -&gt; {\n        try {\n            System.out.println("线程" + segment + "完成分段计算");\n            barrier.await(); // 等待其他线程\n            System.out.println("线程" + segment + "开始合并");\n        } catch (Exception e) {\n            e.printStackTrace();\n        }\n    }).start();\n}\n// CyclicBarrier 可重复使用：barrier.reset() 重置</pre><p><strong>Semaphore 示例：控制数据库连接池并发数</strong></p><pre>// 创建拥有 5 个许可的信号量\nSemaphore semaphore = new Semaphore(5);\n\nfor (int i = 0; i &lt; 20; i++) {\n    final int taskId = i;\n    new Thread(() -&gt; {\n        try {\n            semaphore.acquire(); // 获取许可（没有则阻塞）\n            System.out.println("任务" + taskId + "获取连接，执行查询");\n            Thread.sleep(2000); // 模拟数据库操作\n        } catch (InterruptedException e) {\n            Thread.currentThread().interrupt();\n        } finally {\n            semaphore.release(); // 释放许可\n        }\n    }).start();\n}
// 同一时刻最多只有 5 个任务在访问数据库</pre><h4>三、为什么（选型对比）</h4><table><tr><th>特性</th><th>CountDownLatch</th><th>CyclicBarrier</th><th>Semaphore</th></tr><tr><td>核心用途</td><td>等待多个线程完成</td><td>多线程互相等待到齐</td><td>控制并发访问数</td></tr><tr><td>可重用</td><td>否（一次性）</td><td>是（自动重置）</td><td>是（手动 release）</td></tr><tr><td>等待关系</td><td>一个/多个等 N 个</td><td>N 个互相等待</td><td>无等待关系，限流</td></tr><tr><td>回调</td><td>无</td><td>barrierAction</td><td>无</td></tr><tr><td>典型场景</td><td>主线程汇总子任务</td><td>分段计算后合并、多线程测试</td><td>连接池限流、接口限流</td></tr></table><h4>四、核心区别深入分析</h4><ul><li><strong>CountDownLatch vs CyclicBarrier：</strong>CountDownLatch 是"一等多"的关系——主线程 await()，子线程 countDown()，角色不同。CyclicBarrier 是"多等多"的关系——所有线程都调用 await()，角色对等。如果场景是"人齐了才开会"，用 CyclicBarrier；如果是"老板等员工交报告"，用 CountDownLatch。</li><li><strong>Semaphore vs 限流：</strong>Semaphore 做限流的优势是轻量级、无外部依赖。对比 Redis + Lua 限流方案，Semaphore 只适合单机场景。分布式限流需要用 Redis/Sentinel。</li><li><strong>CountDownLatch vs Future：</strong>如果只是等待单个异步任务结果，用 Future/CompletableFuture 更合适。CountDownLatch 的优势在于协调多个线程的生命周期。</li></ul><h4>五、底层原理</h4><p>三者都基于 <strong>AQS 共享模式</strong>实现：</p><ul><li><strong>CountDownLatch：</strong>state 初始化为 count 值，countDown() 调用 releaseShared() 使 state 递减，await() 调用 acquireSharedInterruptibly() 阻塞直到 state=0。</li><li><strong>CyclicBarrier：</strong>内部组合了 ReentrantLock + Condition，不直接继承 AQS，而是通过 Lock 和 Condition 实现线程间的互相等待。generation 字段标识当前"代"，breakBarrier() 可打破屏障。</li><li><strong>Semaphore：</strong>state 表示剩余许可数，acquire() 调用 acquireSharedInterruptibly() 递减 state，release() 调用 releaseShared() 递增 state。公平模式下会检查等待队列。</li></ul>`},
{q:"ThreadLocal 原理及内存泄漏？",a:`<p>每个 Thread 内部持有 <code>ThreadLocalMap</code>，key 是 ThreadLocal 的<strong>弱引用</strong>，value 是<strong>强引用</strong>。</p><h4>内存泄漏</h4><p>ThreadLocal 被 GC 后 key 变 null，但 value 是强引用，线程长期存活（线程池）时 value 永远不被回收。</p><h4>最佳实践</h4><pre>private static final ThreadLocal&lt;UserContext&gt; ctx = new ThreadLocal&lt;&gt;();\ntry {\n    ctx.set(userContext);\n    // 业务逻辑\n} finally {\n    ctx.remove(); // 必须清理！\n}</pre><p><strong>常见场景：</strong>RequestContextHolder、数据库连接、SimpleDateFormat。</p>`},
{q:"AQS 的原理？",a:`<h4>一、是什么（核心概念）</h4><p><strong>AQS（AbstractQueuedSynchronizer）</strong>是 Java 并发包（JUC）最底层的基础框架，ReentrantLock、CountDownLatch、Semaphore、ReadWriteLock 等并发工具都是基于 AQS 实现的。它提供了一套通用的同步状态管理和线程排队机制。</p><blockquote>形象理解：AQS 就像一个"排队管理系统"——它维护一个号码牌（state），告诉大家当前资源是否可用；如果不可用，就让等待的人排队（CLH 队列）；资源释放时叫醒队头的人（unpark）。</blockquote><h4>二、核心结构</h4><p><strong>1. volatile int state（同步状态）</strong></p><p>state 的含义由子类定义，不同实现中含义不同：</p><table><tr><th>实现类</th><th>state 含义</th></tr><tr><td>ReentrantLock</td><td>0=未锁定，&gt;0=重入次数</td></tr><tr><td>Semaphore</td><td>剩余许可数</td></tr><tr><td>CountDownLatch</td><td>计数值（递减到 0 释放）</td></tr><tr><td>ReadWriteLock</td><td>高 16 位=读锁数，低 16 位=写锁重入数</td></tr></table><p><strong>2. CLH 变体等待队列（FIFO 双向链表）</strong></p><pre>// AQS 内部队列结构
// head ←→ Node(B) ←→ Node(C) ←→ Node(D) ←→ tail
//
// Node 结构：
// ┌─────────────────────────────┐
// │ waitStatus: 节点状态         │
// │   0    - 初始状态            │
// │   -1   - SIGNAL（后继需要唤醒）│
// │   -2   - CONDITION（条件队列）│
// │   -3   - PROPAGATE（共享传播）│
// │ thread: 封装的线程           │
// │ prev: 前驱节点              │
// │ next: 后继节点              │
// │ nextWaiter: condition队列用  │
// └─────────────────────────────┘</pre><p><strong>为什么是 CLH 变体？</strong>原始 CLH 队列是单向链表（只有 prev），AQS 改为双向链表（prev + next），好处是：</p><ul><li>可以从 tail 向前遍历找到前驱（入队时需要设置前驱）</li><li>可以从 head 向后遍历找到后继（释放锁时唤醒下一个节点）</li><li>支持取消节点时跳过已取消的节点</li></ul><p><strong>3. CAS + LockSupport（线程阻塞/唤醒）</strong></p><ul><li>通过 <code>Unsafe.compareAndSwapInt</code> 原子修改 state</li><li>获取锁失败时调用 <code>LockSupport.park()</code> 挂起线程</li><li>释放锁时调用 <code>LockSupport.unpark()</code> 唤醒后继节点</li></ul><h4>三、怎么用（state 状态转换图）</h4><p><strong>ReentrantLock 非公平锁获取锁流程：</strong></p><pre>线程调用 lock()
    │
    ▼
state == 0 ?  ─── 是 ──→ CAS(state, 0, 1) ──→ 成功 → 获取锁，设置 exclusiveOwnerThread
    │                                                │
    │否                                              失败（有其他线程竞争）
    │                                                │
    ▼                                                ▼
当前线程是 owner? ─ 是 → state++（重入）         入队等待
    │                                            │
    │否                                          ▼
    │                                    park() 挂起线程
    ▼                                    │
加入等待队列                              │被 unpark 唤醒
                                         ▼
                                    重新尝试获取锁</pre><p><strong>ReentrantLock 释放锁流程：</strong></p><pre>线程调用 unlock()
    │
    ▼
state-- （重入次数减 1）
    │
    ▼
state == 0 ?  ─── 否 ──→ 还有重入，继续持有锁
    │
    │是
    ▼
exclusiveOwnerThread = null（释放锁）
    │
    ▼
找到队列中 head 后继的有效节点 → unpark() 唤醒
    │
    ▼
被唤醒的线程重新 CAS 尝试获取锁</pre><h4>四、为什么（两种模式）</h4><table><tr><th>模式</th><th>说明</th><th>典型实现</th></tr><tr><td><strong>独占模式（Exclusive）</strong></td><td>同一时刻只有一个线程能获取资源</td><td>ReentrantLock</td></tr><tr><td><strong>共享模式（Shared）</strong></td><td>允许多个线程同时获取资源（受限于 state 值）</td><td>Semaphore、CountDownLatch、ReadWriteLock 读锁</td></tr></table><p><strong>独占 vs 共享的核心区别：</strong></p><ul><li><strong>独占模式：</strong>tryAcquire() 成功则只有当前线程执行，其他线程入队等待。释放时只唤醒一个后继节点。</li><li><strong>共享模式：</strong>tryAcquireShared() 返回 &gt;= 0 表示获取成功。释放时调用 releaseShared() 可能唤醒多个等待线程（传播机制），因为共享模式下多个线程可以同时持有资源。</li></ul><h4>五、公平锁 vs 非公平锁</h4><p><strong>非公平锁（默认，性能更好）：</strong></p><pre>// 新来的线程直接 CAS 抢锁，不管队列中有没有等待的线程
// 好处：减少线程切换开销（刚释放锁的线程可能马上又获取到）
// 缺点：可能导致队列中的线程"饥饿"
final void lock() {
    if (compareAndSetState(0, 1)) // 直接抢！
        setExclusiveOwnerThread(Thread.currentThread());
    else
        acquire(1); // 抢不到再排队
}</pre><p><strong>公平锁（按序获取）：</strong></p><pre>// 新来的线程先检查队列中是否有等待的线程，有则排队
// 好处：先到先得，不会饥饿
// 缺点：线程切换开销大，吞吐量低
final void lock() {
    acquire(1); // 不会直接抢
}
protected final boolean tryAcquire(int acquires) {
    if (!hasQueuedPredecessors() && // 先检查前面有没有人排队
        compareAndSetState(0, acquires)) {
        setExclusiveOwnerThread(Thread.currentThread());
        return true;
    }
    return false;
}</pre><blockquote>面试建议：被问 AQS 时，先说 state + CLH 队列两个核心结构，再说独占/共享两种模式，然后举例 ReentrantLock 的获取/释放流程，最后补充公平/非公平锁的区别。这四层递进能展示对 AQS 的理解深度。</blockquote>`},
{q:"死锁的产生条件和排查方法？",a:`<h4>一、是什么（核心概念）</h4><p><strong>死锁（Deadlock）</strong>是指两个或两个以上的线程在执行过程中，因争夺资源而造成的一种互相等待的现象，若无外力作用，它们都将无法推进下去。</p><blockquote>形象类比：两个人在独木桥上相向而行，每人手里都拿着一块木板搭桥过河的半边，都不肯退让，结果谁都过不去。</blockquote><h4>二、四个必要条件（缺一不可）</h4><ol><li><strong>互斥条件（Mutual Exclusion）：</strong>资源同一时刻只能被一个线程占有</li><li><strong>持有并等待（Hold and Wait）：</strong>线程已持有至少一个资源，同时在等待获取其他被占有的资源</li><li><strong>不可抢占（No Preemption）：</strong>已获得的资源只能由持有线程主动释放，不能被强制剥夺</li><li><strong>循环等待（Circular Wait）：</strong>存在一条线程等待链，形成环形结构（T1 等 T2，T2 等 T1）</li></ol><h4>三、怎么用（死锁代码示例）</h4><pre>public class DeadLockDemo {
    private static final Object lockA = new Object();
    private static final Object lockB = new Object();

    public static void main(String[] args) {
        // 线程1：先拿 lockA，再拿 lockB
        new Thread(() -&gt; {
            synchronized (lockA) {
                System.out.println("线程1持有lockA，等待lockB...");
                try { Thread.sleep(100); } catch (InterruptedException e) {}
                synchronized (lockB) {
                    System.out.println("线程1获得两把锁");
                }
            }
        }, "Thread-1").start();

        // 线程2：先拿 lockB，再拿 lockA（顺序相反 → 死锁！）
        new Thread(() -&gt; {
            synchronized (lockB) {
                System.out.println("线程2持有lockB，等待lockA...");
                try { Thread.sleep(100); } catch (InterruptedException e) {}
                synchronized (lockA) {
                    System.out.println("线程2获得两把锁");
                }
            }
        }, "Thread-2").start();
    }
}
// 运行结果：两个线程互相等待，程序永远卡住</pre><p><strong>这段代码满足了死锁的全部四个条件：</strong></p><ul><li>互斥：synchronized 保证锁的互斥性</li><li>持有并等待：线程1持有 lockA 等 lockB，线程2持有 lockB 等 lockA</li><li>不可抢占：synchronized 不可被强制释放</li><li>循环等待：Thread-1 → lockB → Thread-2 → lockA → Thread-1，形成环</li></ul><h4>四、为什么（排查方法详解）</h4><p><strong>方法一：jstack（最常用）</strong></p><pre>// 步骤 1：找到 Java 进程 PID
jps -l
// 输出示例：12345 com.example.DeadLockDemo

// 步骤 2：打印线程堆栈
jstack 12345
// 输出关键信息：
// Found one Java-level deadlock:
// =============================
// "Thread-2":
//   waiting to lock monitor 0x... (object 0x...lockA, a java.lang.Object),
//   which is held by "Thread-1"
// "Thread-1":
//   waiting to lock monitor 0x... (object 0x...lockB, a java.lang.Object),
//   which is held by "Thread-2"</pre><p><strong>方法二：Arthas（阿里开源诊断工具，线上推荐）</strong></p><pre>// 安装并 attach 到目标进程
java -jar arthas-boot.jar

// 使用 thread -b 检测死锁
thread -b
// 输出：会直接显示死锁涉及的线程和锁信息

// 也可以用 thread 查看所有 BLOCKED 状态的线程
thread --state BLOCKED</pre><p><strong>方法三：JConsole / VisualVM</strong></p><ul><li>打开 JConsole → 连接到目标进程 → "线程"选项卡 → 点击"检测死锁"按钮</li><li>如果存在死锁，会显示"检测到死锁"并列出相关线程</li></ul><p><strong>方法四：jcmd（JDK 8+）</strong></p><pre>jcmd 12345 Thread.print
// 效果和 jstack 类似，会输出 Found one Java-level deadlock</pre><h4>五、预防方法（面试高频追问）</h4><ul><li><strong>破坏循环等待——按相同顺序获取锁：</strong>所有线程都先拿 lockA 再拿 lockB，就不会死锁。这是最实用的方法。</li><li><strong>破坏持有并等待——使用 tryLock 超时机制：</strong><pre>// 尝试获取锁，超时则放弃，避免无限等待\nReentrantLock lock1 = new ReentrantLock();\nReentrantLock lock2 = new ReentrantLock();\n\nif (lock1.tryLock(1, TimeUnit.SECONDS)) {\n    try {\n        if (lock2.tryLock(1, TimeUnit.SECONDS)) {\n            try {\n                // 业务逻辑\n            } finally { lock2.unlock(); }\n        }\n    } finally { lock1.unlock(); }\n}</pre></li><li><strong>破坏不可抢占——使用 lockInterruptibly()：</strong>等待锁的线程可以被中断，收到中断信号后释放已持有的锁。</li><li><strong>缩小锁粒度：</strong>能不加锁就不加锁，能用局部变量就不用共享变量，从根源上避免。</li></ul>`},
{q:"Java 内存模型（JMM）？",a:`<h4>一、是什么（核心概念）</h4><p><strong>JMM（Java Memory Model）</strong>是 Java 定义的并发编程内存访问规范（JSR-133），它规定了线程之间如何通过内存交互，以及何时一个线程的写入对另一个线程可见。<strong>注意：JMM 不是 JVM 的内存区域划分（堆/栈/方法区），而是关于多线程并发访问的抽象模型。</strong></p><p><strong>JMM 的内存结构抽象：</strong></p><pre>线程A                  主内存                  线程B
┌──────────┐      ┌──────────┐      ┌──────────┐
│ 工作内存  │←────→│  共享变量 │←────→│ 工作内存  │
│(本地副本) │      │ (所有线程) │      │(本地副本) │
└──────────┘      └──────────┘      └──────────┘
// 每个线程有自己的工作内存（CPU 缓存的抽象）
// 线程对变量的操作必须在工作内存中进行，不能直接操作主内存
// 问题：线程A修改了变量，可能还停留在自己的工作内存中
//       线程B从自己的工作内存读取，看到的还是旧值（可见性问题）</pre><h4>二、三大特性</h4><ol><li><strong>原子性（Atomicity）：</strong>一个操作要么全部完成，要么全部不做。synchronized、Lock、Atomic 类保证。注意：<code>i++</code> 不是原子操作（读-改-写三步），需要 AtomicInteger 或加锁。</li><li><strong>可见性（Visibility）：</strong>一个线程修改了共享变量，其他线程能立即看到。volatile、synchronized、final 保证。</li><li><strong>有序性（Ordering）：</strong>程序执行的顺序按照代码的先后顺序执行。volatile（内存屏障）、happens-before 规则保证。编译器、CPU 可能对指令重排序优化。</li></ol><h4>三、怎么用（可见性问题代码示例）</h4><p><strong>没有 volatile 的情况（可能死循环）：</strong></p><pre>public class VisibilityDemo {
    static boolean running = true; // 没有 volatile

    public static void main(String[] args) throws Exception {
        new Thread(() -&gt; {
            while (running) {
                // 线程读取工作内存中的 running 副本
                // 可能永远是 true，永远走不出循环！
            }
            System.out.println("线程停止了"); // 可能永远不打印
        }).start();

        Thread.sleep(1000);
        running = false; // 主线程修改了 running
        System.out.println("已设置 running = false");
        // 但子线程可能看不到这个修改，因为它读的是自己工作内存中的旧值
    }
}</pre><p><strong>加了 volatile 后（立即可见）：</strong></p><pre>public class VisibilityFixDemo {
    static volatile boolean running = true; // 加了 volatile

    public static void main(String[] args) throws Exception {
        new Thread(() -&gt; {
            while (running) {
                // volatile 保证每次读都从主内存读取最新值
            }
            System.out.println("线程停止了"); // 一定会打印
        }).start();

        Thread.sleep(1000);
        running = false; // volatile 写后立即刷新到主内存
        System.out.println("已设置 running = false");
    }
}</pre><blockquote>volatile 的底层实现：写操作后插入 StoreStore + StoreLoad 内存屏障，读操作前插入 LoadLoad + LoadStore 内存屏障，强制从主内存读写，禁止 CPU 缓存优化。</blockquote><h4>四、为什么（happens-before 原则）</h4><p><strong>happens-before</strong> 是 JMM 最核心的概念——如果操作 A happens-before 操作 B，那么 A 的结果对 B 可见。不需要开发者做任何额外操作，JMM 自动保证。</p><table><tr><th>规则</th><th>含义</th><th>实际场景</th></tr><tr><td>程序顺序规则</td><td>同一线程中，前面的操作 HB 后面的操作</td><td>单线程内代码按顺序执行</td></tr><tr><td>监视器锁规则</td><td>unlock HB 后续对同一锁的 lock</td><td>synchronized 释放锁后，下一个获得锁的线程能看到之前所有修改</td></tr><tr><td>volatile 规则</td><td>volatile 写 HB 后续对该变量的读</td><td>一写多读的状态标志位</td></tr><tr><td>线程启动规则</td><td>Thread.start() HB 线程内的所有操作</td><td>主线程在 start() 前的修改，子线程都能看到</td></tr><tr><td>线程终止规则</td><td>线程内操作 HB join() 返回</td><td>子线程的结果，主线程 join() 后一定能看到</td></tr><tr><td>传递性</td><td>A HB B, B HB C → A HB C</td><td>连锁保证可见性</td></tr></table><h4>五、happens-before 实战场景</h4><pre>// 场景：线程A初始化配置，线程B读取配置
// 方案一：volatile（推荐，轻量）
class Config {
    static volatile boolean initialized = false;
    static Map&lt;String, String&gt; config;

    // 线程A
    static void init() {
        config = loadConfig();       // 1. 加载配置
        initialized = true;          // 2. volatile 写（插入内存屏障）
    }                                // happens-before 保证：1 HB 2

    // 线程B
    static String get(String key) {
        if (initialized) {           // 3. volatile 读（2 HB 3）
            return config.get(key);  // 4. 由传递性：1 HB 2 HB 3 HB 4
        }                            // 所以线程B一定能看到 config 的初始化
        return null;
    }
}

// 方案二：synchronized（更重，但也保证可见性）
// 方案三：final（构造函数中赋值 final 字段，HB 其他线程读取该对象）</pre>`},
{q:"JVM 内存区域划分？",a:`<h4>线程私有</h4><ul><li><strong>程序计数器（PC）：</strong>记录字节码指令地址，唯一不会 OOM 的区域</li><li><strong>虚拟机栈：</strong>每个方法创建栈帧（局部变量表、操作数栈、动态链接、返回地址）。StackOverflowError / OOM</li><li><strong>本地方法栈：</strong>为 native 方法服务</li></ul><h4>线程共享</h4><ul><li><strong>堆（Heap）：</strong>对象实例和数组，GC 主区域。新生代(Eden+S0+S1) + 老年代</li><li><strong>方法区（Metaspace）：</strong>JDK 1.8 用本地内存，存储类信息、常量池、静态变量</li></ul><p><strong>直接内存：</strong>NIO 的 <code>ByteBuffer.allocateDirect()</code>，受 MaxDirectMemorySize 限制。</p>`},
{q:"垃圾回收算法有哪些？",a:`<h4>是什么：四大垃圾回收算法</h4><table><tr><th>算法</th><th>核心思想</th><th>优点</th><th>缺点</th><th>适用场景</th></tr><tr><td><strong>标记-清除</strong></td><td>标记存活对象，清除未标记对象</td><td>简单，无移动开销</td><td>产生内存碎片，分配时需查找空闲块</td><td>早期 JVM，现很少单独使用</td></tr><tr><td><strong>标记-复制</strong></td><td>将存活对象复制到另一块区域</td><td>无碎片，分配快（指针碰撞）</td><td>浪费一半内存，复制开销大</td><td>新生代（Eden+2 Survivor，8:1:1）</td></tr><tr><td><strong>标记-整理</strong></td><td>标记后将存活对象向一端压缩</td><td>无碎片，不浪费内存</td><td>STW 时间长，移动对象需更新引用</td><td>老年代</td></tr><tr><td><strong>分代收集</strong></td><td>按对象存活时间选择不同算法</td><td>综合最优</td><td>实现复杂</td><td>现代 JVM 默认策略</td></tr></table><h4>怎么用：JVM 中的实际配置</h4><pre>// 查看当前 GC 算法\njava -XX:+PrintFlagsFinal -version | grep UseG1\n\n// 常用 GC 配置\n-Xms4g -Xmx4g            // 堆固定 4G\n-Xmn2g                  // 新生代 2G（通常堆的 1/3~1/2）\n-XX:+UseG1GC             // 使用 G1（JDK 9+ 默认）\n-XX:MaxGCPauseMillis=200 // G1 目标停顿时间\n-XX:SurvivorRatio=8      // Eden:Survivor = 8:1（默认 8）\n-XX:MaxTenuringThreshold=15 // 晋升老年代年龄阈值\n\n// 查看 GC 日志（排查必开）\n-XX:+PrintGCDetails -XX:+PrintGCDateStamps\n-Xloggc:/data/logs/gc.log</pre><h4>为什么：算法选择的本质权衡</h4><p><strong>吞吐量 vs 延迟 vs 内存</strong>——这三者不可兼得，GC 算法的核心就是在这个三角中找平衡点。</p><ul><li><strong>标记-清除</strong>的问题是碎片化：想象一个书架，你把不看的书拿走，留下的空隙无法放入一本大书——这就是碎片</li><li><strong>标记-复制</strong>牺牲空间换时间：新生代对象存活率低（约 98% 会死），所以复制存活对象的成本很低，而且分配内存只需移动指针（类似 <code>malloc</code> 的 bump pointer）</li><li><strong>标记-整理</strong>牺牲时间换空间：老年代对象存活率高，复制不划算，宁可花时间整理</li></ul><h4>对象晋升老年代条件</h4><ol><li><strong>年龄达到阈值：</strong>每熬过一次 Minor GC 年龄 +1，达到 <code>MaxTenuringThreshold</code>（默认 15）就晋升</li><li><strong>大对象直接进老年代：</strong>超过 <code>-XX:PretenureSizeThreshold</code> 的对象直接在老年代分配</li><li><strong>Survivor 放不下：</strong>Survivor 区空间不足时直接晋升</li><li><strong>动态年龄判定：</strong>Survivor 中相同年龄的对象总大小超过 Survivor 空间的一半，则大于等于该年龄的对象直接晋升</li></ol><blockquote><strong>面试加分点：</strong>实际项目中，如果发现 Young GC 频繁但耗时很短，说明新生代复制算法工作良好；如果 Full GC 频繁，说明老年代标记-整理压力大，需要调整新生代/老年代比例或换 G1/ZGC。</blockquote>`},
{q:"常见垃圾收集器？CMS、G1、ZGC",a:`<h4>CMS（老年代，低延迟）</h4><p>四阶段：初始标记(STW) → 并发标记 → 重新标记(STW) → 并发清除。缺点：CPU 敏感、浮动垃圾、内存碎片。</p><h4>G1（JDK 9 默认）</h4><p>堆划分为 Region，混合回收，使用记忆集。目标停顿时间 <code>MaxGCPauseMillis</code>。不产生碎片。</p><h4>ZGC（JDK 15+，超低延迟）</h4><p>停顿 ≤ 1ms，与堆大小无关。核心技术：染色指针 + 读屏障 + 并发转移。</p><h4>选择建议</h4><ul><li>小型应用：Parallel Scavenge</li><li>互联网应用：G1</li><li>超大堆+超低延迟：ZGC</li></ul>`},
{q:"如何判断对象可被回收？",a:`<h4>是什么：两种判断方式</h4><p><strong>1. 引用计数法（Python 使用，Java 不使用）：</strong>每个对象维护引用计数器，+1/-1，为 0 则回收。致命缺陷：<strong>无法解决循环引用</strong>（A 引用 B，B 引用 A，计数永远不为 0）。</p><p><strong>2. 可达性分析（Java 使用）：</strong>从 GC Roots 出发搜索引用链，不可达的对象标记为可回收。即使 A↔B 互相引用，只要从 GC Roots 不可达，就会被回收。</p><h4>GC Roots 有哪些</h4><ul><li><strong>虚拟机栈中引用的对象：</strong>方法中正在使用的局部变量、方法参数</li><li><strong>静态变量引用的对象：</strong>类的 static 字段指向的对象</li><li><strong>常量引用的对象：</strong>final static 常量指向的对象</li><li><strong>JNI（Native 方法）引用的对象</strong></li><li><strong>synchronized 持有的对象</strong></li><li><strong>JVM 内部引用：</strong>基本类型的 Class 对象、系统类加载器、异常类等</li></ul><h4>怎么用：四种引用类型实战代码</h4><pre>// 1. 强引用（Strong Reference）—— 永不回收\nUser user = new User("张三");\n// 即使 OOM 也不会回收 user，宁可抛异常\nlist.add(user); // 只要 list 持有，就永远不回收\n\n// 2. 软引用（SoftReference）—— 内存不足时回收（适合做缓存）\nSoftReference&lt;byte[]&gt; cache = new SoftReference&lt;&gt;(new byte[1024*1024*100]);\nbyte[] data = cache.get(); // 可能返回 null（已被回收）\nif (data == null) {\n    data = loadFromDisk(); // 缓存失效，重新加载\n}\n// 典型场景：图片缓存、大对象缓存、MyBatis 的一级缓存思想\n\n// 3. 弱引用（WeakReference）—— 下次 GC 就回收\nWeakReference&lt;User&gt; weakUser = new WeakReference&lt;&gt;(new User("李四"));\nSystem.gc();\n// weakUser.get() 大概率返回 null\n\n// 实际应用：ThreadLocal 的 key 就是弱引用\n// ThreadLocalMap 的 Entry 继承自 WeakReference&lt;ThreadLocal&lt;?&gt;&gt;\n// 当 ThreadLocal 变量不再被外部引用时，key 会被 GC 回收\n// 但 value 是强引用！所以必须手动 remove()，否则线程池场景会内存泄漏\n\n// 4. 虚引用（PhantomReference）—— 随时回收，用于跟踪 GC 活动\nReferenceQueue&lt;Object&gt; queue = new ReferenceQueue&lt;&gt;();\nPhantomReference&lt;Object&gt; phantom = new PhantomReference&lt;&gt;(new Object(), queue);\n// phantom.get() 永远返回 null\n// 唯一用途：配合 ReferenceQueue 监控对象何时被回收（NIO 的 DirectByteBuffer 清理）</pre><h4>四种引用对比表</h4><table><tr><th>类型</th><th>回收时机</th><th>get() 返回值</th><th>典型用途</th><th>代码示例</th></tr><tr><td>强引用</td><td>永不回收</td><td>对象本身</td><td>普通业务对象</td><td><code>User u = new User()</code></td></tr><tr><td>软引用</td><td>内存不足时</td><td>可能为 null</td><td>内存敏感缓存</td><td><code>SoftReference&lt;Bitmap&gt;</code></td></tr><tr><td>弱引用</td><td>下次 GC</td><td>可能为 null</td><td>ThreadLocal key、WeakHashMap</td><td><code>WeakReference&lt;User&gt;</code></td></tr><tr><td>虚引用</td><td>随时</td><td>永远 null</td><td>跟踪对象回收（NIO）</td><td><code>PhantomReference + ReferenceQueue</code></td></tr></table><h4>为什么：实际项目中的经典场景</h4><ul><li><strong>ThreadLocal 内存泄漏：</strong>key 是弱引用会被回收，但 value 是强引用不会。线程池中线程复用，value 一直存活。<strong>解决：</strong>用完必须 <code>remove()</code></li><li><strong>WeakHashMap：</strong>key 只被弱引用持有，当外部不再引用 key 时自动从 Map 中移除。Spring 的 <code>ReflectionUtils</code> 就用了 WeakHashMap 缓存反射信息</li><li><strong>Guava Cache：</strong>提供 <code>softValues()</code> / <code>weakKeys()</code> 选项，底层就是软引用/弱引用</li></ul><blockquote><strong>面试加分点：</strong>可以提到 finalize() 方法——对象被标记为可回收后，JVM 会检查是否覆写了 finalize()，如果有且未执行过，会放入 F-Queue 队列由 Finalizer 线程执行。但 finalize() 不推荐使用（性能差、不确定执行时机），JDK 9 已标记为 deprecated。</blockquote>`},
{q:"类加载机制（双亲委派模型）？",a:`<h4>是什么：类加载全过程</h4><p>类加载 = 将 <code>.class</code> 文件加载到 JVM 方法区，并创建 <code>java.lang.Class</code> 对象。</p><pre>加载（Loading）→ 验证（Verification）→ 准备（Preparation）→ 解析（Resolution）→ 初始化（Initialization）\n                    \\______ 链接（Linking）______/</pre><table><tr><th>阶段</th><th>做什么</th><th>关键点</th></tr><tr><td>加载</td><td>读取 .class 字节流，在方法区创建 Class 对象</td><td>可从 jar/网络/动态生成</td></tr><tr><td>验证</td><td>格式校验、语义校验、字节码校验</td><td>防止恶意代码，可用 -Xverify:none 跳过</td></tr><tr><td>准备</td><td>静态变量分配内存并设零值</td><td><code>static int a = 10</code> 此时 a=0（不是10），10 在初始化阶段赋值</td></tr><tr><td>解析</td><td>符号引用 → 直接引用</td><td>常量池中的字符串、类、方法引用</td></tr><tr><td>初始化</td><td>执行 &lt;clinit&gt; 方法（static 块 + static 赋值）</td><td>真正执行 Java 代码，有锁保护（线程安全）</td></tr></table><h4>是什么：双亲委派模型</h4><pre>Bootstrap ClassLoader（rt.jar, java.lang.*）\n    ↑ 委托\nExtension ClassLoader（ext/*.jar, javax.*）\n    ↑ 委托\nApplication ClassLoader（classpath, 你的代码）\n    ↑ 委托\nCustom ClassLoader（自定义加载器）</pre><p><strong>工作流程：</strong>收到加载请求 → 先委托父加载器 → 父加载器无法加载 → 子加载器才尝试加载。</p><p><strong>为什么这样设计：</strong></p><ul><li><strong>安全性：</strong>你自己写一个 <code>java.lang.String</code> 类，由于双亲委派，永远会加载 JDK 自带的 String，防止核心类被篡改</li><li><strong>避免重复加载：</strong>父加载器已加载的类不会被子加载器重复加载</li></ul><h4>怎么用：自定义 ClassLoader 代码</h4><pre>public class MyClassLoader extends ClassLoader {\n    private String basePath; // .class 文件所在目录\n\n    public MyClassLoader(String basePath) {\n        this.basePath = basePath;\n    }\n\n    @Override\n    protected Class&lt;?&gt; findClass(String name) throws ClassNotFoundException {\n        // 1. 读取 .class 文件字节\n        String path = basePath + "/" + name.replace('.', '/') + ".class";\n        byte[] data = readFile(path);\n        if (data == null) {\n            throw new ClassNotFoundException(name);\n        }\n        // 2. 调用 defineClass 创建 Class 对象\n        return defineClass(name, data, 0, data.length);\n    }\n\n    private byte[] readFile(String path) {\n        try (InputStream is = new FileInputStream(path);\n             ByteArrayOutputStream bos = new ByteArrayOutputStream()) {\n            int b;\n            while ((b = is.read()) != -1) bos.write(b);\n            return bos.toByteArray();\n        } catch (IOException e) { return null; }\n    }\n}\n\n// 使用\nMyClassLoader loader = new MyClassLoader("/my/classes");\nClass&lt;?&gt; clazz = loader.loadClass("com.example.MyPlugin");\nObject obj = clazz.getDeclaredConstructor().newInstance();</pre><h4>为什么：打破双亲委派的三大场景</h4><p><strong>场景一：SPI 机制（JDBC、JNDI）</strong></p><pre>// JDBC 的 Driver 接口在 rt.jar（Bootstrap 加载）\n// 但实现类 mysql-connector-java 在 classpath（Application 加载）\n// Bootstrap 无法加载 classpath 的类！\n\n// 解决方案：线程上下文类加载器（Thread Context ClassLoader）\n// 父加载器反过来请求子加载器去加载\nThread.currentThread().setContextClassLoader(appClassLoader);\nServiceLoader&lt;Driver&gt; loaders = ServiceLoader.load(Driver.class);\n// ServiceLoader 内部使用 contextClassLoader 加载实现类</pre><p><strong>场景二：Tomcat 的 WebAppClassLoader</strong></p><ul><li>采用 <strong>"子优先"</strong> 策略：先自己加载，加载不到再委托父加载器</li><li>目的：不同 Web 应用的同名类要隔离加载，且优先使用应用自己的类</li><li>打破原因：多个 Web 应用共用同一个 Tomcat，需要类隔离</li></ul><p><strong>场景三：OSGi 模块化框架</strong></p><ul><li>采用 <strong>"网状委派"</strong> 模型：不同 Bundle 之间可以互相委托</li><li>每个 Bundle 有独立的 ClassLoader，按包名规则决定委派关系</li></ul><blockquote><strong>面试加分点：</strong>可以提到 JDK 9 的模块系统（JPMS）对类加载的影响——模块化后，类加载器需要感知模块的 exports/opens 声明，非导出包的类即使存在也无法被外部访问。</blockquote>`},
{q:"JVM 调优参数有哪些？",a:`<h4>堆和内存</h4><table><tr><th>参数</th><th>说明</th></tr><tr><td><code>-Xms2g -Xmx2g</code></td><td>堆固定大小（建议一致）</td></tr><tr><td><code>-Xmn1g</code></td><td>新生代大小</td></tr><tr><td><code>-Xss256k</code></td><td>线程栈大小</td></tr><tr><td><code>-XX:MetaspaceSize=256m</code></td><td>元空间初始大小</td></tr></table><h4>GC 选择</h4><table><tr><th>参数</th><th>说明</th></tr><tr><td><code>-XX:+UseG1GC</code></td><td>G1 收集器</td></tr><tr><td><code>-XX:MaxGCPauseMillis=200</code></td><td>G1 目标停顿</td></tr></table><h4>经验值（4核8G）</h4><pre>-Xms4g -Xmx4g -Xmn2g\n-XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m\n-XX:+UseG1GC -XX:MaxGCPauseMillis=200\n-XX:+HeapDumpOnOutOfMemoryError\n-XX:HeapDumpPath=/data/logs/dump.hprof</pre>`},
{q:"线上 OOM 问题如何排查？",a:`<h4>常见 OOM 类型</h4><table><tr><th>错误</th><th>常见场景</th></tr><tr><td>Java heap space</td><td>大对象、内存泄漏</td></tr><tr><td>GC overhead limit exceeded</td><td>内存泄漏晚期</td></tr><tr><td>Metaspace</td><td>动态生成大量类</td></tr><tr><td>Unable to create new native thread</td><td>线程泄漏</td></tr></table><h4>排查步骤</h4><ol><li><strong>保留现场：</strong>提前配 <code>-XX:+HeapDumpOnOutOfMemoryError</code></li><li><strong>分析堆转储：</strong>MAT 查看 Dominator Tree、Leak Suspects</li><li><strong>定位代码：</strong>从 GC Roots 引用链追溯</li><li><strong>修复验证：</strong>压测 + 观察 GC 日志</li></ol>`},
{q:"线上 CPU 飙高如何排查？",a:`<h4>排查步骤</h4><pre>top              # 找 CPU 最高的进程 PID\ntop -Hp &lt;pid&gt;    # 找 CPU 最高的线程 TID\nprintf "%x" &lt;tid&gt; # 转十六进制\njstack &lt;pid&gt; | grep -A 30 &lt;nid&gt;  # 搜索堆栈</pre><h4>常见原因</h4><ul><li><strong>死循环：</strong>堆栈反复指向同一代码</li><li><strong>频繁 GC：</strong>jstat -gcutil 确认</li><li><strong>正则回溯：</strong>堆栈出现 regex.Pattern</li><li><strong>锁竞争：</strong>大量 BLOCKED/WAITING</li></ul><h4>arthas 推荐</h4><pre>thread -n 3       # CPU 最高的 3 个线程\nthread -b          # 死锁检测\ndashboard          # 实时概况</pre>`}
]},
